<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Путь к совершенству — Кармический банк</title>
  <link rel="icon" type="image/png" href="astralsk.png">
  <link rel="apple-touch-icon" href="astralsk.png">
  <style>
    :root { --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238; --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981; --border: #1f3350; --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4); }
    * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow-x: hidden; cursor: default; }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; opacity: 0.7; }
    @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; } }
    .app-container { max-width: 800px; width: 100%; position: relative; z-index: 2; background: radial-gradient(circle at 20% 30%, #1a2f4a 0%, #0f1f35 100%); border: 1px solid rgba(249,115,22,0.3); border-radius: 32px; padding: 40px 30px; box-shadow: 0 0 60px rgba(249,115,22,0.3); text-align: center; }
    .hidden { display: none !important; }
    h2 { font-size: 2rem; font-weight: 800; margin-bottom: 20px; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 6px rgba(249,115,22,0.5)); }
    h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .lms-card { background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%); border: 1px solid var(--border); border-radius: 24px; padding: 30px 20px; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(5px); position: relative; }
    .lms-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--hologram-glow); }
    .lms-card .title { font-weight: 700; font-size: 1.2rem; margin: 12px 0 4px; background: linear-gradient(135deg, #c084fc, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lms-card .desc { font-size: 0.85rem; color: var(--text-secondary); }
    .btn, button, select, .scenario-btn, .lms-card, .back-link { cursor: pointer; }
    .btn { background: transparent; border: 1px solid var(--accent); border-radius: 40px; padding: 10px 24px; font-weight: 800; font-size: 0.9rem; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn:hover { border-color: #c084fc; box-shadow: var(--hologram-glow); transform: scale(1.03); }
    .btn.back-btn { background: transparent; border-color: var(--border); -webkit-background-clip: unset; background-clip: unset; color: var(--text-secondary); margin-bottom: 20px; }
    .btn.back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .delete-module-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 4px 12px; border-radius: 14px; font-size: 0.75rem; cursor: pointer; position: absolute; top: 10px; right: 10px; opacity: 0.7; }
    .delete-module-btn:hover { opacity: 1; background: rgba(239,68,68,0.1); }
    .chat-box { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; padding: 0 4px; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; }
    .message.user { align-self: flex-end; background: var(--accent); color: white; }
    .message.bot { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .input-area { display: flex; gap: 8px; align-items: center; border-top: 1px solid var(--border); padding-top: 16px; }
    .input-area input { flex: 1; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem; outline: none; }
    .back-link { color: var(--text-secondary); margin-top: 20px; display: inline-flex; align-items: center; gap: 6px; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow { width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24); border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both; transform: rotate(45deg); box-shadow: 0 0 10px var(--accent); }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse { 0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); } 50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); } }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%); border: 1px solid var(--accent); border-radius: 40px; padding: 12px 30px; color: var(--text-primary); font-weight: 500; box-shadow: 0 0 30px rgba(249,115,22,0.5); z-index: 10000; animation: toastIn 0.4s ease, toastOut 0.4s 2.5s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="app-container" id="app">
  <div id="lmsMenu">
    <h2>Путь к совершенству</h2>
    <div class="lms-grid" id="lmsModulesGrid"></div>
    <a href="/" class="back-link">← Вернуться в Кармический банк</a>
  </div>

  <div id="moduleTrainer" class="hidden">
    <button class="btn back-btn" onclick="openModule('menu')">← Назад к списку</button>
    <h3>AI-Тренажёр</h3>
    <div id="trainerSetup">
      <div class="scenario-selector" id="scenarioSelector">
        <button class="scenario-btn active" data-scenario="sales_manager">Руководитель отдела продаж</button>
        <button class="scenario-btn" data-scenario="sales">Менеджер по продажам</button>
      </div>
      <div class="level-selector">
        <select id="levelSelect">
          <option value="1">Искра</option><option value="2">Луч</option><option value="3" selected>Созвездие</option>
          <option value="4">Галактика</option><option value="5">Вселенная</option><option value="6">Абсолют</option>
        </select>
      </div>
      <button class="btn" onclick="startTraining()">Начать тренировку</button>
    </div>
    <div id="trainerChat" class="hidden">
      <div class="chat-box" id="chatBox"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ваше сообщение...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" style="border-color: var(--success);" onclick="confirmEvaluate()">Завершить</button>
      </div>
    </div>
  </div>

  <div id="moduleQuiz" class="hidden">
    <button class="btn back-btn" onclick="openModule('menu')">← Назад к списку</button>
    <h3>Кармический миллионер</h3>
    <p style="color: var(--text-secondary); margin: 20px 0;">Викторина открывается в отдельной странице.</p>
    <a href="/millionaire.html" class="btn" target="_blank">Открыть викторину</a>
  </div>

  <div id="moduleDynamic" class="hidden">
    <button class="btn back-btn" onclick="openModule('menu')">← Назад к списку</button>
    <h3 id="dynamicModuleTitle"></h3>
    <p id="dynamicModuleDescription" style="color: var(--text-secondary); margin-bottom: 20px;"></p>
    <div class="chat-box" id="dynamicChatBox"></div>
    <div class="input-area">
      <input type="text" id="dynamicUserInput" placeholder="Общайтесь с AI-тренером...">
      <button class="btn" onclick="sendDynamicMessage()">➤</button>
      <button class="btn" style="border-color: var(--success);" onclick="endDynamicSession()">Завершить</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const login = localStorage.getItem('karmabank_login') || 'anonymous';
  let dynamicAiPrompt = '';
  let dynamicMessages = [];

  function createStars() { const container = document.getElementById('starsContainer'); for (let i=0; i<80; i++) { const star = document.createElement('div'); star.className='star'; star.style.width = (Math.random()*3+1)+'px'; star.style.height = (Math.random()*3+1)+'px'; star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%'; star.style.animationDelay = Math.random()*3+'s'; container.appendChild(star); } }
  createStars();
  function showLoading() { const overlay = document.createElement('div'); overlay.className='loading-overlay'; overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>'; document.body.appendChild(overlay); }
  function hideLoading() { const o=document.querySelector('.loading-overlay'); if(o)o.remove(); }
  function showToast(message, success=true) {
    const toast = document.createElement('div'); toast.className='toast';
    toast.textContent = (success ? '✅ ' : '❌ ') + message;
    document.body.appendChild(toast);
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 3000);
  }
  function showConfirm(message, onYes) {
    const modal = document.createElement('div'); modal.className='modal active';
    modal.innerHTML = `<div class="modal-content" style="text-align:center;"><p>${message}</p><div class="modal-buttons" style="justify-content:center; margin-top:16px;"><button class="btn cancel" onclick="this.closest('.modal').remove()">Отмена</button><button class="btn" onclick="this.closest('.modal').remove(); onYes();">Да</button></div></div>`;
    document.body.appendChild(modal);
  }

  async function loadLmsModules() {
    try {
      const res = await fetch(`${API_URL}?action=getLmsModules`);
      const modules = await res.json();
      const staticModules = [
        { title: 'AI-Тренажёр', desc: 'Практика переговоров и продаж с искусственным интеллектом', action: 'trainer' },
        { title: 'Кармический миллионер', desc: 'Викторина по продажам с персональными вопросами', action: 'quiz' }
      ];
      const all = [...staticModules, ...modules.map(m => ({ ...m, action: 'dynamic', dynamic: true }))];
      const grid = document.getElementById('lmsModulesGrid');
      grid.innerHTML = all.map(mod => `
        <div class="lms-card" onclick="${mod.dynamic ? `openDynamicModule('${mod.title.replace(/'/g, "\\'")}', '${(mod.description || '').replace(/'/g, "\\'")}', '${(mod.aiPrompt || '').replace(/'/g, "\\'")}')` : `openModule('${mod.action}')`}">
          ${mod.dynamic ? `<button class="delete-module-btn" onclick="event.stopPropagation(); showConfirm('Удалить модуль «${mod.title}»?', () => deleteModule('${mod.title.replace(/'/g, "\\'")}'))">✕</button>` : ''}
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <div class="title">${mod.title}</div>
          <div class="desc">${mod.desc || mod.description || ''}</div>
        </div>
      `).join('');
    } catch(e) { console.error(e); }
  }
  loadLmsModules();

  function openModule(name) {
    document.getElementById('lmsMenu').classList.add('hidden');
    document.getElementById('moduleTrainer').classList.add('hidden');
    document.getElementById('moduleQuiz').classList.add('hidden');
    document.getElementById('moduleDynamic').classList.add('hidden');
    if (name === 'menu') document.getElementById('lmsMenu').classList.remove('hidden');
    else if (name === 'trainer') document.getElementById('moduleTrainer').classList.remove('hidden');
    else if (name === 'quiz') document.getElementById('moduleQuiz').classList.remove('hidden');
  }

  function openDynamicModule(title, description, aiPrompt) {
    document.getElementById('lmsMenu').classList.add('hidden');
    document.getElementById('moduleDynamic').classList.remove('hidden');
    document.getElementById('dynamicModuleTitle').textContent = title;
    document.getElementById('dynamicModuleDescription').textContent = description;
    dynamicAiPrompt = aiPrompt;
    dynamicMessages = [];
    document.getElementById('dynamicChatBox').innerHTML = '';
    addDynamicMessage('bot', 'Привет! Я AI-тренер этого модуля. Готов начать?');
  }
  function addDynamicMessage(role, text) {
    dynamicMessages.push({role, text});
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    document.getElementById('dynamicChatBox').appendChild(div);
  }
  async function sendDynamicMessage() {
    const input = document.getElementById('dynamicUserInput');
    const text = input.value.trim();
    if (!text) return;
    addDynamicMessage('user', text);
    input.value = '';
    try {
      const res = await fetch(`${API_URL}?action=simulatorChat`, {
        method: 'POST',
        body: new URLSearchParams({ mode: 'continue', scenario: 'custom', level: '3', message: text, history: JSON.stringify(dynamicMessages), login, customSystemPrompt: dynamicAiPrompt })
      });
      const data = await res.json();
      if (data.message) addDynamicMessage('bot', data.message);
      else addDynamicMessage('bot', 'Хороший вопрос! Дай мне ещё немного информации.');
    } catch(e) { addDynamicMessage('bot', 'Произошла заминка. Попробуем ещё раз?'); }
  }
  function endDynamicSession() {
    openModule('menu');
  }
  async function deleteModule(title) {
    try {
      await fetch(`${API_URL}?action=deleteLmsModule&managerLogin=${login}&title=${encodeURIComponent(title)}`);
      loadLmsModules();
      showToast('Модуль удалён');
    } catch(e) { showToast('Ошибка удаления', false); }
  }

  // Базовый тренажёр
  let currentScenario = 'sales_manager';
  let currentLevel = '3';
  let trainerMessages = [];
  document.querySelectorAll('#scenarioSelector .scenario-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#scenarioSelector .scenario-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentScenario = btn.dataset.scenario;
    });
  });
  document.getElementById('levelSelect').addEventListener('change', (e) => { currentLevel = e.target.value; });
  async function startTraining() {
    document.getElementById('trainerSetup').classList.add('hidden');
    document.getElementById('trainerChat').classList.remove('hidden');
    trainerMessages = [];
    document.getElementById('chatBox').innerHTML = '';
    showLoading();
    try {
      const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: new URLSearchParams({ mode: 'start', scenario: currentScenario, level: currentLevel, login }) });
      const data = await res.json();
      hideLoading();
      if (data.message) addTrainerMessage('bot', data.message);
      else addTrainerMessage('bot', 'Привет! Я готов к тренировке.');
    } catch(e) { hideLoading(); addTrainerMessage('bot', 'Ошибка соединения.'); }
  }
  function addTrainerMessage(role, text) { trainerMessages.push({role, text}); const div = document.createElement('div'); div.className = `message ${role}`; div.textContent = text; document.getElementById('chatBox').appendChild(div); }
  async function sendMessage() {
    const input = document.getElementById('userInput'); const text = input.value.trim(); if (!text) return;
    addTrainerMessage('user', text); input.value = '';
    const formData = new URLSearchParams({ mode: 'continue', scenario: currentScenario, level: currentLevel, message: text, history: JSON.stringify(trainerMessages), login });
    showLoading();
    try {
      const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: formData });
      const data = await res.json();
      hideLoading();
      if (data.message) addTrainerMessage('bot', data.message);
      else addTrainerMessage('bot', 'Уточни, пожалуйста, что ты имеешь в виду?');
    } catch(e) { hideLoading(); addTrainerMessage('bot', 'Ошибка.'); }
  }
  function confirmEvaluate() {
    showConfirm('Завершить тренировку и получить оценку?', evaluateSession);
  }
  async function evaluateSession() {
    const formData = new URLSearchParams({ mode: 'evaluate', scenario: currentScenario, level: currentLevel, history: JSON.stringify(trainerMessages), login });
    showLoading();
    try {
      const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: formData });
      const data = await res.json();
      hideLoading();
      showToast(data.feedback || 'Оценка завершена.');
      document.getElementById('trainerSetup').classList.remove('hidden');
      document.getElementById('trainerChat').classList.add('hidden');
      trainerMessages = [];
      document.getElementById('chatBox').innerHTML = '';
    } catch(e) { hideLoading(); showToast('Ошибка оценки.', false); }
  }
  document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
