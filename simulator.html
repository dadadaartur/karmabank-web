<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI-Симулятор — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --border: #1f3350;
      --success: #10b981;
    }
    body {
      font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); margin: 0; display: flex; flex-direction: column; height: 100vh;
    }
    .header {
      background: rgba(21,38,56,0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--border); }
    .scenario-selector { padding: 20px; text-align: center; }
    .scenario-btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
      padding: 10px 20px; border-radius: 14px; margin: 5px; cursor: pointer;
      font-weight: 600; transition: all 0.2s;
    }
    .scenario-btn:hover, .scenario-btn.active { border-color: var(--accent); background: var(--accent); }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; }
    .user-msg { align-self: flex-end; background: var(--accent); color: white; }
    .bot-msg { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .input-area { display: flex; padding: 12px; background: var(--bg-card); border-top: 1px solid var(--border); }
    .input-area input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #0f1f35; color: var(--text-primary); }
    .input-area button { margin-left: 8px; padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
    .evaluate-btn { background: var(--success); }
    .result-panel {
      background: var(--bg-card); border-top: 1px solid var(--accent); padding: 16px;
      text-align: center; display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🏋️ AI-Симулятор</h2>
    <a class="back-btn" href="/">← Назад</a>
  </div>
  <div class="scenario-selector" id="scenarioSelector">
    <button class="scenario-btn active" data-scenario="sales">Продавец</button>
    <button class="scenario-btn" data-scenario="hr">HR-менеджер</button>
    <button class="scenario-btn" data-scenario="manager">Руководитель</button>
  </div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ваше сообщение...">
    <button onclick="sendMessage()">➤</button>
    <button class="evaluate-btn" onclick="evaluateSession()">Завершить и получить оценку</button>
  </div>
  <div class="result-panel" id="resultPanel"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const login = localStorage.getItem('karmabank_login') || 'anonymous';
    let currentScenario = 'sales';
    let messages = []; // история диалога

    // Выбор сценария
    document.querySelectorAll('.scenario-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentScenario = btn.dataset.scenario;
        resetChat();
      });
    });

    function resetChat() {
      messages = [];
      document.getElementById('chatBox').innerHTML = '';
      document.getElementById('resultPanel').style.display = 'none';
      startScenario();
    }

    async function startScenario() {
      const res = await fetch(`${API_URL}?action=simulatorChat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `mode=start&scenario=${currentScenario}&login=${encodeURIComponent(login)}`
      });
      const data = await res.json();
      if (data.message) addMessage('bot', data.message);
    }

    function addMessage(role, text) {
      messages.push({ role, text });
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
      div.textContent = text;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage('user', text);
      input.value = '';

      const res = await fetch(`${API_URL}?action=simulatorChat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `mode=continue&scenario=${currentScenario}&login=${encodeURIComponent(login)}&message=${encodeURIComponent(text)}&history=${encodeURIComponent(JSON.stringify(messages))}`
      });
      const data = await res.json();
      if (data.message) addMessage('bot', data.message);
    }

    async function evaluateSession() {
      const res = await fetch(`${API_URL}?action=simulatorChat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `mode=evaluate&scenario=${currentScenario}&login=${encodeURIComponent(login)}&history=${encodeURIComponent(JSON.stringify(messages))}`
      });
      const data = await res.json();
      const panel = document.getElementById('resultPanel');
      panel.style.display = 'block';
      if (data.error) {
        panel.innerHTML = `<p style="color:red">${data.error}</p>`;
        return;
      }
      panel.innerHTML = `
        <h3>Оценка</h3>
        <p>${data.feedback}</p>
        <p>Навыки: ${data.scores ? Object.entries(data.scores).map(([k,v]) => `${k}: ${v}`).join(', ') : ''}</p>
        <p>Записано в ЦПС ✅</p>
      `;
    }

    startScenario();
  </script>
</body>
</html>
