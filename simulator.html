<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Путь к совершенству — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --success: #10b981;
      --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      margin: 0; display: flex; flex-direction: column; height: 100vh;
      overflow: hidden;
    }
    .header {
      background: rgba(21,38,56,0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h2 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header h2 svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; }
    .back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .setup-panel {
      padding: 30px 20px; text-align: center; flex-shrink: 0;
    }
    .scenario-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .scenario-btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary);
      padding: 10px 20px; border-radius: 14px; cursor: pointer; font-weight: 600;
      transition: all 0.2s;
    }
    .scenario-btn:hover, .scenario-btn.active { border-color: var(--accent); background: var(--accent); }
    .level-selector { margin-bottom: 30px; }
    .level-selector select {
      padding: 8px 16px; border-radius: 10px; background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); font-size: 1rem;
    }
    .start-btn {
      background: linear-gradient(135deg, #f97316, #c084fc);
      border: none; color: white; padding: 14px 40px; border-radius: 30px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(249,115,22,0.4);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .start-btn svg { width: 18px; height: 18px; stroke: white; fill: none; }
    .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(249,115,22,0.7); }
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.4; }
    .user-msg { align-self: flex-end; background: var(--accent); color: white; }
    .bot-msg { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .input-area {
      display: flex; padding: 12px; background: var(--bg-card); border-top: 1px solid var(--border);
      align-items: center; gap: 8px;
    }
    .input-area input {
      flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem;
    }
    .input-area button {
      padding: 12px 20px; background: var(--accent); color: white; border: none;
      border-radius: 12px; cursor: pointer; font-weight: 600;
    }
    .evaluate-btn { background: var(--success); }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px;
      animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; }
    .arrow:nth-child(2) { animation-delay: 0.15s; }
    .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h2>
      <svg viewBox="0 0 24 24">
        <defs><linearGradient id="simIcon" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs>
        <polygon points="12,2 15,8 22,9 17,14 18,21 12,17 6,21 7,14 2,9 9,8" stroke="url(#simIcon)" fill="none"/>
      </svg>
      Путь к совершенству
    </h2>
    <a class="back-btn" href="/">← На главную</a>
  </div>

  <!-- Панель выбора (показывается до старта) -->
  <div class="setup-panel" id="setupPanel">
    <div class="scenario-selector" id="scenarioSelector">
      <button class="scenario-btn active" data-scenario="sales_manager">Руководитель отдела продаж</button>
      <button class="scenario-btn" data-scenario="sales">Менеджер по продажам</button>
    </div>
    <div class="level-selector">
      <select id="levelSelect">
        <option value="1">Уровень 1 — Искра</option>
        <option value="2">Уровень 2 — Луч</option>
        <option value="3" selected>Уровень 3 — Созвездие</option>
        <option value="4">Уровень 4 — Галактика</option>
        <option value="5">Уровень 5 — Вселенная</option>
        <option value="6">Уровень 6 — Абсолют</option>
      </select>
    </div>
    <button class="start-btn" onclick="startTraining()">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15 8 22 9 17 14 18 21 12 17 6 21 7 14 2 9 9 8"/></svg>
      Начать тренировку
    </button>
  </div>

  <!-- Чат (скрыт до начала) -->
  <div class="chat-container hidden" id="chatContainer">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ваше сообщение...">
      <button onclick="sendMessage()">➤</button>
      <button class="evaluate-btn" onclick="confirmEvaluate()">Завершить</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const login = localStorage.getItem('karmabank_login') || 'anonymous';
    let currentScenario = 'sales_manager';
    let currentLevel = '3';
    let messages = [];

    // Выбор сценария
    document.querySelectorAll('.scenario-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentScenario = btn.dataset.scenario;
      });
    });

    document.getElementById('levelSelect').addEventListener('change', (e) => {
      currentLevel = e.target.value;
    });

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    // Запуск тренировки
    async function startTraining() {
      document.getElementById('setupPanel').classList.add('hidden');
      document.getElementById('chatContainer').classList.remove('hidden');
      messages = [];
      document.getElementById('chatBox').innerHTML = '';

      showLoading();
      const formData = new URLSearchParams();
      formData.append('mode', 'start');
      formData.append('scenario', currentScenario);
      formData.append('level', currentLevel);
      formData.append('login', login);

      try {
        const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: formData });
        const data = await res.json();
        hideLoading();
        if (data.message) addMessage('bot', data.message);
      } catch (e) {
        hideLoading();
        addMessage('bot', 'Ошибка соединения.');
      }
    }

    function addMessage(role, text) {
      messages.push({ role, text });
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
      div.textContent = text;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage('user', text);
      input.value = '';

      const formData = new URLSearchParams();
      formData.append('mode', 'continue');
      formData.append('scenario', currentScenario);
      formData.append('level', currentLevel);
      formData.append('message', text);
      formData.append('history', JSON.stringify(messages));
      formData.append('login', login);

      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: formData });
        const data = await res.json();
        hideLoading();
        if (data.message) addMessage('bot', data.message);
      } catch (e) {
        hideLoading();
        addMessage('bot', 'Ошибка соединения.');
      }
    }

    function confirmEvaluate() {
      if (confirm('Завершить тренировку и получить оценку?')) evaluateSession();
    }

    async function evaluateSession() {
      const formData = new URLSearchParams();
      formData.append('mode', 'evaluate');
      formData.append('scenario', currentScenario);
      formData.append('level', currentLevel);
      formData.append('history', JSON.stringify(messages));
      formData.append('login', login);

      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=simulatorChat`, { method: 'POST', body: formData });
        const data = await res.json();
        hideLoading();
        // Показываем результат в модальном окне
        const modal = document.createElement('div');
        modal.className = 'loading-overlay';
        modal.style.zIndex = '10000';
        modal.innerHTML = `
          <div style="background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%); border: 1px solid var(--accent); border-radius: 24px; padding: 30px; max-width: 500px; width: 90%; text-align: center; color: white; box-shadow: 0 0 60px rgba(249,115,22,0.6);">
            <h3>Результат тренировки</h3>
            <p>${data.feedback || 'Оценка недоступна'}</p>
            ${data.scores ? `<p>Навыки: ${Object.entries(data.scores).map(([k,v]) => `${k}: ${v}`).join(', ')}</p>` : ''}
            <button style="margin-top:20px; background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 14px; cursor: pointer;" onclick="this.closest('.loading-overlay').remove(); resetSimulator();">Попробовать ещё раз</button>
            <button style="margin-top:10px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 10px 20px; border-radius: 14px; cursor: pointer;" onclick="this.closest('.loading-overlay').remove(); window.location.href='/';">Вернуться на главную</button>
          </div>
        `;
        document.body.appendChild(modal);
      } catch (e) {
        hideLoading();
        alert('Ошибка при оценке.');
      }
    }

    function resetSimulator() {
      document.getElementById('setupPanel').classList.remove('hidden');
      document.getElementById('chatContainer').classList.add('hidden');
      messages = [];
      document.getElementById('chatBox').innerHTML = '';
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
