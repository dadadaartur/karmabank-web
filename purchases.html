<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Мои покупки — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981;
      --danger: #ef4444; --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); padding: 20px; user-select: none;
    }
    .back-btn { color: var(--text-secondary); cursor: pointer; margin-bottom: 20px; display: inline-block; }
    .purchase-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
      margin-left: 6px;
    }
    .btn:hover { background: #ea580c; }
    .btn.use { background: var(--success); }
    .btn.use:hover { background: #059669; }
    .btn.refund { background: var(--danger); }
    .btn.refund:hover { background: #dc2626; }
    .status-used {
      color: var(--success); font-size: 0.8rem; font-weight: 600;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent);
      border-radius: 24px; padding: 30px; max-width: 400px; width: 90%;
      text-align: center; box-shadow: 0 0 50px rgba(249,115,22,0.6);
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .confirm-btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; margin: 10px;
    }
    .modal input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-primary); color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="back-btn" onclick="window.location.href='/'">← Назад</div>
  <h2>🛍 Мои покупки</h2>
  <div id="purchasesList">Загрузка...</div>

  <!-- Модальное окно подтверждения возврата -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <p id="confirmText"></p>
      <button class="confirm-btn" id="confirmYesBtn">Да</button>
      <button class="modal-close-btn" onclick="closeConfirmModal()">Отмена</button>
    </div>
  </div>

  <!-- Модальное окно использования сертификата -->
  <div id="useModal" class="modal">
    <div class="modal-content">
      <h3>Использовать сертификат</h3>
      <p id="useModalReward"></p>
      <input type="text" id="useComment" placeholder="Комментарий для руководителя">
      <button class="confirm-btn" id="useYesBtn">Отправить</button>
      <button class="modal-close-btn" onclick="closeUseModal()">Отмена</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let pendingCertId = null, pendingAction = null;

    function showModal(html) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">${html}<button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }

    async function loadPurchases() {
      const login = localStorage.getItem('karmabank_login');
      const res = await fetch(`${API_URL}?action=getPurchases&login=${encodeURIComponent(login)}`);
      const purchases = await res.json();
      const container = document.getElementById('purchasesList');
      if (!purchases || purchases.length === 0) {
        container.innerHTML = '<p>У вас пока нет покупок.</p>';
        return;
      }
      container.innerHTML = purchases.map(p => {
        let statusHtml = '';
        if (!p.canUse && !p.canRefund) {
          statusHtml = '<div class="status-used">✅ Использован<br>' + p.usedDate + '</div>';
        }
        return `
          <div class="purchase-card">
            <div>
              <strong>${p.rewardName}</strong>
              <div style="color:var(--text-secondary); font-size:0.85rem;">${p.date} — ${p.cost} карм.</div>
              ${statusHtml}
            </div>
            <div>
              ${p.canUse ? `<button class="btn use" onclick="openUseModal('${p.id}', '${p.rewardName}')">Использовать</button>` : ''}
              ${p.canRefund ? `<button class="btn refund" onclick="openRefundModal('${p.id}', '${p.rewardName}', ${p.cost})">Вернуть</button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function openRefundModal(certId, rewardName, cost) {
      pendingCertId = certId;
      pendingAction = 'refund';
      document.getElementById('confirmText').textContent = `Вернуть "${rewardName}" и получить ${cost} кармиков?`;
      document.getElementById('confirmModal').classList.add('active');
    }

    function openUseModal(certId, rewardName) {
      pendingCertId = certId;
      pendingAction = 'use';
      document.getElementById('useModalReward').textContent = rewardName;
      document.getElementById('useComment').value = '';
      document.getElementById('useModal').classList.add('active');
    }

    function closeConfirmModal() { document.getElementById('confirmModal').classList.remove('active'); }
    function closeUseModal() { document.getElementById('useModal').classList.remove('active'); }

    async function executeAction() {
      const login = localStorage.getItem('karmabank_login');
      let res;
      if (pendingAction === 'refund') {
        res = await fetch(`${API_URL}?action=refundPurchase&login=${encodeURIComponent(login)}&certId=${encodeURIComponent(pendingCertId)}`);
      } else if (pendingAction === 'use') {
        const comment = document.getElementById('useComment').value.trim();
        res = await fetch(`${API_URL}?action=useCertificate&login=${encodeURIComponent(login)}&certId=${encodeURIComponent(pendingCertId)}&comment=${encodeURIComponent(comment)}`);
      }
      closeConfirmModal();
      closeUseModal();
      if (res) {
        const result = await res.json();
        if (result.success) {
          showModal('✅ Сертификат использован!');
          loadPurchases();
        } else {
          showModal('😢 ' + result.message);
        }
      }
    }

    document.getElementById('confirmYesBtn').onclick = executeAction;
    document.getElementById('useYesBtn').onclick = executeAction;
    loadPurchases();
  </script>
</body>
</html>
