<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Магазин — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --border: #1f3350; --success: #10b981;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); padding: 20px; min-height: 100vh;
      user-select: none;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-bottom: 20px;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: all 0.3s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 25px rgba(249,115,22,0.2); }
    .card svg { width: 48px; height: 48px; stroke: var(--accent); }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; cursor: pointer; font-weight: 600;
      transition: all 0.2s; margin-top: auto;
    }
    .btn:hover { background: #ea580c; box-shadow: 0 0 15px rgba(249,115,22,0.5); }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: #ef4444; border-color: #ef4444; color: white; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-sphere {
      width: 80px; height: 80px;
      background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0);
      border-radius: 50%;
      animation: spinStar 2s linear infinite, colorShift 3s infinite;
      box-shadow: 0 0 40px #ff9f00, 0 0 80px #ff6600, 0 0 120px #ffd700;
    }
    @keyframes spinStar { 100% { transform: rotate(360deg); } }
    @keyframes colorShift {
      0% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); }
      50% { background: radial-gradient(circle at 70% 70%, #ffcc00, #e65c00, #e0e0e0); }
      100% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/">← Назад</a>
  <h2>🛒 Магазин</h2>
  <div class="grid" id="rewardGrid">Загрузка...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-sphere"></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    async function loadRewards() {
      const res = await fetch(`${API_URL}?action=getRewards`);
      const rewards = await res.json();
      const grid = document.getElementById('rewardGrid');
      grid.innerHTML = rewards.map(r => `
        <div class="card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <defs><linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs>
            <polygon points="12,2 15,8 22,9 17,14 18,21 12,17 6,21 7,14 2,9 9,8" stroke="url(#starGrad)"/>
          </svg>
          <div style="font-weight:600;">${r.name}</div>
          <div style="color:var(--accent); font-weight:700;">${r.cost} карм.</div>
          <button class="btn" onclick="confirmBuy('${r.name}', ${r.cost})">Купить</button>
        </div>
      `).join('');
    }

    function confirmBuy(name, cost) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <p>Подтверждаете покупку «${name}» за ${cost} кармиков?</p>
        <button class="btn" id="yesBtn">Да</button>
        <button class="modal-close-btn" id="noBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('yesBtn').onclick = async () => {
        modal.remove();
        showLoading();
        const res = await fetch(`${API_URL}?action=buyReward&reward=${encodeURIComponent(name)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}`);
        const result = await res.json();
        hideLoading();
        if (result.success) {
          showCertificate(result.certificate);
          loadRewards();
        } else {
          showMessage(result.message);
        }
      };
      document.getElementById('noBtn').onclick = () => modal.remove();
    }

    function showCertificate(cert) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h2>🎉 Сертификат</h2>
        <p><b>${cert.userName}</b> приобрёл право на <b>${cert.rewardName}</b></p>
        <p>Стоимость: ${cert.cost} кармиков</p>
        <p>Дата: ${cert.date}</p>
        <p>Действителен до: ${cert.validUntil}</p>
        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
      </div>`;
      document.body.appendChild(modal);
    }

    function showMessage(msg) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><p>${msg}</p><button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }

    loadRewards();
  </script>
</body>
</html>
