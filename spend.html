<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Магазин — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --border: #1f3350;
      --success: #10b981; --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary); padding: 20px; min-height: 100vh;
      user-select: none; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle 2s infinite alternate; opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-bottom: 20px; position: relative; z-index: 2;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    h2 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; margin-bottom: 24px; position: relative; z-index: 2;
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px; position: relative; z-index: 2;
    }
    .card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 24px 20px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: all 0.3s; backdrop-filter: blur(5px);
      position: relative; z-index: 2;
    }
    .card:hover {
      border-color: var(--accent); transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(249,115,22,0.3);
    }
    .card .icon-placeholder {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      opacity: 0.9;
    }
    .btn {
      background: transparent; border: 1px solid var(--accent); border-radius: 40px;
      padding: 8px 24px; font-weight: 800; font-size: 0.85rem; cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; margin-top: auto;
    }
    .btn:hover { border-color: #c084fc; box-shadow: 0 0 18px rgba(249,115,22,0.6); transform: scale(1.03); }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6); animation: modalPop 0.4s ease;
    }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: #ef4444; border-color: #ef4444; color: white; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg); box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
    }
    .card:nth-child(1) { animation-delay: 0.05s; } .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; } .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; } .card:nth-child(6) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>
  <a class="back-btn" href="/">← Назад</a>
  <h2>Магазин</h2>
  <div class="grid" id="rewardGrid">Загрузка...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';

    // Генерация звёзд на фоне
    function createStars() {
      const container = document.getElementById('starsContainer');
      const count = 80;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const delay = Math.random() * 3;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = x + '%';
        star.style.top = y + '%';
        star.style.animationDelay = delay + 's';
        container.appendChild(star);
      }
    }
    createStars();

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    async function loadRewards() {
      showLoading();
      const res = await fetch(`${API_URL}?action=getRewards`);
      const rewards = await res.json();
      hideLoading();
      const grid = document.getElementById('rewardGrid');
      grid.innerHTML = rewards.map((r, idx) => {
        const colors = ['#f97316','#c084fc','#38bdf8','#f59e0b','#34d399'];
        const c = colors[idx % colors.length];
        return `
        <div class="card" style="border-color: ${c};">
          <div style="font-weight:600; font-size:1.1rem;">${r.name}</div>
          <div style="color:var(--accent); font-weight:700;">${r.cost} карм.</div>
          <button class="btn" onclick="confirmBuy('${r.name}', ${r.cost})">Купить</button>
        </div>
        `;
      }).join('');
    }

    function confirmBuy(name, cost) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <p>Подтверждаете покупку «${name}» за ${cost} кармиков?</p>
        <button class="btn" id="yesBtn">Да</button>
        <button class="modal-close-btn" id="noBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('yesBtn').onclick = async () => {
        modal.remove();
        showLoading();
        const res = await fetch(`${API_URL}?action=buyReward&reward=${encodeURIComponent(name)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}`);
        const result = await res.json();
        hideLoading();
        if (result.success) {
          showCertificate(result.certificate);
          loadRewards();
        } else {
          showMessage(result.message);
        }
      };
      document.getElementById('noBtn').onclick = () => modal.remove();
    }

    function showCertificate(cert) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h2>🎉 Сертификат</h2>
        <p><b>${cert.userName}</b> приобрёл право на <b>${cert.rewardName}</b></p>
        <p>Стоимость: ${cert.cost} кармиков</p>
        <p>Дата: ${cert.date}</p>
        <p>Действителен до: ${cert.validUntil}</p>
        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
      </div>`;
      document.body.appendChild(modal);
    }

    function showMessage(msg) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><p>${msg}</p><button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }

    loadRewards();
  </script>
</body>
</html>
