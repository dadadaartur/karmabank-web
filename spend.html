<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Потратить — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --border: #1f3350; --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); padding: 20px; user-select: none;
    }
    .back-btn { color: var(--text-secondary); cursor: pointer; margin-bottom: 20px; display: inline-block; }
    .reward-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .reward-info { display: flex; flex-direction: column; }
    .reward-cost { font-weight: bold; color: var(--accent); }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600;
      min-width: 80px; text-align: center;
    }
    .btn:hover { background: #ea580c; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .confirm-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 14px; cursor: pointer; margin: 10px; }
  </style>
</head>
<body>
  <div class="back-btn" onclick="window.location.href='/'">← Назад</div>
  <h2>🎁 Витрина наград</h2>
  <div id="rewardsList">Загрузка...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    async function loadRewards() {
      const res = await fetch(`${API_URL}?action=getRewards`);
      const rewards = await res.json();
      const container = document.getElementById('rewardsList');
      container.innerHTML = rewards.map(r => `
        <div class="reward-card">
          <div class="reward-info">
            <span>${r.name}</span>
            <span class="reward-cost">${r.cost} карм.</span>
          </div>
          <button class="btn" onclick="confirmBuy('${r.name}', ${r.cost})">Купить</button>
        </div>
      `).join('');
    }
    function confirmBuy(rewardName, cost) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <p>Подтверждаете покупку "${rewardName}" за ${cost} кармиков?</p>
        <button class="confirm-btn" id="yesBtn">Да</button>
        <button class="modal-close-btn" id="noBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('yesBtn').onclick = async () => {
        modal.remove();
        const res = await fetch(`${API_URL}?action=buyReward&reward=${encodeURIComponent(rewardName)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}`);
        const result = await res.json();
        if (result.success) {
          showCertificate(result.certificate);
          loadRewards();
        } else {
          showMessage(result.message);
        }
      };
      document.getElementById('noBtn').onclick = () => modal.remove();
    }
    function showCertificate(cert) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h2>🎉 Сертификат</h2>
        <p><b>${cert.userName}</b> приобрёл(а) право на <b>${cert.rewardName}</b></p>
        <p>Стоимость: ${cert.cost} кармиков</p>
        <p>Дата: ${cert.date}</p>
        <p>Действителен до: ${cert.validUntil}</p>
        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
      </div>`;
      document.body.appendChild(modal);
    }
    function showMessage(msg) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><p>${msg}</p><button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }
    loadRewards();
  </script>
</body>
</html>
