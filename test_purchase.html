<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест покупок</title>
  <style>
    body { background: #0a1628; color: #eaf0fb; font-family: sans-serif; padding: 20px; }
    h2 { background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .filter-bar { display: flex; gap: 10px; margin: 20px 0; }
    select { background: #152238; color: white; border: 1px solid #f97316; padding: 8px; border-radius: 8px; }
    .purchase-card { background: #152238; border: 1px solid #f97316; border-radius: 8px; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>Мои покупки</h2>
  <div class="filter-bar">
    <select id="monthSelect"><option value="1">Январь</option><option value="5">Май</option></select>
    <select id="yearSelect"><option value="2025">2025</option></select>
    <button onclick="loadTest()">Показать</button>
  </div>
  <div id="result"></div>
  <script>
    window.onload = function() {
      document.getElementById('result').innerHTML = '<div class="purchase-card">✅ Тестовая карточка</div>';
    };
  </script>
</body>
</html>
