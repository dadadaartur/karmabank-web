<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>История операций — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --success: #10b981;
      --danger: #ef4444;
      --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      user-select: none;
      position: relative;
      overflow-x: hidden;
    }
    /* Звёздный фон */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
      opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-bottom: 20px; position: relative; z-index: 2;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    h2 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .history-list {
      display: flex; flex-direction: column; gap: 12px;
      position: relative; z-index: 2;
    }
    .history-item {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
    }
    .history-item:nth-child(1) { animation-delay: 0.05s; }
    .history-item:nth-child(2) { animation-delay: 0.1s; }
    .history-item:nth-child(3) { animation-delay: 0.15s; }
    .history-item:nth-child(4) { animation-delay: 0.2s; }
    .history-item:nth-child(5) { animation-delay: 0.25s; }
    .history-item:nth-child(6) { animation-delay: 0.3s; }
    .history-item:nth-child(7) { animation-delay: 0.35s; }
    .history-item:nth-child(8) { animation-delay: 0.4s; }
    .history-item:nth-child(9) { animation-delay: 0.45s; }
    .history-item:nth-child(10) { animation-delay: 0.5s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .history-item:hover {
      border-color: var(--accent);
      box-shadow: 0 5px 15px rgba(249,115,22,0.2);
      transform: translateY(-2px);
    }
    .history-left {
      display: flex; flex-direction: column; gap: 4px;
    }
    .history-amount {
      font-weight: 700; font-size: 1.1rem;
    }
    .history-amount.income { color: var(--success); }
    .history-amount.expense { color: var(--danger); }
    .history-amount.transfer { color: var(--accent); }
    .history-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .history-date {
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-align: right;
    }
    .empty-message {
      text-align: center; color: var(--text-secondary); padding: 40px; font-size: 1.1rem;
    }
    /* Загрузка */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px;
      animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; }
    .arrow:nth-child(2) { animation-delay: 0.15s; }
    .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>
  <a class="back-btn" href="/">← Назад</a>
  <h2>История операций</h2>
  <div class="history-list" id="historyList"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    function createStars() {
      const container = document.getElementById('starsContainer');
      const colors = ['#ffffff', '#e0f0ff', '#fbbf24', '#c084fc'];
      for (let i = 0; i < 70; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.background = colors[Math.floor(Math.random() * colors.length)];
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }
    createStars();

    async function loadHistory() {
      const login = localStorage.getItem('karmabank_login');
      if (!login) {
        document.getElementById('historyList').innerHTML = '<div class="empty-message">Войдите в систему, чтобы увидеть историю.</div>';
        return;
      }

      showLoading();
      try {
        const [histRes, empRes] = await Promise.all([
          fetch(`${API_URL}?action=getHistory&login=${encodeURIComponent(login)}`),
          fetch(`${API_URL}?action=getAllEmployees`)
        ]);

        if (!histRes.ok || !empRes.ok) throw new Error('Сетевая ошибка');

        const historyData = await histRes.json();
        const employees = await empRes.json();

        if (!Array.isArray(historyData)) {
          document.getElementById('historyList').innerHTML = '<div class="empty-message">Некорректные данные от сервера.</div>';
          hideLoading();
          return;
        }

        hideLoading();

        const empMap = {};
        if (Array.isArray(employees)) {
          employees.forEach(e => { empMap[e.login] = e.name; });
        }

        const container = document.getElementById('historyList');
        if (historyData.length === 0) {
          container.innerHTML = '<div class="empty-message">Операций пока нет</div>';
          return;
        }

        container.innerHTML = historyData.map(h => {
          let typeClass = h.type === 'income' ? 'income' : 'expense';
          let prefix = h.type === 'income' ? '+' : '-';
          let description = h.comment || '';

          if (h.type === 'expense' && description.startsWith('Перевод пользователю ')) {
            const loginTarget = description.replace('Перевод пользователю ', '');
            const displayName = empMap[loginTarget] || loginTarget;
            description = `→ ${displayName}`;
            typeClass = 'transfer';
          } else if (h.type === 'income' && description.startsWith('Перевод от пользователя ')) {
            const loginSender = description.replace('Перевод от пользователя ', '');
            const displayName = empMap[loginSender] || loginSender;
            description = `← ${displayName}`;
            typeClass = 'transfer';
          }

          const dateStr = h.date || '';
          const timeStr = h.time || '';
          const dateTime = [dateStr, timeStr].filter(Boolean).join(' ');

          return `
            <div class="history-item">
              <div class="history-left">
                <span class="history-amount ${typeClass}">${prefix}${h.amount} кармиков</span>
                <span class="history-desc">${description}</span>
              </div>
              <div class="history-date">${dateTime}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        hideLoading();
        document.getElementById('historyList').innerHTML = `<div class="empty-message">Ошибка загрузки: ${e.message}</div>`;
        console.error(e);
      }
    }

    loadHistory();
  </script>
</body>
</html>
