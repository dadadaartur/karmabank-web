<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>История операций — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981;
      --danger: #ef4444; --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); padding: 20px; user-select: none;
    }
    .back-btn { color: var(--text-secondary); cursor: pointer; margin-bottom: 20px; display: inline-block; }
    .history-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .income { color: var(--success); }
    .expense { color: var(--danger); }
    .comment { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="back-btn" onclick="window.location.href='/'">← Назад</div>
  <h2>📋 История операций</h2>
  <div id="historyList">Загрузка...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    async function loadHistory() {
      const login = localStorage.getItem('karmabank_login');
      const res = await fetch(`${API_URL}?action=getHistory&login=${encodeURIComponent(login)}`);
      const history = await res.json();
      const container = document.getElementById('historyList');
      if (!history || history.length === 0) {
        container.innerHTML = '<p>Операций пока нет</p>';
        return;
      }
      container.innerHTML = history.map(h => `
        <div class="history-item">
          <div>
            <span class="${h.type === 'income' ? 'income' : 'expense'}">
              ${h.type === 'income' ? '+' : '-'}${h.amount} кармиков
            </span>
            <div class="comment">${h.comment || ''}</div>
          </div>
          <div>${h.date} ${h.time}</div>
        </div>
      `).join('');
    }
    loadHistory();
  </script>
</body>
</html>
