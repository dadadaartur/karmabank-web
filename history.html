<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>История операций — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981;
      --danger: #ef4444; --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); padding: 20px; user-select: none; min-height: 100vh;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; text-decoration: none; margin-bottom: 20px;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .history-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.2s;
    }
    .history-item:hover { border-color: var(--accent); box-shadow: 0 5px 15px rgba(249,115,22,0.2); }
    .income { color: var(--success); }
    .expense { color: var(--danger); }
    .transfer { color: var(--accent); }
    .comment { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }
    .loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5); z-index:9999;
      display:flex; align-items:center; justify-content:center;
    }
    .loading-arrows { display: flex; gap: 8px; }
    .arrow {
      width: 12px; height: 12px;
      background: var(--accent); border-radius: 2px;
      animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg);
    }
    .arrow:nth-child(1) { animation-delay: 0s; }
    .arrow:nth-child(2) { animation-delay: 0.2s; }
    .arrow:nth-child(3) { animation-delay: 0.4s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.3; transform: rotate(45deg) scale(0.8); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.2); }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/">← Назад</a>
  <h2>📋 История операций</h2>
  <div id="historyList">Загрузка...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    async function loadHistory() {
      const login = localStorage.getItem('karmabank_login');
      if (!login) return;
      showLoading();
      try {
        const [histRes, empRes] = await Promise.all([
          fetch(`${API_URL}?action=getHistory&login=${encodeURIComponent(login)}`),
          fetch(`${API_URL}?action=getAllEmployees`)
        ]);
        const history = await histRes.json();
        const employees = await empRes.json();
        hideLoading();

        const empMap = {};
        employees.forEach(e => empMap[e.login] = e.name);

        const container = document.getElementById('historyList');
        if (!history || history.length === 0) {
          container.innerHTML = '<p>Операций пока нет</p>';
          return;
        }

        container.innerHTML = history.map(h => {
          let typeClass = h.type === 'income' ? 'income' : 'expense';
          let prefix = h.type === 'income' ? '+' : '-';
          let description = h.comment || '';

          if (h.type === 'expense' && description.startsWith('Перевод пользователю ')) {
            const loginTarget = description.replace('Перевод пользователю ', '');
            const displayName = empMap[loginTarget] || loginTarget;
            description = `→ ${displayName}`;
            typeClass = 'transfer';
          } else if (h.type === 'income' && description.startsWith('Перевод от пользователя ')) {
            const loginSender = description.replace('Перевод от пользователя ', '');
            const displayName = empMap[loginSender] || loginSender;
            description = `← ${displayName}`;
            typeClass = 'transfer';
          }

          return `<div class="history-item">
            <div>
              <span class="${typeClass}">${prefix}${h.amount} кармиков</span>
              <div class="comment">${description}</div>
            </div>
            <div>${h.date} ${h.time}</div>
          </div>`;
        }).join('');
      } catch (e) {
        hideLoading();
        document.getElementById('historyList').innerHTML = '<p>Ошибка загрузки</p>';
      }
    }
    loadHistory();
  </script>
</body>
</html>
