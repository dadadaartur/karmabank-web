<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --accent-hover: #ea580c; --success: #10b981; --warning: #f59e0b;
      --danger: #ef4444; --border: #1f3350; --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --cosmic-glow: 0 0 25px rgba(99, 102, 241, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
      overflow-x: hidden; user-select: none; font-size: 16px;
    }
    input[type="text"], input[type="number"], textarea { user-select: text; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes karmaGlow { 0% { text-shadow: 0 0 10px #10b981; } 50% { text-shadow: 0 0 20px #34d399; } 100% { text-shadow: 0 0 10px #10b981; } }
    @keyframes pulse-glow { 0% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); } 50% { filter: drop-shadow(0 0 15px rgba(249,115,22,0.8)); } 100% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); } }
    @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes starPulse { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }

    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 30px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; animation: fadeInUp 0.6s ease; }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary); margin-bottom: 16px; outline: none; }
    .login-form input[type="text"]:focus { border-color: var(--accent); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00); color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header { background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 16px; }
    .user-name-link { font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .user-dept { color: #c084fc; font-weight: 500; font-size: 0.85rem; background: rgba(139, 92, 246, 0.1); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(139, 92, 246, 0.3); }
    .level-badge svg { width: 24px; height: 24px; filter: drop-shadow(0 0 6px #fbbf24); animation: starPulse 2s infinite; }
    .chat-btn { background: none; border: none; color: #10b981; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 6px; animation: karmaGlow 2s infinite; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container { max-width: 1300px; width: 100%; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 420px 1fr; gap: 32px; align-items: start; }

    .balance-card { background: var(--bg-card); border-radius: 24px; padding: 28px 20px; border: 1px solid var(--border); position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.4); overflow: hidden; text-align: center; }
    .balance-card::before { content: ''; position: absolute; inset: -50%; background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.1) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(16,185,129,0.08) 0%, transparent 40%); background-size: 200% 200%; animation: aurora 12s infinite; }
    .balance-card > * { position: relative; z-index: 1; }

    .karmiki-label { font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; background: linear-gradient(135deg, #fbbf24, #f97316, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; animation: karmaGlow 2s infinite; }
    .balance-value { font-size: 3.8rem; font-weight: 800; background: linear-gradient(135deg, #10b981, #34d399, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: karmaGlow 2.5s infinite; line-height: 1; margin-bottom: 16px; }
    .energy-bar { display: flex; align-items: center; gap: 8px; border: 1px solid var(--accent); border-radius: 20px; padding: 8px 16px; background: rgba(249,115,22,0.05); justify-content: center; margin-bottom: 24px; }
    .energy-bar span { color: var(--accent); font-weight: 600; }

    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .action-btn { background: var(--border); color: var(--text-primary); border: none; padding: 16px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; min-width: 90px; flex: 1; transition: all 0.3s; }
    .action-btn svg { width: 36px; height: 36px; stroke-width: 1.5; stroke: var(--text-secondary); transition: all 0.3s; }
    .action-btn:hover { background: var(--accent); transform: scale(1.05); box-shadow: var(--cosmic-glow); }
    .action-btn:hover svg { stroke: white; stroke-width: 2; animation: pulse-glow 1.5s infinite; }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .menu-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; }
    .menu-card svg { width: 40px; height: 40px; stroke-width: 1.5; stroke: var(--text-secondary); transition: all 0.3s; }
    .menu-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(249,115,22,0.2); }
    .menu-card:hover svg { stroke: var(--accent); animation: pulse-glow 1.5s infinite; }
    .menu-card.disabled { opacity: 0.5; pointer-events: none; }

    .tasks-panel h3 { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 1.2rem; margin-bottom: 14px; }
    .task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .task-card::before { content: ''; position: absolute; inset: -50%; background: radial-gradient(circle at 20% 30%, rgba(16,185,129,0.06) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 40%); background-size: 200% 200%; animation: aurora 10s infinite; z-index: 0; }
    .task-card > * { position: relative; z-index: 1; }
    .task-card:hover { border-color: var(--accent); }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background: var(--accent-hover); box-shadow: var(--cosmic-glow); }
    .btn.take-global { background: var(--success); }
    .btn.take-global:hover { background: #059669; }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .empty-tasks { color: var(--text-secondary); padding: 30px; text-align: center; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }

    .fab { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #f97316, #ea580c); border-radius: 24px; padding: 16px 20px; display: flex; align-items: center; gap: 10px; color: white; font-weight: 700; cursor: pointer; box-shadow: 0 10px 30px rgba(249,115,22,0.5); border: none; z-index: 1000; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: linear-gradient(135deg, #1a2940, #152238); border: 1px solid var(--accent); border-radius: 28px; padding: 36px; max-width: 440px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(249,115,22,0.6); animation: modalPop 0.4s; }
    .modal-close { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 12px 24px; border-radius: 24px; cursor: pointer; margin-top: 16px; }
    .modal-close:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .cosmic-spinner { width: 70px; height: 70px; animation: spin 2s linear infinite; filter: drop-shadow(0 0 20px #fbbf24); }

    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .balance-value { font-size: 2.8rem; } }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1 onclick="location.reload()">Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay" class="user-name-link" onclick="window.location.href='/profile.html'"></span>
        <div class="level-badge" id="levelBadge"></div>
        <span class="user-dept" id="userDept"></span>
        <button class="chat-btn" onclick="window.location.href='/chat.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Чат
        </button>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="left-column">
        <div class="balance-card">
          <div class="karmiki-label">Кармики</div>
          <div class="balance-value" id="userPoints">0</div>
          <div class="energy-bar"><span>⚡ <span id="energyDisplay">0</span> энергии</span></div>
          <div class="actions">
            <button class="action-btn" onclick="openTransferModal()">
              <svg viewBox="0 0 24 24"><path d="M8 3L4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>
              Перевести
            </button>
            <button class="action-btn" onclick="window.location.href='/spend.html'">
              <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2 13h13l3-8H6"/></svg>
              Магазин
            </button>
            <button class="action-btn" onclick="window.location.href='/history.html'">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18"/><path d="M8 3v18"/></svg>
              Операции
            </button>
          </div>
        </div>
        <div class="menu-grid">
          <div class="menu-card" onclick="window.location.href='/simulator.html'">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 4v2M12 18v2M4 12h2M18 12h2"/></svg>
            Тренировка
          </div>
          <div class="menu-card disabled">
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v12"/></svg>
            Обучение
          </div>
          <div class="menu-card" onclick="window.location.href='/purchases.html'">
            <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            Мои покупки
          </div>
          <div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'">
            <svg viewBox="0 0 24 24"><circle cx="8" cy="7" r="3"/><circle cx="18" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h2"/><path d="M21 21v-2a4 4 0 0 0-4-4h-2"/></svg>
            Команда
          </div>
        </div>
      </div>
      <div class="tasks-panel">
        <h3 onclick="window.location.href='/tasks.html'">✅ Мои задания</h3>
        <div id="inProgressTasks">Нет активных заданий</div>
      </div>
    </div>
    <button class="fab" onclick="window.location.href='/knowledge.html'">🌟 База знаний</button>
  </div>

  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2>Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <input type="text" id="transferComment" placeholder="Комментарий">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

  <!--   <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentEnergy = 0;

    // Суперпремиум иконки уровней (SVG)
    const LEVEL_SVGS = {
      'Искра': `<svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="url(#lg1)" stroke-width="1.5" fill="rgba(251,191,36,0.2)"/></svg>`,
      'Луч': `<svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient></defs><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="url(#lg2)" stroke-width="1.5" fill="rgba(56,189,248,0.1)"/><circle cx="12" cy="12" r="2" fill="url(#lg2)" opacity="0.5"/></svg>`,
      'Созвездие': `<svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient></defs><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="url(#lg3)" stroke-width="1.5" fill="rgba(192,132,252,0.1)"/><polygon points="8 6 10 10 14 11 10 12 8 16 6 12 2 11 6 10" stroke="url(#lg3)" stroke-width="1"/></svg>`,
      'Галактика': `<svg viewBox="0 0 24 24" fill="none"><defs><radialGradient id="rg1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#1e3a8a"/></radialGradient></defs><circle cx="12" cy="12" r="8" fill="url(#rg1)" opacity="0.3"/><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="#c084fc" stroke-width="1.5" fill="none"/></svg>`,
      'Вселенная': `<svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="lg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="50%" stop-color="#c084fc"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="url(#lg4)" stroke-width="1.5" fill="rgba(251,191,36,0.05)"/><polygon points="12 4 14 9 19 10 15 13 16 18 12 15 8 18 9 13 5 10 10 9" stroke="url(#lg4)" stroke-width="1" fill="none"/></svg>`,
      'Абсолют': `<svg viewBox="0 0 24 24" fill="none"><defs><radialGradient id="rg2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="40%" stop-color="#f97316"/><stop offset="100%" stop-color="#c084fc"/></radialGradient></defs><circle cx="12" cy="12" r="10" fill="url(#rg2)" opacity="0.15"/><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="#fbbf24" stroke-width="2" fill="none"/><polygon points="12 5 13.5 9 17 10 13.5 11 12 15 10.5 11 7 10 10.5 9" stroke="#fbbf24" stroke-width="1" fill="none"/></svg>`
    };

    const LEVEL_THRESHOLDS = [
      { name: 'Искра', energy: 0 },
      { name: 'Луч', energy: 100 },
      { name: 'Созвездие', energy: 500 },
      { name: 'Галактика', energy: 2000 },
      { name: 'Вселенная', energy: 10000 },
      { name: 'Абсолют', energy: 50000 }
    ];

    function getLevelSVG(energy) {
      let level = LEVEL_THRESHOLDS[0];
      for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
        if (energy >= LEVEL_THRESHOLDS[i].energy) { level = LEVEL_THRESHOLDS[i]; break; }
      }
      return LEVEL_SVGS[level.name] || LEVEL_SVGS['Искра'];
    }

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `<svg class="cosmic-spinner" viewBox="0 0 70 70"><defs><radialGradient id="sunGrad"><stop offset="0%" stop-color="#fbbf24"/><stop offset="30%" stop-color="#f97316"/><stop offset="70%" stop-color="#c084fc"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0.8"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><circle cx="35" cy="35" r="25" fill="url(#sunGrad)" filter="url(#glow)"/><g stroke="white" stroke-width="2"><line x1="35" y1="5" x2="35" y2="12"/><line x1="35" y1="58" x2="35" y2="65"/><line x1="5" y1="35" x2="12" y2="35"/><line x1="58" y1="35" x2="65" y2="35"/></g><polygon points="35,10 38,18 46,18 39,23 41,31 35,27 29,31 31,23 24,18 32,18" fill="white" opacity="0.9"/></svg><p>Загрузка...</p>`;
      document.body.appendChild(overlay);
    }
    function hideLoading() { const el = document.getElementById('loadingOverlay'); if (el) el.remove(); }

    function showAlert(msg, type) {
      const icons = { success:'✅', error:'❌', info:'🌟' };
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><div style="font-size:2.5rem">${icons[type]||icons.info}</div><p>${msg}</p><button class="modal-close" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(user => {
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login; currentEnergy = user.energy || 0;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = user.points || 0;
            document.getElementById('energyDisplay').textContent = currentEnergy;
            document.getElementById('levelBadge').innerHTML = getLevelSVG(currentEnergy);
            fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(login)}`).then(r=>r.json()).then(is=>{ document.getElementById('teamCard').style.display=is?'block':'none'; });
            loadTasks();
            hideLoading();
          } else { hideLoading(); document.getElementById('loginError').textContent = 'Пользователь не найден'; }
        }).catch(() => { hideLoading(); document.getElementById('loginError').textContent = 'Ошибка'; });
    }

    function logout() {
      localStorage.removeItem('karmabank_login');
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
    }

    async function loadTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const tasks = await res.json();
      const container = document.getElementById('inProgressTasks');
      if (!tasks.length) { container.innerHTML = '<div class="empty-tasks">Нет активных заданий</div>'; return; }
      container.innerHTML = tasks.slice(0,5).map(t => {
        let btn = '';
        if (t.isGlobal) btn = `<button class="btn take-global" onclick="event.stopPropagation();takeTask(event,'${t.task}')">Взять</button>`;
        else if (t.status === 'Назначено') btn = `<button class="btn" onclick="event.stopPropagation();takeTask(event,'${t.task}')">Взять</button>`;
        else if (t.status === 'В работе') btn = `<button class="btn" onclick="event.stopPropagation();completeTaskPrompt('${t.task}')">Выполнить</button>`;
        else if (t.status === 'На проверке') btn = `<span class="status-active">На проверке</span>`;
        else if (t.status === 'Выполнено') btn = `<span class="status-active">Выполнено</span>`;
        return `<div class="task-card"><span>${t.task} (${t.points} карм.) ${t.isGlobal?'<span class="status-global">Общее</span>':''}</span>${btn}</div>`;
      }).join('');
    }

    async function takeTask(event, taskName) {
      const btn = event.currentTarget;
      btn.disabled = true; btn.textContent = '...';
      const res = await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
      const data = await res.json();
      if (data.success) { showAlert(data.message, 'success'); loadTasks(); }
      else { showAlert(data.message, 'error'); btn.disabled = false; btn.textContent = 'Взять'; }
    }

    function completeTaskPrompt(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><h3>Отчёт</h3><textarea id="commentInput" placeholder="Что сделано?"></textarea><button class="btn" id="submitBtn">Отправить</button><button class="modal-close" id="cancelBtn">Отмена</button></div>`;
      document.body.appendChild(modal);
      document.getElementById('submitBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        modal.remove();
        if (!comment) return;
        showLoading();
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`);
        hideLoading();
        loadTasks();
      };
      document.getElementById('cancelBtn').onclick = () => modal.remove();
    }

    function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }
    async function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      const comment = document.getElementById('transferComment').value.trim();
      if (!receiver || !amount) { document.getElementById('transferError').textContent = 'Введите данные'; return; }
      showLoading();
      const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}&comment=${encodeURIComponent(comment)}`);
      const result = await res.json();
      hideLoading();
      if (result.success) { closeTransferModal(); showAlert('Перевод выполнен!', 'success'); loadTasks(); }
      else document.getElementById('transferError').textContent = result.message;
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`).then(r=>r.json()).then(user => {
        if (user) {
          document.getElementById('userNameDisplay').textContent = user.name;
          document.getElementById('userDept').textContent = user.department || '';
          document.getElementById('userPoints').textContent = user.points || 0;
          currentEnergy = user.energy || 0;
          document.getElementById('energyDisplay').textContent = currentEnergy;
          document.getElementById('levelBadge').innerHTML = getLevelSVG(currentEnergy);
          fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(currentLogin)}`).then(r=>r.json()).then(is=>{ document.getElementById('teamCard').style.display=is?'block':'none'; });
          loadTasks();
          hideLoading();
        } else hideLoading();
      }).catch(() => hideLoading());
    }
