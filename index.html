<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #1f3350;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --glow: 0 0 30px rgba(249, 115, 22, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
      user-select: none;
      font-size: 16px;
    }
    input[type="text"], input[type="number"], textarea { user-select: text; }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 5px var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .login-screen { /* ... */ }
    .login-form { /* ... */ }
    .login-form h2 { /* ... */ }
    .login-form p { /* ... */ }
    .login-form input[type="text"] { /* ... */ }
    .login-form input[type="text"]:focus { /* ... */ }
    .login-btn { /* ... */ }
    .login-btn:hover { /* ... */ }
    .login-btn:active { /* ... */ }
    .login-error { /* ... */ }

    .main-screen { /* ... */ }
    .header { /* ... */ }
    .header h1 { /* ... */ }
    .user-info { /* ... */ }
    .user-info .role { /* ... */ }
    .profile-link { /* ... */ }
    .profile-link:hover { /* ... */ }
    .logout-btn { /* ... */ }
    .logout-btn:hover { /* ... */ }

    .container {
      max-width: 1300px; width: 100%; margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 32px;
      align-items: start;
    }

    .left-column { display: flex; flex-direction: column; gap: 24px; }

    .balance-card {
      background: var(--bg-card); border-radius: 24px; padding: 24px; text-align: center;
      border: 1px solid var(--border); position: relative;
    }
    .balance-value { font-size: 3rem; font-weight: 800; color: var(--success); }
    .balance-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
    .balance-actions button {
      background: var(--border); color: var(--text-primary); border: none;
      padding: 10px 16px; border-radius: 14px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600;
      flex: 1;
    }
    .balance-actions button:hover { background: var(--accent); transform: scale(1.05); }

    .level-icon { position: absolute; top: 14px; right: 14px; font-size: 2rem; }

    .tasks-panel h3 { margin-bottom: 14px; }
    .task-card { /* ... */ }
    .task-card:hover { /* ... */ }
    .task-card .status { /* ... */ }
    .status-active { /* ... */ }
    .status-global { /* ... */ }

    .empty-tasks { /* ... */ }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .menu-card {
      background: var(--bg-card); border-radius: 18px; padding: 18px; text-align: center;
      cursor: pointer; border: 1px solid var(--border); transition: all 0.2s;
    }
    .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .menu-card .icon { font-size: 1.5rem; margin-bottom: 6px; display: block; }

    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { background: var(--accent-hover); animation: glowPulse 1.5s infinite; }

    .modal { /* ... */ }
    .modal.active { /* ... */ }
    .modal-content { /* ... */ }
    @keyframes modalPop { /* ... */ }
    .modal-close-btn { /* ... */ }
    .modal input, .modal textarea { /* ... */ }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1 onclick="location.reload()">Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <span class="role" id="userDept"></span>
        <a class="profile-link" href="/profile.html" title="Профиль">▶</a>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="left-column">
        <div class="balance-card">
          <div class="level-icon" id="levelIcon"></div>
          <div style="font-size:0.9rem; color:var(--text-secondary)">Баланс</div>
          <div class="balance-value" id="userPoints">0</div>
          <div>кармиков</div>
          <div style="margin-top:8px; color:var(--accent);" id="energyDisplay">⚡ 0 энергии</div>
          <div class="balance-actions">
            <button onclick="openTransferModal()">💰 Перевести</button>
            <button onclick="window.location.href='/spend.html'">🎁 Потратить</button>
            <button onclick="window.location.href='/history.html'">📋 История</button>
          </div>
        </div>
        <div class="menu-grid">
          <div class="menu-card" onclick="window.location.href='/tasks.html'"><span class="icon">✅</span>Задания</div>
          <div class="menu-card" onclick="window.location.href='/spend.html'"><span class="icon">🎁</span>Магазин</div>
          <div class="menu-card" onclick="window.location.href='/chat.html'"><span class="icon">💬</span>Чат</div>
          <div class="menu-card" onclick="window.location.href='/purchases.html'"><span class="icon">🛍</span>Мои покупки</div>
          <div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'"><span class="icon">👥</span>Команда</div>
        </div>
      </div>
      <div class="tasks-panel">
        <h3>📋 Задания</h3>
        <div id="inProgressTasks">Нет активных заданий</div>
      </div>
    </div>
  </div>

  <!-- Модальное окно перевода -->
  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2>Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <input type="text" id="transferComment" placeholder="Комментарий (необязательно)">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

    function showModal(html) { /* ... */ }

  </script>
</body>
</html>
