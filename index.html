<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #1f3350;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --glow: 0 0 30px rgba(249, 115, 22, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
      user-select: none;
      font-size: 16px;
    }
    input[type="text"], input[type="number"], textarea { user-select: text; }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 5px var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.2); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); transform: scale(1.02); }
    .login-btn:active { transform: scale(0.98); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info .role { background: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
      font-size: 0.85rem;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container {
      max-width: 1300px; width: 100%; margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 32px;
      align-items: start;
    }

    .left-column { display: flex; flex-direction: column; gap: 24px; }

    .balance-card {
      background: var(--bg-card); border-radius: 24px; padding: 24px; text-align: center;
      border: 1px solid var(--border); position: relative;
    }
    .balance-value { font-size: 3rem; font-weight: 800; color: var(--success); }
    .balance-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
    .balance-actions button {
      background: var(--border); color: var(--text-primary); border: none;
      padding: 10px 16px; border-radius: 14px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600;
      flex: 1;
    }
    .balance-actions button:hover { background: var(--accent); transform: scale(1.05); }

    .level-icon { position: absolute; top: 14px; right: 14px; font-size: 2rem; }

    .tasks-panel h3 { margin-bottom: 14px; }
    .task-card {
      background: var(--bg-card); border-radius: 18px; padding: 18px; margin-bottom: 12px;
      border: 1px solid var(--border); transition: all 0.2s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .task-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .task-card .status {
      padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
    }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); }

    .empty-tasks {
      color: var(--text-secondary); padding: 30px; text-align: center;
      background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .menu-card {
      background: var(--bg-card); border-radius: 18px; padding: 18px; text-align: center;
      cursor: pointer; border: 1px solid var(--border); transition: all 0.2s;
    }
    .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .menu-card .icon { font-size: 1.5rem; margin-bottom: 6px; display: block; }

    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { background: var(--accent-hover); animation: glowPulse 1.5s infinite; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent);
      border-radius: 28px; padding: 36px; max-width: 420px; width: 90%;
      text-align: center; box-shadow: 0 0 60px rgba(249,115,22,0.6);
      animation: modalPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 12px 24px; border-radius: 24px; cursor: pointer; margin-top: 24px; font-size: 0.9rem;
    }
    .modal input, .modal textarea {
      width: 100%; padding: 12px; margin: 10px 0;
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem;
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1 onclick="location.reload()">Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <span class="role" id="userDept"></span>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="left-column">
        <div class="balance-card">
          <div class="level-icon" id="levelIcon"></div>
          <div style="font-size:0.9rem; color:var(--text-secondary)">Баланс</div>
          <div class="balance-value" id="userPoints">0</div>
          <div>кармиков</div>
          <div style="margin-top:8px; color:var(--accent);" id="energyDisplay">⚡ 0 энергии</div>
          <div class="balance-actions">
            <button onclick="openTransferModal()"><span style="display:block; font-size:1.2rem;">💰</span>Перевести</button>
            <button onclick="window.location.href='/spend.html'"><span style="display:block; font-size:1.2rem;">🎁</span>Потратить</button>
            <button onclick="window.location.href='/history.html'"><span style="display:block; font-size:1.2rem;">📋</span>История</button>
          </div>
        </div>
        <div class="menu-grid">
          <div class="menu-card" onclick="window.location.href='/tasks.html'"><span class="icon">✅</span>Задания</div>
          <div class="menu-card" onclick="window.location.href='/spend.html'"><span class="icon">🎁</span>Магазин</div>
          <div class="menu-card" onclick="window.location.href='/chat.html'"><span class="icon">💬</span>Чат</div>
          <div class="menu-card" onclick="window.location.href='/purchases.html'"><span class="icon">🛍</span>Мои покупки</div>
          <div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'"><span class="icon">👥</span>Команда</div>
        </div>
      </div>
      <div class="tasks-panel">
        <h3>📋 Задания</h3>
        <div id="inProgressTasks">Нет активных заданий</div>
      </div>
    </div>
  </div>

  <!-- Модальное окно перевода -->
  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2>Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <input type="text" id="transferComment" placeholder="Комментарий (необязательно)">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0, currentEnergy = 0;
    let levelsCache = [];

    async function loadLevels() { try { const res = await fetch(`${API_URL}?action=getLevels`); levelsCache = await res.json(); } catch(e) {} }
    function getLevelInfo(energy) {
      if (!levelsCache.length) return { icon: '🐟', name: 'Малёк' };
      let level = levelsCache[0];
      for (let i = levelsCache.length-1; i >= 0; i--) { if (energy >= levelsCache[i].energy) { level = levelsCache[i]; break; } }
      return { icon: level.icon, name: level.name };
    }
    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(async user => {
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            await loadLevels();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            document.getElementById('levelIcon').textContent = getLevelInfo(currentEnergy).icon;
            fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(login)}`)
              .then(r => r.json())
              .then(isManager => { document.getElementById('teamCard').style.display = isManager ? 'block' : 'none'; });
            loadInProgressTasks();
          } else { document.getElementById('loginError').textContent = 'Пользователь не найден'; }
        })
        .catch(() => { document.getElementById('loginError').textContent = 'Ошибка соединения'; });
    }
    function logout() {
      localStorage.removeItem('karmabank_login');
      currentLogin = '';
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }
    async function loadInProgressTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const tasks = await res.json();
      const displayTasks = tasks.slice(0, 5);
      const container = document.getElementById('inProgressTasks');
      if (displayTasks.length === 0) {
        container.innerHTML = `<div class="empty-tasks"><p>Нет активных заданий</p></div>`;
        return;
      }
      container.innerHTML = displayTasks.map(t => {
        let btnHtml = '';
        if (t.isGlobal) {
          btnHtml = `<button class="btn" onclick="event.stopPropagation(); takeTask('${t.task}')">Взять</button>`;
        } else if (t.status === 'Назначено') {
          btnHtml = `<button class="btn" onclick="event.stopPropagation(); takeTask('${t.task}')">Взять</button>`;
        } else if (t.status === 'В работе') {
          btnHtml = `<button class="btn" onclick="event.stopPropagation(); openCommentModal('${t.task}')">Выполнить</button>`;
        } else if (t.status === 'На проверке') {
          btnHtml = `<span class="status status-active">На проверке</span>`;
        } else if (t.status === 'Выполнено') {
          btnHtml = `<span class="status status-active">Выполнено</span>`;
        }
        return `<div class="task-card" onclick="window.location.href='/tasks.html'">
          <span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status status-global">Общее</span>' : ''}</span>
          ${btnHtml}
        </div>`;
      }).join('');
    }
    function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }
    async function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      const comment = document.getElementById('transferComment').value.trim();
      if (!receiver || !amount) { document.getElementById('transferError').textContent = 'Заполните обязательные поля'; return; }
      const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}&comment=${encodeURIComponent(comment)}`);
      const result = await res.json();
      if (result.success) {
        closeTransferModal();
        showModal('✅ Перевод выполнен!');
        const userRes = await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`);
        const user = await userRes.json();
        if (user) { currentPoints = user.points || 0; document.getElementById('userPoints').textContent = currentPoints; }
      } else { document.getElementById('transferError').textContent = result.message; }
    }
    function showModal(html) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">${html}<button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
      document.body.appendChild(modal);
    }
    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(async user => {
          if (user) {
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            await loadLevels();
            document.getElementById('levelIcon').textContent = getLevelInfo(currentEnergy).icon;
            loadInProgressTasks();
          }
        });
    }
  </script>
</body>
</html>
