<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #1f3350;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --hologram-glow: 0 0 12px rgba(249,115,22,0.8), 0 0 25px rgba(192,132,252,0.6);
      --premium-gradient: linear-gradient(135deg, #f97316, #c084fc, #38bdf8);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
      user-select: none;
    }
    input, textarea { user-select: text; }

    /* Анимации */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes glowPulse {
      0% { filter: drop-shadow(0 0 2px rgba(249,115,22,0.5)); }
      50% { filter: drop-shadow(0 0 12px rgba(249,115,22,0.9)) drop-shadow(0 0 6px #c084fc); }
      100% { filter: drop-shadow(0 0 2px rgba(249,115,22,0.5)); }
    }
    @keyframes starTwinkle {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 8px #f97316); }
      100% { transform: scale(1); opacity: 0.8; }
    }
    @keyframes hologramRotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes borderShine {
      0% { border-color: rgba(249,115,22,0.4); box-shadow: 0 0 0 0 rgba(249,115,22,0.2); }
      50% { border-color: rgba(192,132,252,0.8); box-shadow: 0 0 0 3px rgba(249,115,22,0.3); }
      100% { border-color: rgba(249,115,22,0.4); box-shadow: 0 0 0 0 rgba(249,115,22,0); }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0px); }
    }

    .loading-arrows { display: flex; gap: 10px; align-items: center; justify-content: center; }
    .arrow {
      width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg); box-shadow: 0 0 10px var(--accent);
    }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;
    }

    /* Логин */
    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); transform: scale(1.02); }
    .login-error { color: var(--danger); margin-top: 12px; }

    /* Основной экран */
    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; background: var(--premium-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-left-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-name-link {
      font-weight: 700; font-size: 1rem; cursor: pointer;
      background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .user-level-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.5);
      padding: 4px 12px; border-radius: 40px;
    }
    .premium-level-icon {
      width: 28px; height: 28px;
      animation: starTwinkle 2.5s infinite ease-in-out;
    }
    .user-dept {
      color: #c084fc; font-weight: 500; font-size: 0.85rem;
      background: rgba(139, 92, 246, 0.1); padding: 4px 12px; border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    /* Премиум кнопки шапки */
    .chat-header-btn, .path-to-perfect, .health-btn {
      background: rgba(21,38,56,0.6);
      border: 1px solid rgba(249,115,22,0.8);
      border-radius: 40px;
      padding: 6px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      cursor: pointer;
      color: var(--text-primary);
    }
    .chat-header-btn svg, .path-to-perfect svg, .health-btn svg {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 3px #f97316);
      transition: all 0.3s;
    }
    .chat-header-btn:hover, .path-to-perfect:hover, .health-btn:hover {
      box-shadow: var(--hologram-glow);
      border-color: #c084fc;
      transform: translateY(-2px);
    }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; font-size: 0.85rem;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    /* Контейнер */
    .container {
      max-width: 1300px; width: 100%; margin: 0 auto;
      padding: 24px; display: grid;
      grid-template-columns: 420px 1fr; gap: 32px;
      align-items: start;
    }
    .left-column { display: flex; flex-direction: column; gap: 20px; }

    /* КАРТОЧКА БАЛАНСА (ИСХОДНЫЙ ВИД) */
    .balance-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border-radius: 24px; padding: 28px 20px 20px;
      text-align: center;
      border: 1px solid var(--border);
      position: relative;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.1) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(16,185,129,0.08) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(249,115,22,0.06) 0%, transparent 50%);
      background-size: 200% 200%;
      animation: aurora 12s ease infinite;
      pointer-events: none;
    }
    .balance-card > * { position: relative; z-index: 1; }
    .balance-label {
      font-size: 1.2rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glowPulse 3s infinite;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .balance-value {
      font-size: 3.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #34d399, #f9a826, #f97316);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glowPulse 2.5s infinite, hologramRotate 4s ease infinite;
      line-height: 1;
      margin-bottom: 4px;
      /* Тонкая чёрная обводка */
      -webkit-text-stroke: 0.6px rgba(0,0,0,0.6);
      text-stroke: 0.6px rgba(0,0,0,0.6);
    }
    .balance-sub {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glowPulse 3s infinite;
      margin-bottom: 22px;
    }
    .energy-line-wide {
      display: block;
      width: 100%;
      text-align: center;
      font-size: 1rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 20px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(249,115,22,0.05);
      border: 1px solid rgba(249,115,22,0.15);
    }

    /* КНОПКИ БАЛАНСА (ПЕРЕВЕСТИ, МАГАЗИН, ОПЕРАЦИИ) */
    .balance-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .action-btn {
      background: rgba(21,38,56,0.8);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(249,115,22,0.7);
      border-radius: 40px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 100px;
    }
    .action-btn .icon-wrapper {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn svg {
      width: 34px;
      height: 34px;
      filter: drop-shadow(0 0 3px #f97316);
      transition: all 0.3s;
    }
    .action-btn span {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    .action-btn:hover {
      border-color: #c084fc;
      box-shadow: var(--hologram-glow);
      transform: translateY(-3px);
    }
    .action-btn:hover svg {
      animation: glowPulse 0.8s infinite;
    }

    /* Широкая кнопка МОИ ПОКУПКИ */
    .wide-btn {
      background: rgba(21,38,56,0.8);
      border: 1px solid rgba(249,115,22,0.6);
      border-radius: 40px;
      padding: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      color: white;
    }
    .wide-btn svg {
      width: 24px;
      height: 24px;
      stroke: #f97316;
      fill: none;
    }
    .wide-btn:hover {
      border-color: #c084fc;
      box-shadow: var(--hologram-glow);
      background: rgba(249,115,22,0.2);
    }

    /* ЗАДАНИЯ И КНОПКИ ПРАВОЙ КОЛОНКИ */
    .tasks-panel h3 {
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--premium-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .tasks-panel h3 svg {
      width: 32px;
      height: 32px;
      stroke: #f97316;
      fill: none;
      animation: starTwinkle 2s infinite;
    }
    .task-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(249,115,22,0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .task-card:hover {
      border-color: #c084fc;
      box-shadow: 0 0 18px rgba(249,115,22,0.6);
      transform: translateY(-2px);
    }
    .btn-task {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 40px;
      padding: 8px 24px;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .btn-task:hover {
      border-color: #c084fc;
      box-shadow: var(--hologram-glow);
      transform: scale(1.02);
    }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }

    /* НОВЫЕ ПРЕМИУМ КНОПКИ (некликабельные) */
    .premium-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 20px;
      justify-content: space-between;
    }
    .premium-feature-btn {
      flex: 1;
      min-width: 160px;
      background: rgba(21,38,56,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(249,115,22,0.7);
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: default;
      transition: all 0.3s;
      animation: borderShine 3s infinite;
    }
    .premium-feature-btn svg {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 4px #f97316);
      animation: glowPulse 2s infinite;
    }
    .premium-feature-btn span {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-primary);
    }
    .premium-feature-btn:hover {
      border-color: #c084fc;
      box-shadow: var(--hologram-glow);
      transform: translateY(-2px);
    }

    /* База знаний */
    .knowledge-fab {
      position: fixed; bottom: 24px; right: 24px;
      background: rgba(21,38,56,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(249,115,22,0.9);
      border-radius: 60px;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      z-index: 1000;
      transition: all 0.3s;
      color: var(--text-primary);
    }
    .knowledge-fab svg {
      width: 26px;
      height: 26px;
      stroke: #f97316;
      fill: none;
      animation: starTwinkle 2s infinite;
    }
    .knowledge-fab:hover {
      border-color: #c084fc;
      box-shadow: var(--hologram-glow);
      transform: translateY(-4px);
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent);
      border-radius: 28px; padding: 36px;
      max-width: 440px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
      animation: modalPop 0.4s ease;
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 12px 24px; border-radius: 24px; cursor: pointer; margin-top: 16px;
    }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 16px; }
      .balance-actions { gap: 10px; }
      .action-btn { min-width: 80px; padding: 8px 12px; }
      .premium-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-form">
    <h2>Кармический банк</h2>
    <p>Введите ваш логин, чтобы продолжить</p>
    <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
    <button class="login-btn" onclick="login()">Войти</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="mainScreen" class="main-screen">
  <div class="header">
    <div class="header-left-group">
      <h1 onclick="location.reload()">Кармический банк</h1>
      <button class="path-to-perfect" onclick="window.location.href='/simulator.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z" />
          <path d="M12 6 L14 11 L19 11 L15 14 L16 19 L12 16 L8 19 L9 14 L5 11 L10 11 Z" fill="rgba(249,115,22,0.3)"/>
        </svg>
        Путь к совершенству
      </button>
      <button class="health-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          <circle cx="12" cy="9" r="2.5" fill="rgba(16,185,129,0.3)" stroke="#10b981"/>
        </svg>
        Забота о здоровье
      </button>
    </div>
    <div class="user-info">
      <span id="userNameDisplay" class="user-name-link" onclick="window.location.href='/profile.html'"></span>
      <span class="user-level-badge" id="userLevelBadge">
        <svg class="premium-level-icon" viewBox="0 0 24 24" fill="none" stroke="url(#starGradLocal)">
          <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" />
          <circle cx="12" cy="11" r="3" fill="rgba(249,115,22,0.3)" stroke="#f97316"/>
        </svg>
      </span>
      <span class="user-dept" id="userDept"></span>
      <!-- НОВАЯ ПРЕМИУМ ИКОНКА ЧАТА -->
      <button class="chat-header-btn" onclick="window.location.href='/chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <circle cx="8" cy="10" r="1.2" fill="#f97316"/>
          <circle cx="12" cy="10" r="1.2" fill="#f97316"/>
          <circle cx="16" cy="10" r="1.2" fill="#f97316"/>
          <path d="M6 16 L9 13 L15 13 L18 16" stroke="#c084fc" stroke-width="1.5" opacity="0.8"/>
        </svg>
        Чат
      </button>
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Выйти
      </button>
    </div>
  </div>
  <div class="container">
    <div class="left-column">
      <div class="balance-card">
        <div class="balance-label">Баланс</div>
        <div class="balance-value" id="userPoints">0</div>
        <div class="balance-sub">кармиков</div>
        <div class="energy-line-wide" id="energyDisplay">⚡ 0 энергии</div>
        <div class="balance-actions">
          <button class="action-btn" onclick="openTransferModal()">
            <span class="icon-wrapper">
              <svg viewBox="0 0 24 24" fill="none">
                <defs><linearGradient id="gradArrow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs>
                <path d="M2 7 L22 7 M15 2 L22 7 L15 12 M22 17 L2 17 M9 12 L2 17 L9 22" stroke="url(#gradArrow)" stroke-width="2"/>
              </svg>
            </span>
            <span>Перевести</span>
          </button>
          <button class="action-btn" onclick="window.location.href='/spend.html'">
            <span class="icon-wrapper">
              <svg viewBox="0 0 24 24" fill="none">
                <defs><linearGradient id="gradApple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient></defs>

                <rect x="3" y="7" width="18" height="14" rx="2" stroke="url(#gradWallet)" stroke-width="1.8" fill="rgba(16,185,129,0.1)"/>
                <path d="M19 12h-3" stroke="url(#gradWallet)" stroke-width="2.5" stroke-linecap="round"/>

    <div class="tasks-panel">

<div id="transferModal" class="modal">
  <div class="modal-content">
    <h2>Перевод кармиков</h2>
    <input type="text" id="receiverLogin" placeholder="Логин получателя">
    <input type="number" id="transferAmount" placeholder="Сумма">
    <input type="text" id="transferComment" placeholder="Комментарий (необязательно)">
    <button class="btn-task" onclick="executeTransfer()">Отправить</button>
    <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
    <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
  </div>
</div>

<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="starGradLocal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs></svg>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  let currentLogin = localStorage.getItem('karmabank_login') || '';
  let currentPoints = 0, currentEnergy = 0;
  let levelsCache = [];

  async function loadLevels() { try { const res = await fetch(`${API_URL}?action=getLevels`); levelsCache = await res.json(); } catch(e) {} }
  function getLevelIconHtml() {
    return '<svg class="premium-level-icon" viewBox="0 0 24 24" fill="none" stroke="url(#starGradLocal)"><polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" /><circle cx="12" cy="11" r="3" fill="rgba(249,115,22,0.3)" stroke="#f97316"/></svg>';
  }
  function showLoading() { const overlay = document.createElement('div'); overlay.className = 'loading-overlay'; overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>'; document.body.appendChild(overlay); }
  function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }

  function login() {
    const login = document.getElementById('loginInput').value.trim();
    if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
    showLoading();
    fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
      .then(r => r.json())
      .then(async user => {
        hideLoading();
        if (user && user.name) {
          localStorage.setItem('karmabank_login', login);
          currentLogin = login;
          currentPoints = user.points || 0;
          currentEnergy = user.energy || 0;
          await loadLevels();
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('mainScreen').style.display = 'flex';
          document.getElementById('userNameDisplay').textContent = user.name;
          document.getElementById('userDept').textContent = user.department || '';
          document.getElementById('userLevelBadge').innerHTML = getLevelIconHtml();
          document.getElementById('userPoints').textContent = currentPoints;
          document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
          loadInProgressTasks();
        } else { document.getElementById('loginError').textContent = 'Пользователь не найден'; }
      })
      .catch(() => { hideLoading(); document.getElementById('loginError').textContent = 'Ошибка соединения'; });
  }
  function logout() { localStorage.removeItem('karmabank_login'); location.reload(); }
  async function loadInProgressTasks() {
    const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
    const tasks = await res.json();
    const activeTasks = tasks.filter(t => t.status === 'Назначено' || t.status === 'В работе');
    const container = document.getElementById('inProgressTasks');
    if (!activeTasks.length) { container.innerHTML = `<div class="empty-tasks">✨ Новых заданий пока нет ✨</div>`; return; }
    container.innerHTML = activeTasks.slice(0,3).map(t => {
      let btnHtml = '';
      if (t.status === 'Назначено') btnHtml = `<button class="btn-task" onclick="event.stopPropagation(); takeTask('${t.task}')">Взять</button>`;
      else if (t.status === 'В работе') btnHtml = `<button class="btn-task" onclick="event.stopPropagation(); openCommentModal('${t.task}')">Выполнить</button>`;
      return `<div class="task-card" onclick="window.location.href='/tasks.html'"><span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status-global">Общее</span>' : ''}</span>${btnHtml}</div>`;
    }).join('');
  }
  async function takeTask(taskName) { await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`); loadInProgressTasks(); }
  function openCommentModal(taskName) {
    const modal = document.createElement('div'); modal.className='modal active';
    modal.innerHTML=`<div class="modal-content"><h3>Отчёт</h3><textarea id="commentInput" placeholder="Опишите результат..."></textarea><button class="btn-task" id="submitCommentBtn">Отправить</button><button class="modal-close-btn" id="cancelCommentBtn">Отмена</button></div>`;
    document.body.appendChild(modal);
    document.getElementById('submitCommentBtn').onclick=async()=>{ const comment=document.getElementById('commentInput').value.trim(); modal.remove(); if(!comment)return; showLoading(); await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`); hideLoading(); loadInProgressTasks(); };
    document.getElementById('cancelCommentBtn').onclick=()=>modal.remove();
  }
  function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
  function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }
  async function executeTransfer() {
    const receiver = document.getElementById('receiverLogin').value.trim();
    const amount = document.getElementById('transferAmount').value;
    const comment = document.getElementById('transferComment').value.trim();
    if (!receiver || !amount) { document.getElementById('transferError').textContent = 'Заполните поля'; return; }
    showLoading();
    const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}&comment=${encodeURIComponent(comment)}`);
    const result = await res.json();
    hideLoading();
    if (result.success) {
      closeTransferModal();
      const userRes = await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`);
      const user = await userRes.json();
      if (user) { currentPoints = user.points; document.getElementById('userPoints').textContent = currentPoints; }
      alert('Перевод выполнен!');
    } else { document.getElementById('transferError').textContent = result.message; }
  }
  if (currentLogin) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'flex';
    showLoading();
    fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`)
      .then(r=>r.json()).then(async user=>{
        hideLoading();
        if(user){
          currentPoints=user.points||0; currentEnergy=user.energy||0;
          document.getElementById('userNameDisplay').textContent=user.name;
          document.getElementById('userDept').textContent=user.department||'';
          await loadLevels();
          document.getElementById('userLevelBadge').innerHTML = getLevelIconHtml();
          document.getElementById('userPoints').textContent=currentPoints;
          document.getElementById('energyDisplay').textContent=`⚡ ${currentEnergy} энергии`;
          loadInProgressTasks();
        }
      }).catch(()=>hideLoading());
  }
</script>
</body>
</html>
