<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <style>
    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #151b2e;
      --bg-card: #1e2640;
      --text-primary: #f0f2f5;
      --text-secondary: #8b95a6;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #2a344a;
      --shadow: 0 20px 40px rgba(0,0,0,0.6);
      --glow: 0 0 30px rgba(249, 115, 22, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1a2340, var(--bg-primary) 80%);
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* ----- МАСКОТ ----- */
    .mascot-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      display: flex; align-items: center; gap: 12px;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .mascot-bubble {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 18px; 
      box-shadow: var(--shadow); color: var(--text-primary);
      font-weight: 600; font-size: 0.9rem;
      opacity: 0; transform: translateX(20px); transition: all 0.3s ease;
      white-space: nowrap;
    }
    .mascot-bubble.visible { opacity: 1; transform: translateX(0); }
    .mascot-avatar {
      width: 70px; height: 70px; background: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 40px; box-shadow: 0 0 25px rgba(249,115,22,0.5);
      animation: mascot-wave 1.5s infinite ease-in-out;
      transition: transform 0.2s;
    }
    @keyframes mascot-wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
    }

    /* ----- ГОЛОГРАММА НАЧИСЛЕНИЯ ----- */
    .hologram-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .hologram-overlay.active { opacity: 1; pointer-events: all; }
    .hologram-box {
      background: var(--bg-card); border: 1px solid var(--accent);
      border-radius: 30px; padding: 40px; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.5);
      transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 360px; width: 90%;
    }
    .hologram-overlay.active .hologram-box { transform: scale(1); }
    .hologram-mascot { font-size: 80px; animation: mascot-wave 1s infinite; }
    .hologram-points {
      font-size: 56px; font-weight: 800; color: var(--success);
      text-shadow: 0 0 30px rgba(16,185,129,0.8);
    }

    /* ----- ОСТАЛЬНЫЕ СТИЛИ ----- */
    .header {
      background: rgba(21, 27, 46, 0.8); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.6rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .header h1 span { font-size: 2rem; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info .role { background: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px; width: 100%; display: grid; gap: 24px; }
    .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px; transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); position: relative; overflow: hidden;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-6px); box-shadow: var(--glow); }
    .card h3 { font-size: 1.2rem; margin-bottom: 12px; color: var(--text-secondary); }
    .card .value { font-size: 3rem; font-weight: 800; }
    .value.accent { color: var(--accent); }
    .value.success { color: var(--success); }
    .progress-bar {
      height: 6px; background: var(--border); border-radius: 6px;
      margin-top: 16px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--warning));
      border-radius: 6px; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .task-list { display: flex; flex-direction: column; gap: 16px; }
    .task-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; transition: all 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-status {
      padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }
    .status-pending { background: rgba(245,158,11,0.2); color: var(--warning); }
    .status-active { background: rgba(249,115,22,0.2); color: var(--accent); }
    .status-done { background: rgba(16,185,129,0.2); color: var(--success); }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .reward-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .reward-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; text-align: center;
    }
    .bottom-nav {
      display: flex; background: rgba(21, 27, 46, 0.9); backdrop-filter: blur(10px);
      border-top: 1px solid var(--border); padding: 10px 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
    }
    .nav-item {
      flex: 1; text-align: center; color: var(--text-secondary);
      text-decoration: none; font-size: 0.85rem; padding: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-item.active { color: var(--accent); font-weight: 700; }
    @media (max-width: 768px) {
      .container { padding: 16px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <!-- ГОЛОГРАММА -->
  <div class="hologram-overlay" id="hologram">
    <div class="hologram-box">
      <div class="hologram-mascot">🐿️</div>
      <h2 id="hologramMsg">+50 кармиков</h2>
      <div class="hologram-points" id="hologramPoints">0</div>
      <button class="btn" onclick="closeHologram()" style="margin-top:20px;">Отлично!</button>
    </div>
  </div>

  <!-- МАСКОТ -->
  <div class="mascot-container">
    <div class="mascot-bubble" id="mascotBubble">А ты молодец!</div>
    <div class="mascot-avatar" id="mascotAvatar">🐿️</div>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН -->
  <div id="mainScreen">
    <div class="header">
      <h1><span>🐿️</span> Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <div class="role" id="userDept"></div>
      </div>
    </div>

    <div class="container">
      <div class="section-title">Мой профиль</div>
      <div class="cards-grid">
        <div class="card">
          <h3>Баланс</h3>
          <div class="value success" id="userPoints">0</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>

      <div class="section-title" style="margin-top:20px;">Доступные задания</div>
      <div class="task-list" id="taskList"></div>

      <div class="section-title" style="margin-top:20px;">Витрина наград</div>
      <div class="reward-grid" id="rewardGrid"></div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active" onclick="switchTab('tasks')">✅ Задания</div>
      <div class="nav-item" onclick="switchTab('rewards')">🎁 Награды</div>
      <div class="nav-item" onclick="location.reload()">🔄 Обновить</div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwnQn6v4GsehwvkHCkuj61XTIc89Cs-NOslLXBNUofX6E3xNaOv3nEcuRQJKagTcgTZ9Q/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0;

    async function login() {
      if (!currentLogin) {
        currentLogin = prompt('Введите ваш логин (например, arthur, lilia, nastya):');
        if (!currentLogin) return;
        localStorage.setItem('karmabank_login', currentLogin);
      }
      await refreshUI();
    }

    async function refreshUI() {
      try {
        const userRes = await fetch(`${API_URL}?action=getUser&login=${currentLogin}`);
        const user = await userRes.json();
        if (user && user.name) {
          document.getElementById('userNameDisplay').textContent = user.name;
          document.getElementById('userDept').textContent = user.department || '';
          currentPoints = user.points || 0;
          document.getElementById('userPoints').textContent = currentPoints;
          const progressPercent = Math.min((currentPoints / 500) * 100, 100);
          document.getElementById('progressFill').style.width = progressPercent + '%';
          document.getElementById('mainScreen').style.display = 'flex';
          await loadTasks();
          await loadRewards();
          showMascotMessage(`Привет, ${user.name}!`);
        } else {
          localStorage.removeItem('karmabank_login');
          currentLogin = '';
          alert('Пользователь не найден');
        }
      } catch (e) {
        alert('Ошибка соединения');
      }
    }

    async function loadTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${currentLogin}`);
      const tasks = await res.json();
      const list = document.getElementById('taskList');
      list.innerHTML = tasks.map(t => {
        let statusClass = 'status-pending';
        if (t.status === 'В работе') statusClass = 'status-active';
        else if (t.status === 'Выполнено') statusClass = 'status-done';
        return `<div class="task-item">
          <span>${t.task} <span style="color:#8b95a6;">(${t.points} карм.)</span></span>
          <span class="task-status ${statusClass}">${t.status || 'Назначено'}</span>
          ${t.status === 'Назначено' ? `<button class="btn" onclick="takeTask('${t.task}')">Взять</button>` : ''}
          ${t.status === 'В работе' ? `<button class="btn" onclick="completeTask('${t.task}')">Выполнить</button>` : ''}
        </div>`;
      }).join('');
    }

    async function loadRewards() {
      const res = await fetch(`${API_URL}?action=getRewards`);
      const rewards = await res.json();
      document.getElementById('rewardGrid').innerHTML = rewards.map(r => `
        <div class="reward-item">
          <span>🎁</span>
          <h4>${r.name}</h4>
          <span>${r.cost} карм.</span>
        </div>
      `).join('');
    }

    function showMascotMessage(msg) {
      const bubble = document.getElementById('mascotBubble');
      bubble.textContent = msg;
      bubble.classList.add('visible');
      setTimeout(() => bubble.classList.remove('visible'), 4000);
    }

    function showHologram(points) {
      document.getElementById('hologramMsg').textContent = `+${points} кармиков`;
      document.getElementById('hologramPoints').textContent = currentPoints;
      document.getElementById('hologram').classList.add('active');
    }

    window.closeHologram = function() {
      document.getElementById('hologram').classList.remove('active');
    };

    async function takeTask(taskName) {
      await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${currentLogin}`);
      showMascotMessage('За дело!');
      await refreshUI();
    }

    async function completeTask(taskName) {
      const res = await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${currentLogin}`);
      const result = await res.json();
      if (result.success) {
        await refreshUI();
        showHologram(result.message.match(/\d+/)[0]);
        showMascotMessage('Великолепно!');
      } else {
        alert(result.message);
      }
    }

    function switchTab(tab) {
      // Этот функционал уже есть в нижнем меню, оставим для совместимости
    }

    login();
  </script>
</body>
</html>
