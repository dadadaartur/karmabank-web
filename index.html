<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Кармический банк</title><link rel="icon" href="belchonok.png"><link rel="apple-touch-icon" href="belchonok.png"><style>:root{--bg-primary:#0a1628;--bg-secondary:#0f1f35;--bg-card:#152238;--text-primary:#eaf0fb;--text-secondary:#9aa9c1;--accent:#f97316;--accent-hover:#ea580c;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--border:#1f3350;--shadow:0 20px 40px rgba(0,0,0,0.5);--cosmic-glow:0 0 25px rgba(99,102,241,0.4)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:linear-gradient(145deg,#0a1628 0%,#0f1f35 50%,#0c1b30 100%);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;position:relative;user-select:none;font-size:16px}input[type="text"],input[type="number"],textarea{user-select:text}@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}@keyframes modalPop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}@keyframes karmaGlow{0%{text-shadow:0 0 10px #10b981,0 0 20px #10b981}50%{text-shadow:0 0 20px #34d399,0 0 35px #059669}100%{text-shadow:0 0 10px #10b981,0 0 20px #10b981}}@keyframes aurora{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}@keyframes textGlow{0%{color:#10b981}50%{color:#34d399}100%{color:#10b981}}@keyframes rotateStar{100%{transform:rotate(360deg)}}.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}.login-form{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:40px 30px;box-shadow:var(--shadow);width:100%;max-width:400px;text-align:center;animation:fadeInUp 0.6s ease}.login-form h2{font-size:2rem;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}.login-form p{color:var(--text-secondary);margin-bottom:24px}.login-form input[type="text"]{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:var(--bg-secondary);color:var(--text-primary);font-size:1rem;margin-bottom:16px;outline:none}.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#e65c00);color:white;border:none;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer}.login-btn:hover{background:linear-gradient(135deg,var(--accent-hover),#cc5200);transform:scale(1.02)}.login-error{color:var(--danger);margin-top:12px;font-weight:500}.main-screen{display:none;flex-direction:column;flex:1}.header{background:rgba(21,38,56,0.7);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}.header h1{font-size:1.4rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:10px}.user-info{display:flex;align-items:center;gap:16px}.user-name-link{font-weight:700;font-size:1rem;cursor:pointer;background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.user-name-link:hover{transform:scale(1.05);text-shadow:0 0 15px rgba(139,92,246,0.8)}.user-dept{color:#c084fc;font-weight:500;font-size:0.85rem;background:rgba(139,92,246,0.1);padding:4px 12px;border-radius:20px;border:1px solid rgba(139,92,246,0.3)}.chat-header-btn{background:transparent;border:none;color:#10b981;padding:8px 16px;border-radius:20px;font-weight:700;font-size:0.9rem;cursor:pointer;animation:textGlow 2s infinite;display:flex;align-items:center;gap:6px}.chat-header-btn:hover{color:#34d399;text-shadow:0 0 15px #34d399}.logout-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:8px 16px;border-radius:20px;cursor:pointer}.logout-btn:hover{background:var(--danger);border-color:var(--danger);color:white}.container{max-width:1300px;width:100%;margin:0 auto;padding:24px;display:grid;grid-template-columns:420px 1fr;gap:32px;align-items:start}.left-column{display:flex;flex-direction:column;gap:24px}.balance-card{background:var(--bg-card);border-radius:24px;padding:28px 20px;text-align:center;border:1px solid var(--border);position:relative;box-shadow:0 15px 30px rgba(0,0,0,0.4);overflow:hidden}.balance-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 30%,rgba(99,102,241,0.1) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(16,185,129,0.08) 0%,transparent 40%);background-size:200% 200%;animation:aurora 12s ease-in-out infinite;z-index:0;pointer-events:none}.balance-card>*{position:relative;z-index:1}.balance-label{font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,#c084fc,#38bdf8,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}.balance-value{font-size:3.6rem;font-weight:800;background:linear-gradient(135deg,#10b981,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:karmaGlow 2.5s infinite;line-height:1;margin-bottom:2px}.balance-sub{font-size:0.8rem;letter-spacing:2px;text-transform:lowercase;background:linear-gradient(135deg,#c084fc,#38bdf8,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}.energy-frame{display:inline-block;border:2px solid var(--accent);border-radius:20px;padding:4px 16px;background:rgba(249,115,22,0.05);margin-bottom:20px}.energy-line{font-size:0.85rem;color:var(--accent);font-weight:600}.balance-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.action-btn{background:var(--border);color:var(--text-primary);border:none;padding:16px 20px;border-radius:20px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.3s ease;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:90px;flex:1}.action-btn:hover{background:var(--accent);transform:scale(1.05);box-shadow:var(--cosmic-glow)}.level-icon{position:absolute;top:14px;right:14px;font-size:2rem;z-index:2}.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.menu-card{background:var(--bg-card);border-radius:18px;padding:20px;text-align:center;border:1px solid var(--border);transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}.menu-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 25px rgba(249,115,22,0.2)}.menu-card.disabled{opacity:0.5;cursor:default;pointer-events:none}.menu-card.disabled:hover{border-color:var(--border);transform:none;box-shadow:none}.tasks-panel h3{cursor:pointer;display:flex;align-items:center;gap:8px;font-size:1.2rem;margin-bottom:14px}.tasks-panel h3:hover{color:var(--accent)}.task-card{background:var(--bg-card);border-radius:18px;padding:16px 18px;margin-bottom:12px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:all 0.2s;position:relative;overflow:hidden}.task-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 20% 30%,rgba(16,185,129,0.06) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(99,102,241,0.06) 0%,transparent 40%);background-size:200% 200%;animation:aurora 10s ease-in-out infinite;z-index:0;pointer-events:none}.task-card>*{position:relative;z-index:1}.task-card:hover{border-color:var(--accent)}.status-active{background:rgba(249,115,22,0.3);color:var(--accent);padding:2px 8px;border-radius:12px;font-size:0.75rem}.status-global{background:rgba(16,185,129,0.2);color:var(--success);padding:2px 8px;border-radius:12px;font-size:0.75rem}.empty-tasks{color:var(--text-secondary);padding:30px;text-align:center;background:var(--bg-card);border-radius:16px;border:1px solid var(--border)}.knowledge-fab{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:24px;padding:16px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;border:none;color:white;font-weight:700;box-shadow:0 10px 30px rgba(249,115,22,0.5);transition:transform 0.3s;z-index:1000;font-size:0.95rem}.knowledge-fab:hover{transform:translateY(-3px)}.btn{background:var(--accent);color:white;border:none;padding:10px 20px;border-radius:14px;font-weight:600;cursor:pointer}.btn:hover{background:var(--accent-hover)}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center}.modal.active{display:flex}.modal-content{background:linear-gradient(135deg,#1a2940,#152238);border:1px solid var(--accent);border-radius:28px;padding:36px;max-width:440px;width:90%;text-align:center;box-shadow:0 0 60px rgba(249,115,22,0.6);animation:modalPop 0.4s ease}.modal-content h3{font-size:1.4rem;margin-bottom:20px;background:linear-gradient(135deg,#f97316,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.modal-content input,.modal-content textarea{width:100%;padding:14px;margin-bottom:16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:14px;color:var(--text-primary);font-size:1rem}.modal-close-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:12px 24px;border-radius:24px;cursor:pointer;margin-top:16px}.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:3000;display:flex;align-items:center;justify-content:center}.loading-star{width:60px;height:60px;animation:rotateStar 2s linear infinite}@media(max-width:768px){.container{grid-template-columns:1fr;padding:16px}.balance-value{font-size:2.8rem}}</style></head><body><div id="loginScreen" class="login-screen"><div class="login-form"><h2>Кармический банк</h2><p>Введите ваш логин</p><input type="text" id="loginInput" placeholder="Логин"><button class="login-btn" onclick="login()">Войти</button><div id="loginError" class="login-error"></div></div></div><div id="mainScreen" class="main-screen"><div class="header"><h1 onclick="location.reload()">Кармический банк</h1><div class="user-info"><span id="userNameDisplay" class="user-name-link" onclick="window.location.href='/profile.html'"></span><span class="user-dept" id="userDept"></span><button class="chat-header-btn" onclick="window.location.href='/chat.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Чат</button><button class="logout-btn" onclick="logout()">🚪 Выйти</button></div></div><div class="container"><div class="left-column"><div class="balance-card"><div class="level-icon" id="levelIcon"></div><div class="balance-label">Баланс</div><div class="balance-value" id="userPoints">0</div><div class="balance-sub">кармики</div><div class="energy-frame"><div class="energy-line" id="energyDisplay">⚡ 0 энергии</div></div><div class="balance-actions"><button class="action-btn" onclick="openTransferModal()"><span class="icon-wrapper"><svg viewBox="0 0 24 24"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs><circle cx="12" cy="5" r="2.5" stroke="url(#g1)" fill="none"/><circle cx="6" cy="18" r="2.5" stroke="url(#g1)" fill="none"/><circle cx="18" cy="18" r="2.5" stroke="url(#g1)" fill="none"/><path d="M12 7.5V14" stroke="url(#g1)"/><path d="M8 16l4 2 4-2" stroke="url(#g1)"/></svg></span>Перевести</button><button class="action-btn" onclick="window.location.href='/spend.html'"><span class="icon-wrapper"><svg viewBox="0 0 24 24"><defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs><path d="M3 3h2l1 5h13l1.5 7H6" stroke="url(#g2)"/><circle cx="8" cy="20" r="1.5" stroke="url(#g2)"/><circle cx="17" cy="20" r="1.5" stroke="url(#g2)"/></svg></span>Магазин</button><button class="action-btn" onclick="window.location.href='/history.html'"><span class="icon-wrapper"><svg viewBox="0 0 24 24"><defs><linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient></defs><rect x="3" y="3" width="18" height="18" rx="3" stroke="url(#g3)"/><path d="M3 9h18" stroke="url(#g3)"/><path d="M8 3v18" stroke="url(#g3)"/><circle cx="7" cy="13" r="1" fill="url(#g3)" stroke="none"/><circle cx="15" cy="7" r="1" fill="url(#g3)" stroke="none"/></svg></span>Операции</button></div></div><div class="menu-grid"><div class="menu-card" onclick="window.location.href='/simulator.html'"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>Тренировка</div><div class="menu-card disabled"><span><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>Обучение</div><div class="menu-card" onclick="window.location.href='/purchases.html'"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>Мои покупки</div><div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'"><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>Команда</div></div></div><div class="tasks-panel"><h3 onclick="window.location.href='/tasks.html'">📋 Задания</h3><div id="inProgressTasks">Нет активных заданий</div></div></div><button class="knowledge-fab" onclick="window.location.href='/knowledge.html'"><span>🌟</span> База знаний</button></div><div id="transferModal" class="modal"><div class="modal-content"><h2 style="color:white;">Перевод кармиков</h2><input type="text" id="receiverLogin" placeholder="Логин получателя"><input type="number" id="transferAmount" placeholder="Сумма"><input type="text" id="transferComment" placeholder="Комментарий"><button class="btn" onclick="executeTransfer()">Отправить</button><button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button><div id="transferError" style="color:var(--danger);margin-top:8px"></div></div></div><script>const API_URL='https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';let currentLogin=localStorage.getItem('karmabank_login')||'',currentPoints=0,currentEnergy=0,levelsCache=[];async function loadLevels(){try{const e=await fetch(`${API_URL}?action=getLevels`);levelsCache=await e.json()}catch(e){}}function getLevelIcon(e){if(!levelsCache.length)return'✦';let t=levelsCache[0].icon;for(let l=levelsCache.length-1;l>=0;l--)if(e>=levelsCache[l].energy){t=levelsCache[l].icon;break}return t}function showLoading(){const e=document.createElement('div');e.className='loading-overlay',e.innerHTML=`<svg class="loading-star" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,document.body.appendChild(e)}function hideLoading(){const e=document.querySelector('.loading-overlay');e&&e.remove()}function login(){const e=document.getElementById('loginInput').value.trim();e?fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(e)}`).then(e=>e.json()).then(async t=>{t&&t.name?(localStorage.setItem('karmabank_login',e),currentLogin=e,currentPoints=t.points||0,currentEnergy=t.energy||0,await loadLevels(),document.getElementById('loginScreen').style.display='none',document.getElementById('mainScreen').style.display='flex',document.getElementById('userNameDisplay').textContent=t.name,document.getElementById('userDept').textContent=t.department||'',document.getElementById('userPoints').textContent=currentPoints,document.getElementById('energyDisplay').textContent=`⚡ ${currentEnergy} энергии`,document.getElementById('levelIcon').textContent=getLevelIcon(currentEnergy),fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(e)}`).then(e=>e.json()).then(e=>{document.getElementById('teamCard').style.display=e?'block':'none'}),loadInProgressTasks()):document.getElementById('loginError').textContent='Пользователь не найден'}).catch(()=>{document.getElementById('loginError').textContent='Ошибка соединения'}):document.getElementById('loginError').textContent='Введите логин'}function logout(){localStorage.removeItem('karmabank_login'),currentLogin='',document.getElementById('mainScreen').style.display='none',document.getElementById('loginScreen').style.display='flex',document.getElementById('loginInput').value=''}async function loadInProgressTasks(){const e=await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`),t=await e.json(),l=document.getElementById('inProgressTasks');0===t.length?l.innerHTML=`<div class="empty-tasks"><p>Нет активных заданий</p></div>`:l.innerHTML=t.slice(0,5).map(e=>{let t='';return e.isGlobal?t=`<button class="btn" onclick="takeTask('${e.task}')">Взять</button>`:'Назначено'===e.status?t=`<button class="btn" onclick="takeTask('${e.task}')">Взять</button>`:'В работе'===e.status?t=`<button class="btn" onclick="openCommentModal('${e.task}')">Выполнить</button>`:'На проверке'===e.status?t=`<span class="status-active">На проверке</span>`:'Выполнено'===e.status&&(t=`<span class="status-active">Выполнено</span>`),`<div class="task-card"><span>${e.task} (${e.points} карм.) ${e.isGlobal?'<span class="status-global">Общее</span>':''}</span>${t}</div>`}).join('')}async function takeTask(e){const t=event.target;t.disabled=!0,t.textContent='...';try{await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(e)}&login=${encodeURIComponent(currentLogin)}`),loadInProgressTasks()}catch(e){t.disabled=!1,t.textContent='Взять'}}function openCommentModal(e){const t=document.createElement('div');t.className='modal active',t.innerHTML=`<div class="modal-content"><h3>Отчёт о выполнении</h3><textarea id="commentInput" placeholder="Опишите, что сделано..."></textarea><button class="btn" id="submitBtn">Отправить на проверку</button><button class="modal-close-btn" id="cancelBtn">Отмена</button></div>`,document.body.appendChild(t),document.getElementById('submitBtn').onclick=async()=>{const l=document.getElementById('commentInput').value.trim();t.remove(),l&&(await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(e)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(l)}`),loadInProgressTasks())},document.getElementById('cancelBtn').onclick=()=>t.remove()}function openTransferModal(){document.getElementById('transferModal').classList.add('active')}function closeTransferModal(){document.getElementById('transferModal').classList.remove('active')}async function executeTransfer(){const e=document.getElementById('receiverLogin').value.trim(),t=document.getElementById('transferAmount').value,l=document.getElementById('transferComment').value.trim();if(!e||!t){document.getElementById('transferError').textContent='Заполните поля';return}showLoading();try{const n=await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(e)}&amount=${encodeURIComponent(t)}&comment=${encodeURIComponent(l)}`),o=await n.json();if(hideLoading(),o.success){closeTransferModal();const e=await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`),t=await e.json();t&&(currentPoints=t.points,document.getElementById('userPoints').textContent=currentPoints);const l=document.createElement('div');l.className='modal active',l.innerHTML=`<div class="modal-content"><h3>✅ Перевод выполнен</h3><button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button></div>`,document.body.appendChild(l)}else document.getElementById('transferError').textContent=o.message}catch(e){hideLoading()}}currentLogin&&(document.getElementById('loginScreen').style.display='none',document.getElementById('mainScreen').style.display='flex',fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`).then(e=>e.json()).then(async e=>{e&&(currentPoints=e.points||0,currentEnergy=e.energy||0,document.getElementById('userNameDisplay').textContent=e.name,document.getElementById('userDept').textContent=e.department||'',document.getElementById('userPoints').textContent=currentPoints,document.getElementById('energyDisplay').textContent=`⚡ ${currentEnergy} энергии`,await loadLevels(),document.getElementById('levelIcon').textContent=getLevelIcon(currentEnergy),loadInProgressTasks())}));</script></body></html>
