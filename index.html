<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #1a1a1a;
      --bg-card: #2a2a2a;
      --text-primary: #ffd700;
      --text-secondary: #b8860b;
      --accent: #ffd700;
      --accent-hover: #ffec80;
      --success: #ffd700;
      --warning: #ffaa00;
      --danger: #ff4444;
      --border: #ffd700;
      --shadow: 0 20px 40px rgba(255,215,0,0.3);
      --glow: 0 0 30px rgba(255,215,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #000000;
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
      user-select: none;
    }
    input[type="text"], input[type="number"] { user-select: text; }

    @keyframes spin-anim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spin { animation: spin-anim 0.6s linear; }

    .mascot-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      display: flex; align-items: center; gap: 12px;
      transition: transform 0.3s ease; cursor: pointer;
    }
    .mascot-bubble {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 18px; 
      box-shadow: var(--shadow); color: var(--text-primary);
      font-weight: 600; font-size: 0.9rem;
      opacity: 0; transform: translateX(20px); transition: all 0.3s ease;
      white-space: nowrap;
    }
    .mascot-bubble.visible { opacity: 1; transform: translateX(0); }
    .mascot-avatar {
      width: 70px; height: 70px; background: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 25px rgba(255,215,0,0.7);
      transition: transform 0.2s; overflow: hidden;
    }
    .mascot-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .hologram-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .hologram-overlay.active { opacity: 1; pointer-events: all; }
    .hologram-box {
      background: var(--bg-card); border: 1px solid var(--accent);
      border-radius: 30px; padding: 40px; text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,0.7);
      transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 360px; width: 90%;
    }
    .hologram-overlay.active .hologram-box { transform: scale(1); }

    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,215,0,0.5); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #b8860b);
      color: black; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #ffd700); transform: scale(1.02); }
    .login-btn:active { transform: scale(0.98); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .header h1 img { height: 1.8rem; vertical-align: middle; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info .role { background: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: black; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
      font-size: 0.85rem;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; width: 100%; display: flex; flex-direction: column; gap: 24px; }
    .balance-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 32px 24px; text-align: center;
      box-shadow: var(--shadow); transition: all 0.3s ease;
    }
    .balance-card h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; }
    .balance-value { font-size: 4rem; font-weight: 800; color: var(--success); line-height: 1.2; }
    .balance-subtext { color: var(--text-secondary); margin-top: 8px; }
    .level-badge {
      display: inline-block; background: rgba(255,215,0,0.15); border: 1px solid var(--accent);
      border-radius: 20px; padding: 6px 16px; font-weight: 600; font-size: 0.9rem;
      margin-top: 12px;
    }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .menu-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text-primary);
    }
    .menu-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--glow); }
    .menu-card .icon { font-size: 2rem; margin-bottom: 8px; }
    .menu-card h4 { font-size: 1rem; font-weight: 600; }
    .section { display: none; flex-direction: column; gap: 16px; }
    .section.active { display: flex; }
    .task-list, .reward-grid { display: flex; flex-direction: column; gap: 12px; }
    .task-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 16px; display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-status {
      padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }
    .status-pending { background: rgba(255,215,0,0.2); color: var(--warning); }
    .status-active { background: rgba(255,215,0,0.3); color: var(--accent); }
    .status-done { background: rgba(255,215,0,0.15); color: var(--success); }
    .btn {
      background: var(--accent); color: black; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-left: 12px;
    }
    .btn:hover { background: var(--accent-hover); transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .reward-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 16px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .reward-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; align-self: flex-start;
      margin-bottom: 8px;
    }
    .back-btn:hover { background: var(--border); }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg-card); border: 1px solid var(--accent);
      border-radius: 24px; padding: 30px; max-width: 400px; width: 90%;
      text-align: center; box-shadow: 0 0 50px rgba(255,215,0,0.6);
    }
    .modal-close { margin-top: 16px; }
  </style>
</head>
<body>
  <!-- Голограмма -->
  <div class="hologram-overlay" id="hologram">
    <div class="hologram-box">
      <div class="hologram-mascot"><img src="belchonok.png" alt="Бельчонок" style="height:80px;"></div>
      <h2 id="hologramMsg">+50 кармиков</h2>
      <div class="hologram-points" id="hologramPoints">0</div>
      <button class="btn" onclick="closeHologram()" style="margin-top:20px;">Отлично!</button>
    </div>
  </div>

  <!-- Маскот -->
  <div class="mascot-container">
    <div class="mascot-bubble" id="mascotBubble">А ты молодец!</div>
    <div class="mascot-avatar"><img src="belchonok.png" alt="Бельчонок"></div>
  </div>

  <!-- Форма входа -->
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2><img src="belchonok.png" style="height:2.5rem; vertical-align:middle;" alt="Бельчонок"> Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- Основной экран -->
  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1><img src="belchonok.png" style="height:1.8rem; vertical-align:middle;" alt="Бельчонок"> Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <span class="role" id="userDept"></span>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>

    <div class="container">
      <div id="dashboard">
        <div class="balance-card">
          <h3>Ваш баланс</h3>
          <div class="balance-value" id="userPoints">0</div>
          <div class="balance-subtext">кармиков</div>
          <div class="level-badge" id="levelBadge" style="display:none;"></div>
        </div>
        <div class="menu-grid" style="margin-top:20px;">
          <div class="menu-card" onclick="showSection('tasks')">
            <div class="icon">✅</div>
            <h4>Доступные задания</h4>
          </div>
          <div class="menu-card" onclick="showSection('rewards')">
            <div class="icon">🎁</div>
            <h4>Витрина наград</h4>
          </div>
          <div class="menu-card" onclick="window.location.href='/reputation.html'">
            <div class="icon">⭐</div>
            <h4>Кармический путь</h4>
          </div>
          <div class="menu-card" id="teamCard" onclick="window.location.href='/manager.html'">
            <div class="icon">👥</div>
            <h4>Моя команда</h4>
          </div>
          <div class="menu-card" onclick="openTransferModal()">
            <div class="icon">💸</div>
            <h4>Перевести кармики</h4>
          </div>
        </div>
      </div>

      <div id="tasksSection" class="section">
        <button class="back-btn" onclick="showDashboard()">← Назад</button>
        <div class="task-list" id="taskList"></div>
      </div>

      <div id="rewardsSection" class="section">
        <button class="back-btn" onclick="showDashboard()">← Назад</button>
        <div class="reward-grid" id="rewardGrid"></div>
      </div>
    </div>
  </div>

  <!-- Модальное окно перевода -->
  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2>Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя" style="width:100%; margin:10px 0; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-primary);">
      <input type="number" id="transferAmount" placeholder="Сумма" style="width:100%; margin:10px 0; padding:10px; border-radius:10px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-primary);">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="btn modal-close" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" class="login-error"></div>
    </div>
  </div>

  <!-- Модальное окно сертификата -->
  <div id="certModal" class="modal">
    <div class="modal-content" id="certContent"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0, currentEnergy = 0;
    let levelsCache = [];

    async function loadLevels() {
      try { const res = await fetch(`${API_URL}?action=getLevels`); levelsCache = await res.json(); } catch(e) {}
    }

    function getLevelInfo(energy) {
      if (!levelsCache.length) return { icon: '🐟', name: 'Малёк' };
      let level = levelsCache[0];
      for (let i = levelsCache.length-1; i >= 0; i--) {
        if (energy >= levelsCache[i].energy) { level = levelsCache[i]; break; }
      }
      return { icon: level.icon, name: level.name };
    }

    function showMascotMessage(msg) {
      const bubble = document.getElementById('mascotBubble');
      bubble.textContent = msg;
      bubble.classList.add('visible');
      setTimeout(() => bubble.classList.remove('visible'), 4000);
    }

    function showHologram(points) {
      document.getElementById('hologramMsg').textContent = `+${points} кармиков`;
      document.getElementById('hologramPoints').textContent = currentPoints;
      document.getElementById('hologram').classList.add('active');
    }

    window.closeHologram = function() {
      document.getElementById('hologram').classList.remove('active');
    };

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(async user => {
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            await loadLevels();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            const levelInfo = getLevelInfo(currentEnergy);
            const badge = document.getElementById('levelBadge');
            badge.textContent = `${levelInfo.icon} ${levelInfo.name} · ${currentEnergy} энергии`;
            badge.style.display = 'inline-block';
            showMascotMessage(`Привет, ${user.name}!`);
            // Проверка прав руководителя
            fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(login)}`)
              .then(r => r.json())
              .then(isManager => {
                document.getElementById('teamCard').style.display = isManager ? 'block' : 'none';
              });
            showDashboard();
          } else {
            document.getElementById('loginError').textContent = 'Пользователь не найден';
          }
        })
        .catch(() => { document.getElementById('loginError').textContent = 'Ошибка соединения'; });
    }

    function logout() {
      localStorage.removeItem('karmabank_login');
      currentLogin = '';
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    function showDashboard() {
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('tasksSection').style.display = 'none';
      document.getElementById('rewardsSection').style.display = 'none';
      fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(user => {
          if (user) {
            document.getElementById('userPoints').textContent = user.points || 0;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            const levelInfo = getLevelInfo(currentEnergy);
            const badge = document.getElementById('levelBadge');
            badge.textContent = `${levelInfo.icon} ${levelInfo.name} · ${currentEnergy} энергии`;
            badge.style.display = 'inline-block';
          }
        });
    }

    function showSection(section) {
      document.getElementById('dashboard').style.display = 'none';
      if (section === 'tasks') {
        document.getElementById('tasksSection').style.display = 'flex';
        loadTasks();
      } else if (section === 'rewards') {
        document.getElementById('rewardsSection').style.display = 'flex';
        loadRewards();
      }
    }

    async function loadTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const tasks = await res.json();
      const list = document.getElementById('taskList');
      list.innerHTML = tasks.map(t => {
        let statusClass = 'status-pending';
        if (t.status === 'В работе') statusClass = 'status-active';
        else if (t.status === 'Выполнено') statusClass = 'status-done';
        return `<div class="task-item">
          <span>${t.task} <span style="color:var(--text-secondary);">(${t.points} карм.)</span></span>
          <span class="task-status ${statusClass}">${t.status || 'Назначено'}</span>
          ${t.status === 'Назначено' ? `<button class="btn" onclick="takeTask('${t.task}', this)">Взять</button>` : ''}
          ${t.status === 'В работе' ? `<button class="btn" onclick="completeTask('${t.task}', this)">Выполнить</button>` : ''}
        </div>`;
      }).join('');
    }

    async function takeTask(taskName, btn) {
      btn.classList.add('spin');
      setTimeout(() => btn.classList.remove('spin'), 600);
      await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
      showMascotMessage('За дело!');
      await loadTasks();
    }

    async function completeTask(taskName, btn) {
      btn.classList.add('spin');
      setTimeout(() => btn.classList.remove('spin'), 600);
      const res = await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
      const result = await res.json();
      if (result.success) {
        const userRes = await fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(currentLogin)}`);
        const user = await userRes.json();
        if (user) {
          currentPoints = user.points || 0;
          currentEnergy = user.energy || 0;
          document.getElementById('userPoints').textContent = currentPoints;
          const levelInfo = getLevelInfo(currentEnergy);
          const badge = document.getElementById('levelBadge');
          badge.textContent = `${levelInfo.icon} ${levelInfo.name} · ${currentEnergy} энергии`;
          badge.style.display = 'inline-block';
          showHologram(result.message.match(/\d+/)[0]);
          showMascotMessage('Великолепно!');
        }
        await loadTasks();
      } else {
        alert(result.message);
      }
    }

    async function loadRewards() {
      const res = await fetch(`${API_URL}?action=getRewards`);
      const rewards = await res.json();
      document.getElementById('rewardGrid').innerHTML = rewards.map(r => `
        <div class="reward-item" onclick="buyReward('${r.name}')">
          <span>🎁</span>
          <h4>${r.name}</h4>
          <span>${r.cost} карм.</span>
        </div>
      `).join('');
    }

    function buyReward(rewardName) {
      fetch(`${API_URL}?action=buyReward&reward=${encodeURIComponent(rewardName)}&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(result => {
          if (result.success) {
            showCertificate(result.certificate);
            // обновить баланс
            fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(currentLogin)}`)
              .then(r => r.json())
              .then(user => {
                currentPoints = user.points || 0;
                document.getElementById('userPoints').textContent = currentPoints;
              });
          } else {
            alert(result.message);
          }
        });
    }

    function showCertificate(cert) {
      document.getElementById('certContent').innerHTML = `
        <h2>🎉 Сертификат</h2>
        <p style="font-size:1.2rem; margin:10px 0;">Настоящий сертификат подтверждает, что</p>
        <h3>${cert.userName}</h3>
        <p>приобрёл(а) право на</p>
        <h2>${cert.rewardName}</h2>
        <p>Стоимость: ${cert.cost} кармиков</p>
        <p>Дата: ${cert.date}</p>
        <p>Действителен до: ${cert.validUntil}</p>
        <p style="margin-top:20px;">Печать Кармического банка<br>🐿️</p>
        <button class="btn modal-close" onclick="document.getElementById('certModal').classList.remove('active')">Закрыть</button>
      `;
      document.getElementById('certModal').classList.add('active');
    }

    function openTransferModal() {
      document.getElementById('transferModal').classList.add('active');
    }

    function closeTransferModal() {
      document.getElementById('transferModal').classList.remove('active');
      document.getElementById('transferError').textContent = '';
    }

    function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      if (!receiver || !amount) {
        document.getElementById('transferError').textContent = 'Заполните все поля';
        return;
      }
      fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}`)
        .then(r => r.json())
        .then(result => {
          if (result.success) {
            alert(result.message);
            closeTransferModal();
            // обновить баланс
            fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(currentLogin)}`)
              .then(r => r.json())
              .then(user => {
                currentPoints = user.points || 0;
                document.getElementById('userPoints').textContent = currentPoints;
              });
          } else {
            document.getElementById('transferError').textContent = result.message;
          }
        });
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      loadLevels().then(() => {
        fetch(`${API_URL}?action=getUser&login=${encodeURIComponent(currentLogin)}`)
          .then(r => r.json())
          .then(user => {
            if (user && user.name) {
              currentPoints = user.points || 0;
              currentEnergy = user.energy || 0;
              document.getElementById('userNameDisplay').textContent = user.name;
              document.getElementById('userDept').textContent = user.department || '';
              document.getElementById('userPoints').textContent = currentPoints;
              const levelInfo = getLevelInfo(currentEnergy);
              const badge = document.getElementById('levelBadge');
              badge.textContent = `${levelInfo.icon} ${levelInfo.name} · ${currentEnergy} энергии`;
              badge.style.display = 'inline-block';
              fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(currentLogin)}`)
                .then(r => r.json())
                .then(isManager => {
                  document.getElementById('teamCard').style.display = isManager ? 'block' : 'none';
                });
              showDashboard();
            } else {
              logout();
            }
          });
      });
    }
  </script>
</body>
</html>
