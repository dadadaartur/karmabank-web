<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #1f3350;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --cosmic-glow: 0 0 25px rgba(99, 102, 241, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
      user-select: none;
      font-size: 16px;
    }
    input[type="text"], input[type="number"], textarea { user-select: text; }

    /* Анимации */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes karmaGlow {
      0% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; }
      50% { text-shadow: 0 0 20px #34d399, 0 0 35px #059669; }
      100% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(249,115,22,0.8)); }
      100% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); }
    }
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes cosmicPulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); transform: scale(1.02); }
    .login-btn:active { transform: scale(0.98); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .user-info { display: flex; align-items: center; gap: 16px; }
    .user-name-link {
      font-weight: 700; font-size: 1rem; cursor: pointer;
      background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.2s;
    }
    .user-name-link:hover { transform: scale(1.05); }
    .user-dept {
      color: #c084fc; font-weight: 500; font-size: 0.85rem;
      background: rgba(139, 92, 246, 0.1); padding: 4px 12px; border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .chat-header-btn {
      background: transparent; border: none; color: #10b981;
      padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; animation: karmaGlow 2s infinite; transition: all 0.2s;
    }
    .chat-header-btn:hover { color: #34d399; text-shadow: 0 0 15px #34d399; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container {
      max-width: 1300px; width: 100%; margin: 0 auto;
      padding: 24px; display: grid;
      grid-template-columns: 420px 1fr; gap: 32px; align-items: start;
    }
    .left-column { display: flex; flex-direction: column; gap: 24px; }

    /* Карточка баланса */
    .balance-card {
      background: var(--bg-card); border-radius: 24px; padding: 28px 20px; text-align: center;
      border: 1px solid var(--border); position: relative;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4); overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(16,185,129,0.08) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(249,115,22,0.06) 0%, transparent 50%);
      background-size: 200% 200%;
      animation: aurora 12s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .balance-card > * { position: relative; z-index: 1; }

    .balance-label {
      font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 8px;
      background: linear-gradient(135deg, #34d399, #10b981, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 600;
      text-shadow: 0 0 8px rgba(16,185,129,0.5);
    }
    .balance-value {
      font-size: 3.8rem; font-weight: 800;
      background: linear-gradient(135deg, #10b981, #34d399, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: karmaGlow 2.5s infinite;
      line-height: 1; margin-bottom: 4px;
    }
    .balance-sub {
      font-size: 1.1rem; margin-bottom: 12px;
      background: linear-gradient(135deg, #34d399, #10b981, #059669);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-weight: 600;
      text-shadow: 0 0 8px rgba(16,185,129,0.5);
    }
    .energy-frame {
      display: inline-block; border: 2px solid var(--accent); border-radius: 20px;
      padding: 6px 18px; background: rgba(249,115,22,0.05); margin-bottom: 20px;
    }
    .energy-line { font-size: 1rem; color: var(--accent); font-weight: 600; }

    .balance-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .action-btn {
      background: var(--border); color: var(--text-primary); border: none;
      padding: 16px 20px; border-radius: 20px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600;
      transition: all 0.3s ease;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      min-width: 90px; flex: 1;
    }
    .action-btn .icon-wrapper { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .action-btn svg {
      width: 36px; height: 36px;
      fill: none; stroke: var(--text-secondary); stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
      transition: all 0.3s ease;
    }
    .action-btn:hover { background: var(--accent); transform: scale(1.05); box-shadow: var(--cosmic-glow); }
    .action-btn:hover svg { stroke: white; stroke-width: 2; animation: pulse-glow 1.5s infinite; }

    .level-icon {
      position: absolute; top: 14px; right: 14px; font-size: 2.5rem; z-index: 1;
      filter: drop-shadow(0 0 10px rgba(249,115,22,0.8));
      transition: transform 0.3s;
    }
    .level-icon:hover { transform: scale(1.2); }

    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .menu-card {
      background: var(--bg-card); border-radius: 18px; padding: 20px; text-align: center;
      border: 1px solid var(--border); transition: all 0.2s ease;
      display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
    }
    .menu-card .menu-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
    .menu-card svg {
      width: 40px; height: 40px; fill: none; stroke: var(--text-secondary);
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s ease;
    }
    .menu-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(249,115,22,0.2); }
    .menu-card:hover svg { stroke: var(--accent); animation: pulse-glow 1.5s infinite; }
    .menu-card.disabled { opacity: 0.5; cursor: default; pointer-events: none; }
    .menu-card.disabled:hover { border-color: var(--border); transform: none; box-shadow: none; }

    .tasks-panel h3 {
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      font-size: 1.2rem; margin-bottom: 14px;
    }
    .tasks-panel h3:hover { color: var(--accent); }
    .task-card {
      background: var(--bg-card); border-radius: 18px; padding: 16px 18px; margin-bottom: 12px;
      border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(16,185,129,0.06) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 40%);
      background-size: 200% 200%; animation: aurora 10s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .task-card > * { position: relative; z-index: 1; }
    .task-card:hover { border-color: var(--accent); }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .empty-tasks { color: var(--text-secondary); padding: 30px; text-align: center; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }
    .knowledge-fab {
      position: fixed; bottom: 24px; right: 24px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 24px; padding: 16px 20px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; border: none; color: white; font-weight: 700;
      box-shadow: 0 10px 30px rgba(249,115,22,0.5);
      transition: transform 0.3s; z-index: 1000; font-size: 0.95rem;
    }
    .knowledge-fab img { height: 28px; }
    .knowledge-fab:hover { transform: translateY(-3px); }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-hover); box-shadow: var(--cosmic-glow); }
    .btn.take-global { background: var(--success); }
    .btn.take-global:hover { background: #059669; box-shadow: 0 0 20px rgba(16,185,129,0.6); }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent); border-radius: 28px; padding: 36px;
      max-width: 440px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6), 0 0 120px rgba(99, 102, 241, 0.2);
      animation: modalPop 0.4s ease;
    }
    .modal-content h3 {
      font-size: 1.4rem; margin-bottom: 20px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .modal-content input, .modal-content textarea {
      width: 100%; padding: 14px; margin-bottom: 16px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text-primary); font-size: 1rem;
      outline: none;
    }
    .modal-content input:focus, .modal-content textarea:focus { border-color: var(--accent); }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 12px 24px; border-radius: 24px; cursor: pointer; margin-top: 16px;
      transition: all 0.2s;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    /* Прелоадер (шарообразная звезда) */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
    }
    .cosmic-spinner {
      width: 60px; height: 60px;
      animation: spin 1.5s linear infinite;
      filter: drop-shadow(0 0 20px #c084fc);
    }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 16px; }
      .balance-value { font-size: 2.8rem; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1 onclick="location.reload()">Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay" class="user-name-link" onclick="window.location.href='/profile.html'"></span>
        <span class="user-dept" id="userDept"></span>
        <button class="chat-header-btn" onclick="window.location.href='/chat.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Чат
        </button>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="left-column">
        <div class="balance-card">
          <div class="level-icon" id="levelIcon"></div>
          <div class="balance-label">кармиков</div>
          <div class="balance-value" id="userPoints">0</div>
          <div class="energy-frame">
            <div class="energy-line" id="energyDisplay">⚡ 0 энергии</div>
          </div>
          <div class="balance-actions">
            <button class="action-btn" onclick="openTransferModal()">
              <span class="icon-wrapper">
                <!-- Иконка перевода (две стрелки обмена) -->
                <svg viewBox="0 0 24 24">
                  <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#38bdf8"/>
                    </linearGradient>
                  </defs>
                  <path d="M8 3L4 7l4 4" stroke="url(#grad1)"/>
                  <path d="M4 7h16" stroke="url(#grad1)"/>
                  <path d="M16 21l4-4-4-4" stroke="url(#grad1)"/>
                  <path d="M20 17H4" stroke="url(#grad1)"/>
                </svg>
              </span>
              Перевести
            </button>
            <button class="action-btn" onclick="window.location.href='/spend.html'">
              <span class="icon-wrapper">
                <!-- Корзина -->
                <svg viewBox="0 0 24 24">
                  <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f59e0b"/>
                    </linearGradient>
                  </defs>
                  <path d="M3 3h2l1 5h13l1.5 7H6" stroke="url(#grad2)"/>
                  <circle cx="8" cy="20" r="1.5" stroke="url(#grad2)"/>
                  <circle cx="17" cy="20" r="1.5" stroke="url(#grad2)"/>
                </svg>
              </span>
              Магазин
            </button>
            <button class="action-btn" onclick="window.location.href='/history.html'">
              <span class="icon-wrapper">
                <!-- Журнал -->
                <svg viewBox="0 0 24 24">
                  <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/>
                    </linearGradient>
                  </defs>
                  <rect x="3" y="3" width="18" height="18" rx="3" stroke="url(#grad3)"/>
                  <path d="M3 9h18" stroke="url(#grad3)"/>
                  <path d="M8 3v18" stroke="url(#grad3)"/>
                  <circle cx="7" cy="13" r="1" fill="url(#grad3)" stroke="none"/>
                  <circle cx="15" cy="7" r="1" fill="url(#grad3)" stroke="none"/>
                </svg>
              </span>
              Операции
            </button>
          </div>
        </div>
        <div class="menu-grid">
          <div class="menu-card" onclick="window.location.href='/simulator.html'">
            <span class="menu-icon">
              <svg viewBox="0 0 24 24">
                <defs>
                  <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#818cf8"/>
                  </linearGradient>
                </defs>
                <circle cx="12" cy="12" r="8" stroke="url(#grad4)"/>
                <circle cx="12" cy="12" r="3" stroke="url(#grad4)"/>
                <path d="M12 4v2M12 18v2M4 12h2M18 12h2" stroke="url(#grad4)"/>
              </svg>
            </span>
            Тренировка
          </div>
          <div class="menu-card disabled">
            <span class="menu-icon">
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="var(--text-secondary)"/>
                <path d="M8 6v12" stroke="var(--text-secondary)"/>
              </svg>
            </span>
            Обучение
          </div>
          <div class="menu-card" onclick="window.location.href='/purchases.html'">
            <span class="menu-icon">
              <svg viewBox="0 0 24 24">
                <defs>
                  <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#c084fc"/>
                  </linearGradient>
                </defs>
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="url(#grad5)"/>
                <path d="M3 6h18" stroke="url(#grad5)"/>
                <path d="M16 10a4 4 0 0 1-8 0" stroke="url(#grad5)"/>
                <polyline points="9 14 12 17 15 14" stroke="url(#grad5)"/>
              </svg>
            </span>
            Мои покупки
          </div>
          <div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'">
            <span class="menu-icon">
              <svg viewBox="0 0 24 24">
                <defs>
                  <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#f97316"/>
                  </linearGradient>
                </defs>
                <circle cx="8" cy="7" r="3" stroke="url(#grad6)"/>
                <circle cx="18" cy="7" r="3" stroke="url(#grad6)"/>
                <path d="M3 21v-2a4 4 0 0 1 4-4h2" stroke="url(#grad6)"/>
                <path d="M21 21v-2a4 4 0 0 0-4-4h-2" stroke="url(#grad6)"/>
              </svg>
            </span>
            Команда
          </div>
        </div>
      </div>
      <div class="tasks-panel">
        <h3 onclick="window.location.href='/tasks.html'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Задания
        </h3>
        <div id="inProgressTasks">Нет активных заданий</div>
      </div>
    </div>
    <button class="knowledge-fab" onclick="window.location.href='/knowledge.html'">
      <img src="belchonok.png" alt="Путеводная звезда"> База знаний
    </button>
  </div>

  <!-- Модальные окна (перевод, алерт) -->
  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2 style="color: white;">Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <input type="text" id="transferComment" placeholder="Комментарий (необязательно)">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0, currentEnergy = 0;
    let levelsCache = [];

    // Кастомное уведомление
    function showAlert(message, type) {
      const icons = { success: '✅', error: '❌', info: '🌟' };
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <div style="font-size: 2.5rem;">${icons[type] || icons.info}</div>
          <p style="margin:16px 0; color:var(--text-primary); font-size:1.1rem;">${message}</p>
          <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
        </div>`;
      document.body.appendChild(modal);
    }

    async function loadLevels() { try { const res = await fetch(`${API_URL}?action=getLevels`); levelsCache = await res.json(); } catch(e) {} }
    function getLevelInfo(energy) {
      if (!levelsCache.length) return { icon: '✦', name: 'Искра' };
      let level = levelsCache[0];
      for (let i = levelsCache.length-1; i >= 0; i--) { if (energy >= levelsCache[i].energy) { level = levelsCache[i]; break; } }
      return { icon: level.icon, name: level.name };
    }

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `
        <svg class="cosmic-spinner" viewBox="0 0 60 60" fill="none">
          <defs>
            <radialGradient id="sphereGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#c084fc" stop-opacity="1"/>
              <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
            </radialGradient>
          </defs>
          <circle cx="30" cy="30" r="25" fill="url(#sphereGrad)" opacity="0.8"/>
          <g stroke="white" stroke-width="2" stroke-linecap="round">
            <line x1="30" y1="2" x2="30" y2="10"/>
            <line x1="30" y1="50" x2="30" y2="58"/>
            <line x1="2" y1="30" x2="10" y2="30"/>
            <line x1="50" y1="30" x2="58" y2="30"/>
          </g>
          <polygon points="30,5 33,13 42,13 35,18 38,26 30,22 22,26 25,18 18,13 27,13" fill="white" opacity="0.9"/>
        </svg>
        <p style="color:var(--text-secondary);">Идёт загрузка...</p>
      `;
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.remove();
    }

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(async user => {
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            await loadLevels();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            document.getElementById('levelIcon').textContent = getLevelInfo(currentEnergy).icon;
            fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(login)}`)
              .then(r => r.json())
              .then(isManager => { document.getElementById('teamCard').style.display = isManager ? 'block' : 'none'; });
            loadInProgressTasks();
            hideLoading();
          } else { hideLoading(); document.getElementById('loginError').textContent = 'Пользователь не найден'; }
        })
        .catch(() => { hideLoading(); document.getElementById('loginError').textContent = 'Ошибка соединения'; });
    }

    function logout() {
      localStorage.removeItem('karmabank_login');
      currentLogin = '';
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    async function loadInProgressTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const tasks = await res.json();
      const displayTasks = tasks.slice(0, 5);
      const container = document.getElementById('inProgressTasks');
      if (displayTasks.length === 0) {
        container.innerHTML = `<div class="empty-tasks"><p>Нет активных заданий</p></div>`;
        return;
      }
      container.innerHTML = displayTasks.map(t => {
        let btnHtml = '';
        if (t.isGlobal) {
          btnHtml = `<button class="btn take-global" onclick="event.stopPropagation(); takeTask(event, '${t.task}')">Взять</button>`;
        } else if (t.status === 'Назначено') {
          btnHtml = `<button class="btn" onclick="event.stopPropagation(); takeTask(event, '${t.task}')">Взять</button>`;
        } else if (t.status === 'В работе') {
          btnHtml = `<button class="btn" onclick="event.stopPropagation(); openCommentModal('${t.task}')">Выполнить</button>`;
        } else if (t.status === 'На проверке') {
          btnHtml = `<span class="status-active">На проверке</span>`;
        } else if (t.status === 'Выполнено') {
          btnHtml = `<span class="status-active">Выполнено</span>`;
        }
        return `<div class="task-card" onclick="window.location.href='/tasks.html'"><span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status-global">Общее</span>' : ''}</span>${btnHtml}</div>`;
      }).join('');
    }

    async function takeTask(event, taskName) {
      const btn = event.currentTarget;
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
        const data = await res.json();
        if (data && data.success) {
          loadInProgressTasks();
        } else {
          showAlert(data?.message || 'Не удалось взять задание', 'error');
          btn.disabled = false;
          btn.textContent = 'Взять';
        }
      } catch (e) {
        showAlert('Ошибка соединения', 'error');
        btn.disabled = false;
        btn.textContent = 'Взять';
      }
    }

    function openCommentModal(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h3>Отчёт о выполнении</h3>
        <textarea id="commentInput" placeholder="Опишите, что было сделано..."></textarea>
        <button class="btn" id="submitCommentBtn">Отправить на проверку</button>
        <button class="modal-close-btn" id="cancelCommentBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('submitCommentBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        modal.remove();
        if (!comment) return;
        showLoading();
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`);
        hideLoading();
        loadInProgressTasks();
      };
      document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    }

    function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }
    async function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      const comment = document.getElementById('transferComment').value.trim();
      if (!receiver || !amount) { document.getElementById('transferError').textContent = 'Заполните обязательные поля'; return; }
      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}&comment=${encodeURIComponent(comment)}`);
        const result = await res.json();
        hideLoading();
        if (result.success) {
          closeTransferModal();
          const userRes = await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`);
          const user = await userRes.json();
          if (user) { currentPoints = user.points; document.getElementById('userPoints').textContent = currentPoints; }
          showAlert('Перевод выполнен!', 'success');
        } else { document.getElementById('transferError').textContent = result.message; }
      } catch (e) { hideLoading(); document.getElementById('transferError').textContent = 'Ошибка соединения'; }
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(async user => {
          if (user) {
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            await loadLevels();
            document.getElementById('levelIcon').textContent = getLevelInfo(currentEnergy).icon;
            loadInProgressTasks();
            hideLoading();
          } else { hideLoading(); }
        })
        .catch(() => hideLoading());
    }
  </script>
</body>
</html>
