<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --accent-hover: #ea580c; --success: #10b981; --warning: #f59e0b;
      --danger: #ef4444; --border: #1f3350; --shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column;
      overflow-x: hidden; user-select: none;
    }
    input[type="text"], input[type="number"], textarea { user-select: text; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes karmaGlow {
      0% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; }
      50% { text-shadow: 0 0 20px #34d399, 0 0 35px #059669; }
      100% { text-shadow: 0 0 10px #10b981, 0 0 20px #10b981; }
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); }
      50% { filter: drop-shadow(0 0 15px rgba(249,115,22,0.8)); }
      100% { filter: drop-shadow(0 0 5px rgba(249,115,22,0.4)); }
    }
    @keyframes aurora {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes transformToCheck {
      0% { opacity: 1; transform: scale(1) rotate(45deg); }
      50% { opacity: 0.5; transform: scale(1.5) rotate(45deg); }
      100% { opacity: 0; transform: scale(1) rotate(45deg); }
    }
    @keyframes checkAppear {
      0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); }
    }

    .loading-arrows { display: flex; gap: 10px; align-items: center; justify-content: center; }
    .arrow {
      width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg); box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center;
    }
    .success-animation { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .success-animation .arrows { display: flex; gap: 6px; animation: transformToCheck 0.8s forwards; }
    .success-animation .checkmark {
      display: none; width: 30px; height: 30px; background: linear-gradient(135deg, #10b981, #34d399);
      clip-path: polygon(30% 50%, 15% 65%, 0% 50%, 15% 35%); animation: checkAppear 0.4s forwards;
    }

    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px;
      padding: 40px 30px; box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); transform: scale(1.02); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; }
    .header-left-group { display: flex; align-items: center; gap: 16px; }
    .user-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-name-link {
      font-weight: 700; font-size: 1rem; cursor: pointer;
      background: linear-gradient(135deg, #c084fc, #818cf8, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .user-level-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3);
      padding: 4px 10px; border-radius: 20px;
    }
    .user-level-badge .level-icon { font-size: 1.5rem; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .user-dept {
      color: #c084fc; font-weight: 500; font-size: 0.85rem;
      background: rgba(139, 92, 246, 0.1); padding: 4px 12px; border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .path-to-perfect {
      background: transparent; border: 1px solid var(--border); color: var(--text-primary);
      padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .path-to-perfect svg { width: 16px; height: 16px; stroke: url(#perfectStar); fill: none; }
    .path-to-perfect:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(249,115,22,0.5); }
    .health-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 14px; border-radius: 20px; cursor: default; font-weight: 700;
      font-size: 0.8rem; display: flex; align-items: center; gap: 6px;
    }
    .health-btn svg { width: 16px; height: 16px; stroke: #ef4444; }
    .chat-header-btn {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: 600;
      font-size: 0.8rem; display: flex; align-items: center; gap: 4px;
    }
    .chat-header-btn svg { width: 16px; height: 16px; stroke: currentColor; }
    .chat-header-btn:hover { background: var(--accent); color: white; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex;
      align-items: center; gap: 6px; font-size: 0.85rem;
    }
    .logout-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container { max-width: 1300px; width: 100%; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 420px 1fr; gap: 32px; align-items: start; }
    .left-column { display: flex; flex-direction: column; gap: 24px; }

    .balance-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border-radius: 24px; padding: 28px 20px 20px; text-align: center;
      border: 1px solid var(--border); position: relative;
      box-shadow: 0 15px 30px rgba(0,0,0,0.4); overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(16,185,129,0.08) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(249,115,22,0.06) 0%, transparent 50%);
      background-size: 200% 200%; animation: aurora 12s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .balance-card > * { position: relative; z-index: 1; }
    .balance-label {
      font-size: 1.2rem; letter-spacing: 2px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: karmaGlow 3s infinite; margin-bottom: 4px; font-weight: 700;
    }
    .balance-value {
      font-size: 3.8rem; font-weight: 800;
      background: linear-gradient(135deg, #10b981, #34d399, #f9a826, #f97316);
      background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: karmaGlow 2.5s infinite, gradientShift 4s ease infinite;
      line-height: 1; margin-bottom: 4px;
    }
    .balance-sub {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: karmaGlow 3s infinite; margin-bottom: 22px;
    }
    .energy-line-wide {
      display: block; width: 100%; text-align: center; font-size: 1rem;
      color: var(--accent); font-weight: 600; margin-bottom: 20px; padding: 8px;
      border-radius: 12px; background: rgba(249,115,22,0.05);
      border: 1px solid rgba(249,115,22,0.15);
    }
    .balance-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .action-btn {
      background: linear-gradient(135deg, rgba(21,38,56,0.8), rgba(15,31,53,0.8));
      color: var(--text-primary); border: 1px solid var(--border);
      padding: 16px 20px; border-radius: 20px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all 0.3s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      min-width: 90px; flex: 1;
    }
    .action-btn .icon-wrapper { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .action-btn svg { width: 36px; height: 36px; fill: none; stroke: var(--text-secondary); stroke-width: 1.5; transition: all 0.3s; }
    .action-btn:hover { background: transparent; box-shadow: 0 0 25px rgba(249,115,22,0.6); border-color: var(--accent); }
    .action-btn:hover svg { stroke: var(--accent); animation: pulse-glow 1.5s infinite; }

    .wide-btn {
      background: var(--border); border: 1px solid var(--border);
      color: var(--text-primary); border-radius: 20px; padding: 16px;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; margin-top: 8px;
    }
    .wide-btn svg { width: 28px; height: 28px; stroke: var(--text-secondary); }
    .wide-btn:hover { background: transparent; box-shadow: 0 0 20px rgba(249,115,22,0.5); border-color: var(--accent); }
    .wide-btn:hover svg { stroke: var(--accent); }

    .tasks-panel h3 {
      cursor: pointer; font-size: 1.4rem; font-weight: 800; margin-bottom: 18px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .task-card {
      background: var(--bg-card); border-radius: 18px; padding: 16px 18px; margin-bottom: 12px;
      border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(16,185,129,0.06) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 40%);
      background-size: 200% 200%; animation: aurora 10s linear infinite;
      z-index: 0; pointer-events: none;
    }
    .task-card > * { position: relative; z-index: 1; }
    .task-card:hover { border-color: var(--accent); }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
    .empty-tasks { color: var(--text-secondary); padding: 30px; text-align: center; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); }

    .fancy-buttons-row { display: flex; gap: 12px; margin-top: 20px; justify-content: space-between; }
    .fancy-btn-disabled {
      flex: 1; background: rgba(21,38,56,0.7); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px 10px; text-align: center;
      font-weight: 600; color: var(--text-secondary); cursor: default;
      transition: all 0.3s; backdrop-filter: blur(5px);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .fancy-btn-disabled svg { width: 20px; height: 20px; stroke: var(--text-secondary); }
    .fancy-btn-disabled:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(249,115,22,0.3); color: var(--text-primary); }
    .fancy-btn-disabled:hover svg { stroke: var(--accent); }

    .knowledge-fab {
      position: fixed; bottom: 24px; right: 24px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary); padding: 16px 20px; border-radius: 24px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.3s, border-color 0.3s; z-index: 1000; font-size: 0.95rem;
    }
    .knowledge-fab img { height: 28px; }
    .knowledge-fab:hover { border-color: var(--accent); box-shadow: 0 0 25px rgba(249,115,22,0.6); transform: translateY(-3px); }

    .btn {
      background: transparent; color: var(--accent); border: 1px solid var(--accent);
      padding: 8px 18px; border-radius: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .btn:hover { background: rgba(249,115,22,0.1); box-shadow: 0 0 15px rgba(249,115,22,0.4); }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 28px; padding: 36px;
      max-width: 440px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6), 0 0 120px rgba(99, 102, 241, 0.2);
      animation: modalPop 0.4s ease;
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 12px 24px; border-radius: 24px; cursor: pointer; margin-top: 16px;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 16px; }
      .balance-value { font-size: 2.8rem; }
      .header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" class="main-screen">
    <div class="header">
      <div class="header-left-group">
        <h1 onclick="location.reload()">Кармический банк</h1>
        <button class="path-to-perfect" onclick="window.location.href='/simulator.html'">
          <svg viewBox="0 0 24 24">
            <defs><linearGradient id="perfectStar" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs>
            <polygon points="12,2 14,8 21,9 16,14 18,21 12,17 6,21 8,14 3,9 10,8" stroke="url(#perfectStar)" fill="none"/>
          </svg>
          Путь к совершенству
        </button>
        <button class="health-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            <path d="M16 12h-4V8m0 0v8m0-8h4"/>
          </svg>
          Забота о здоровье
        </button>
      </div>
      <div class="user-info">
        <span id="userNameDisplay" class="user-name-link" onclick="window.location.href='/profile.html'"></span>
        <span class="user-level-badge" id="userLevelBadge"><span class="level-icon"></span></span>
        <span class="user-dept" id="userDept"></span>
        <button class="chat-header-btn" onclick="window.location.href='/chat.html'">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Чат
        </button>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Выйти
        </button>
      </div>
    </div>
    <div class="container">
      <div class="left-column">
        <div class="balance-card">
          <div class="balance-label">Баланс</div>
          <div class="balance-value" id="userPoints">0</div>
          <div class="balance-sub">кармиков</div>
          <div class="energy-line-wide" id="energyDisplay">⚡ 0 энергии</div>
          <div class="balance-actions">
            <button class="action-btn" onclick="openTransferModal()">
              <span class="icon-wrapper">
                <svg viewBox="0 0 24 24">
                  <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient></defs>
                  <path d="M2 7 L22 7 M15 2 L22 7 L15 12 M22 17 L2 17 M9 12 L2 17 L9 22" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
              </span>
              Перевести
            </button>
            <button class="action-btn" onclick="window.location.href='/spend.html'">
              <span class="icon-wrapper">
                <svg viewBox="0 0 24 24">
                  <defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs>
                  <path d="M12 4 C8 4 6 7 6 12 C6 16 9 20 12 20 C15 20 18 16 18 12 C18 7 16 4 12 4Z M12 2 L10 5 M14 2 L16 5" stroke="url(#g2)" stroke-width="1.5" fill="none"/>
                </svg>
              </span>
              Магазин
            </button>
            <button class="action-btn" onclick="window.location.href='/history.html'">
              <span class="icon-wrapper">
                <svg viewBox="0 0 24 24">
                  <defs><linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient></defs>
                  <rect x="3" y="3" width="18" height="18" rx="3" stroke="url(#g3)"/>
                  <path d="M3 9h18" stroke="url(#g3)"/>
                  <path d="M8 3v18" stroke="url(#g3)"/>
                  <circle cx="7" cy="13" r="1" fill="url(#g3)" stroke="none"/>
                  <circle cx="15" cy="7" r="1" fill="url(#g3)" stroke="none"/>
                </svg>
              </span>
              Операции
            </button>
          </div>
          <button class="wide-btn" onclick="window.location.href='/purchases.html'">
            <svg viewBox="0 0 24 24"><defs><linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs><path d="M5 7h14l-1 13H6L5 7z" stroke="url(#g4)"/><path d="M9 7V5a2 2 0 0 1 4 0v2" stroke="url(#g4)"/><path d="M9 11h6M9 15h4" stroke="url(#g4)"/></svg>
            Мои покупки
          </button>
        </div>
      </div>
      <div class="tasks-panel">
        <h3 onclick="window.location.href='/tasks.html'">Задания</h3>
        <div id="inProgressTasks">Нет активных заданий</div>
        <div class="fancy-buttons-row">
          <div class="fancy-btn-disabled">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L15 9 L22 10 L17 16 L19 22 L12 17 L5 22 L7 16 L2 10 L9 9 Z" stroke="currentColor"/><line x1="12" y1="14" x2="12" y2="20" stroke="currentColor"/></svg>
            Задания от партнёров
          </div>
          <div class="fancy-btn-disabled">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L15 8 L22 9 L17 14 L18 21 L12 17 L6 21 L7 14 L2 9 L9 8 Z" stroke="currentColor"/><circle cx="12" cy="14" r="5" fill="none" stroke="currentColor"/></svg>
            Турниры
          </div>
          <div class="fancy-btn-disabled">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L15 9 L22 10 L17 16 L19 22 L12 17 L5 22 L7 16 L2 10 L9 9 Z" stroke="currentColor"/><circle cx="12" cy="14" r="3" fill="none" stroke="currentColor"/></svg>
            Бизнес конференции
          </div>
        </div>
      </div>
    </div>
    <button class="knowledge-fab" onclick="window.location.href='/knowledge.html'">
      <img src="belchonok.png" alt="Путеводная звезда"> База знаний
    </button>
  </div>

  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2 style="color: white;">Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <input type="text" id="transferComment" placeholder="Комментарий (необязательно)">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0, currentEnergy = 0;
    let levelsCache = [];

    async function loadLevels() { try { const res = await fetch(`${API_URL}?action=getLevels`); levelsCache = await res.json(); } catch(e) {} }
    function getLevelIcon(energy) {
      const icons = ['✦','✧','⭑','✶','✷','✸'];
      if (!levelsCache.length) return icons[0];
      let idx = 0;
      for (let i=levelsCache.length-1; i>=0; i--) { if (energy >= levelsCache[i].energy) { idx = i; break; } }
      return icons[idx] || '✨';
    }

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(async user => {
          hideLoading();
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            await loadLevels();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.querySelector('#userLevelBadge .level-icon').textContent = getLevelIcon(currentEnergy);
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            fetch(`${API_URL}?action=isManager&login=${encodeURIComponent(login)}`)
              .then(r => r.json())
              .then(isManager => { if (isManager) document.getElementById('teamCard')?.style?.display = 'block'; });
            loadInProgressTasks();
          } else { document.getElementById('loginError').textContent = 'Пользователь не найден'; }
        })
        .catch(() => { hideLoading(); document.getElementById('loginError').textContent = 'Ошибка соединения'; });
    }

    function logout() {
      localStorage.removeItem('karmabank_login');
      currentLogin = '';
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    async function loadInProgressTasks() {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const tasks = await res.json();
      const activeTasks = tasks.filter(t => t.status === 'Назначено' || t.status === 'В работе');
      const container = document.getElementById('inProgressTasks');
      if (activeTasks.length === 0) {
        container.innerHTML = `<div class="empty-tasks"><p>Нет активных заданий</p></div>`;
        return;
      }
      container.innerHTML = activeTasks.slice(0, 3).map(t => {
        let btnHtml = '';
        if (t.status === 'Назначено') btnHtml = `<button class="btn" onclick="event.stopPropagation(); takeTask('${t.task}')">Взять</button>`;
        else if (t.status === 'В работе') btnHtml = `<button class="btn" onclick="event.stopPropagation(); openCommentModal('${t.task}')">Выполнить</button>`;
        return `<div class="task-card" onclick="window.location.href='/tasks.html'"><span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status-global">Общее</span>' : ''}</span>${btnHtml}</div>`;
      }).join('');
    }

    async function takeTask(taskName) {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '...';
      await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
      loadInProgressTasks();
    }

    function openCommentModal(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h3>Отчёт о выполнении</h3>
        <textarea id="commentInput" placeholder="Опишите, что было сделано..."></textarea>
        <button class="btn" id="submitCommentBtn">Отправить на проверку</button>
        <button class="modal-close-btn" id="cancelCommentBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('submitCommentBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        modal.remove();
        if (!comment) return;
        showLoading();
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`);
        hideLoading();
        loadInProgressTasks();
      };
      document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    }

    function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }
    async function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      const comment = document.getElementById('transferComment').value.trim();
      if (!receiver || !amount) { document.getElementById('transferError').textContent = 'Заполните обязательные поля'; return; }
      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}&comment=${encodeURIComponent(comment)}`);
        const result = await res.json();
        hideLoading();
        if (result.success) {
          closeTransferModal();
          const userRes = await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`);
          const user = await userRes.json();
          if (user) { currentPoints = user.points; document.getElementById('userPoints').textContent = currentPoints; }
          showSuccessAnimation();
        } else { document.getElementById('transferError').textContent = result.message; }
      } catch (e) { hideLoading(); document.getElementById('transferError').textContent = 'Ошибка соединения'; }
    }

    function showSuccessAnimation() {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content" style="text-align:center;">
        <div class="success-animation">
          <div class="arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>
          <div class="checkmark"></div>
        </div>
        <p style="color:var(--success); margin-top:20px;">Перевод выполнен!</p>
        <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
      </div>`;
      document.body.appendChild(modal);
      setTimeout(() => {
        const arrows = modal.querySelector('.arrows');
        const check = modal.querySelector('.checkmark');
        if (arrows) { arrows.style.animation = 'transformToCheck 0.8s forwards'; arrows.style.opacity = '0'; }
        if (check) { check.style.display = 'block'; check.style.animation = 'checkAppear 0.4s forwards'; }
      }, 100);
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      showLoading();
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(async user => {
          hideLoading();
          if (user) {
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            await loadLevels();
            document.querySelector('#userLevelBadge .level-icon').textContent = getLevelIcon(currentEnergy);
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
            loadInProgressTasks();
          }
        })
        .catch(() => hideLoading());
    }
  </script>
</body>
</html>
