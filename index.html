<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #1f3350;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a1628; color: var(--text-primary); user-select: none; }
    input, textarea { user-select: text; }
    .header { background: rgba(21,38,56,0.9); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 1.4rem; cursor: pointer; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
    .balance-panel { grid-column: 1; }
    .balance-card { background: var(--bg-card); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border); position: relative; }
    .balance-value { font-size: 3rem; font-weight: 800; color: var(--success); }
    .balance-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
    .balance-actions button { background: var(--border); color: var(--text-primary); border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 0.8rem; }
    .level-icon { position: absolute; top: 10px; right: 10px; font-size: 2rem; }
    .tasks-panel { grid-column: 2; }
    .task-card { background: var(--bg-card); border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .menu-card { background: var(--bg-card); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; border: 1px solid var(--border); }
    .menu-card:hover { border-color: var(--accent); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; text-align: center; border: 1px solid var(--accent); }
RL
  </style>
</head>
<body>
  <div id="app">
    <!-- Экран входа -->
    <div id="loginScreen" class="login-screen">
      <div class="login-form">
        <h2>🐿️ Кармический банк</h2>
        <input type="text" id="loginInput" placeholder="Логин">
        <button onclick="login()">Войти</button>
        <div id="loginError"></div>
      </div>
    </div>
    <!-- Основной экран -->
    <div id="mainScreen" style="display:none">
      <div class="header">
        <h1 onclick="location.reload()">🐿️ Кармический банк</h1>
        <div><span id="userNameDisplay"></span> | <button onclick="logout()">Выйти</button></div>
      </div>
      <div class="container">
        <div class="balance-panel">
          <div class="balance-card">
            <div class="level-icon" id="levelIcon"></div>
            <div style="font-size:0.9rem; color:var(--text-secondary)">Баланс</div>
            <div class="balance-value" id="userPoints">0</div>
            <div>кармиков</div>
            <div class="balance-actions">
              <button onclick="openTransferModal()">💰 Перевести</button>
              <button onclick="showSection('rewards')">🎁 Потратить</button>
            </div>
          </div>
          <div class="menu-grid">
            <div class="menu-card" onclick="showSection('tasks')">✅ Задания</div>
            <div class="menu-card" onclick="showSection('rewards')">🎁 Награды</div>
            <div class="menu-card" onclick="window.location.href='/reputation.html'">⭐ Путь</div>
            <div class="menu-card" id="teamCard" style="display:none" onclick="window.location.href='/manager.html'">👥 Команда</div>
            <div class="menu-card" onclick="window.location.href='/chat.html'">💬 Чат с ИИ</div>
            <div class="menu-card" onclick="openProfile()">👤 Профиль</div>
          </div>
        </div>
        <div class="tasks-panel">
          <h3>📋 В работе</h3>
          <div id="inProgressTasks"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- Модальные окна, скрипты -->
  <script src="app.js"></script>
</body>
</html>
