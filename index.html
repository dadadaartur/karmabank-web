<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --accent-hover: #ea580c;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #1f3350;
      --shadow: 0 20px 40px rgba(0,0,0,0.5);
      --glow: 0 0 30px rgba(249, 115, 22, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary);
      min-height: 100vh; 
      display: flex; flex-direction: column;
      overflow-x: hidden;
      position: relative;
      user-select: none;
    }
    input[type="text"], input[type="number"] { user-select: text; }

    /* Анимации */
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 5px var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: var(--shadow); width: 100%; max-width: 400px;
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.2); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); transform: scale(1.02); }
    .login-btn:active { transform: scale(0.98); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }

    .main-screen { display: none; flex-direction: column; flex: 1; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .header h1 img { height: 1.8rem; vertical-align: middle; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info .role { background: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
      font-size: 0.85rem;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }

    .container { max-width: 500px; margin: 0 auto; padding: 40px 20px; width: 100%; }

    .balance-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px; text-align: center;
      box-shadow: var(--shadow); transition: all 0.3s ease;
      margin-bottom: 30px;
    }
    .balance-value { font-size: 4rem; font-weight: 800; color: var(--success); line-height: 1.2; }
    .balance-subtext { color: var(--text-secondary); margin-top: 8px; }
    .energy-badge {
      display: inline-block; background: rgba(249,115,22,0.15); border: 1px solid var(--accent);
      border-radius: 20px; padding: 8px 20px; font-weight: 600; font-size: 1rem;
      margin-top: 16px;
    }
    .balance-actions { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
    .balance-actions button {
      background: var(--border); color: var(--text-primary); border: none;
      padding: 10px 20px; border-radius: 14px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s; font-weight: 600;
    }
    .balance-actions button:hover { background: var(--accent); transform: scale(1.05); }

    .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .nav-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text-primary);
    }
    .nav-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--glow); }
    .nav-card .icon { font-size: 2rem; margin-bottom: 8px; }
    .nav-card h4 { font-size: 0.9rem; font-weight: 600; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent);
      border-radius: 24px; padding: 30px; max-width: 400px; width: 90%;
      text-align: center; box-shadow: 0 0 50px rgba(249,115,22,0.6);
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
    .confirm-btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; margin: 10px;
    }
    .modal input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Экран входа -->
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2><img src="belchonok.png" style="height:2.5rem; vertical-align:middle;" alt="Бельчонок"> Кармический банк</h2>
      <p>Введите ваш логин, чтобы продолжить</p>
      <input type="text" id="loginInput" placeholder="Логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- Основной дашборд -->
  <div id="mainScreen" class="main-screen">
    <div class="header">
      <h1 onclick="location.reload()"><img src="belchonok.png" style="height:1.8rem; vertical-align:middle;" alt="Бельчонок"> Кармический банк</h1>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <span class="role" id="userDept"></span>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="balance-card">
        <div style="font-size:0.9rem; color:var(--text-secondary)">Ваш баланс</div>
        <div class="balance-value" id="userPoints">0</div>
        <div class="balance-subtext">кармиков</div>
        <div class="energy-badge" id="energyDisplay">⚡ 0 энергии</div>
        <div class="balance-actions">
          <button onclick="openTransferModal()">💰 Перевести</button>
          <button onclick="window.location.href='/spend.html'">🎁 Потратить</button>
        </div>
      </div>
      <div class="nav-grid">
        <div class="nav-card" onclick="window.location.href='/tasks.html'">
          <div class="icon">✅</div>
          <h4>Задания</h4>
        </div>
        <div class="nav-card" onclick="window.location.href='/spend.html'">
          <div class="icon">🎁</div>
          <h4>Магазин</h4>
        </div>
        <div class="nav-card" onclick="window.location.href='/chat.html'">
          <div class="icon">💬</div>
          <h4>Чат</h4>
        </div>
        <div class="nav-card" onclick="window.location.href='/profile.html'">
          <div class="icon">👤</div>
          <h4>Профиль</h4>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно перевода -->
  <div id="transferModal" class="modal">
    <div class="modal-content">
      <h2>Перевод кармиков</h2>
      <input type="text" id="receiverLogin" placeholder="Логин получателя">
      <input type="number" id="transferAmount" placeholder="Сумма">
      <button class="btn" onclick="executeTransfer()">Отправить</button>
      <button class="modal-close-btn" onclick="closeTransferModal()">Отмена</button>
      <div id="transferError" style="color:var(--danger); margin-top:8px"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_login') || '';
    let currentPoints = 0, currentEnergy = 0;

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`)
        .then(r => r.json())
        .then(user => {
          if (user && user.name) {
            localStorage.setItem('karmabank_login', login);
            currentLogin = login;
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'flex';
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
          } else {
            document.getElementById('loginError').textContent = 'Пользователь не найден';
          }
        })
        .catch(() => { document.getElementById('loginError').textContent = 'Ошибка соединения'; });
    }

    function logout() {
      localStorage.removeItem('karmabank_login');
      currentLogin = '';
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    function openTransferModal() { document.getElementById('transferModal').classList.add('active'); }
    function closeTransferModal() { document.getElementById('transferModal').classList.remove('active'); }

    async function executeTransfer() {
      const receiver = document.getElementById('receiverLogin').value.trim();
      const amount = document.getElementById('transferAmount').value;
      if (!receiver || !amount) {
        document.getElementById('transferError').textContent = 'Заполните все поля';
        return;
      }
      const res = await fetch(`${API_URL}?action=transferPoints&sender=${encodeURIComponent(currentLogin)}&receiver=${encodeURIComponent(receiver)}&amount=${encodeURIComponent(amount)}`);
      const result = await res.json();
      if (result.success) {
        closeTransferModal();
        alert('✅ Перевод выполнен!');
        const userRes = await fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`);
        const user = await userRes.json();
        if (user) { currentPoints = user.points || 0; document.getElementById('userPoints').textContent = currentPoints; }
      } else {
        document.getElementById('transferError').textContent = result.message;
      }
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`)
        .then(r => r.json())
        .then(user => {
          if (user) {
            currentPoints = user.points || 0;
            currentEnergy = user.energy || 0;
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userDept').textContent = user.department || '';
            document.getElementById('userPoints').textContent = currentPoints;
            document.getElementById('energyDisplay').textContent = `⚡ ${currentEnergy} энергии`;
          }
        });
    }
  </script>
</body>
</html>
