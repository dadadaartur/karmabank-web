<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Цифровой паспорт — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --success: #10b981;
      --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
      opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .passport-card {
      max-width: 600px;
      width: 100%;
      background: radial-gradient(circle at 20% 30%, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(249,115,22,0.3);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
    }
    .hologram {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(249,115,22,0.03) 20px, rgba(249,115,22,0.03) 40px), repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(16,185,129,0.03) 20px, rgba(16,185,129,0.03) 40px);
      pointer-events: none; animation: hologramMove 8s linear infinite; border-radius: 32px;
    }
    @keyframes hologramMove { 0% { transform: translate(0,0); opacity: 0.4; } 50% { opacity: 0.7; } 100% { transform: translate(5px,5px); opacity: 0.4; } }
    .content { position: relative; z-index: 3; }
    .header {
      display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent);
      object-fit: cover; box-shadow: 0 0 15px rgba(249,115,22,0.5);
    }
    .name-block h2 {
      margin: 0; font-size: 1.6rem;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .name-block p { margin: 5px 0 0; color: var(--text-secondary); font-size: 0.9rem; }
    .passport-number-clickable {
      display: block; margin: 10px 0 20px; font-weight: 700; font-size: 1rem;
      color: var(--accent); cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s; text-align: center;
    }
    .passport-number-clickable:hover { text-shadow: 0 0 8px #f97316; }
    .metrics-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;
    }
    .metric {
      background: rgba(21,38,56,0.6); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px; backdrop-filter: blur(5px);
    }
    .metric .label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
    .metric .value { font-size: 1.2rem; font-weight: 800; }
    .value.accent { color: var(--accent); } .value.success { color: var(--success); }
    .attributes {
      display: flex; flex-direction: column; gap: 12px; margin: 20px 0;
    }
    .attr-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .attr-name { width: 120px; font-size: 0.85rem; color: var(--text-secondary); }
    .attr-bar {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; margin: 0 10px;
      overflow: hidden;
    }
    .attr-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), #c084fc);
      border-radius: 3px; transition: width 0.8s;
    }
    .attr-value { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); width: 40px; text-align: right; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-top: 20px;
      position: relative; z-index: 4;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 40px; padding: 10px 24px;
      color: var(--text-primary); font-weight: 500; font-size: 0.9rem;
      z-index: 9999; box-shadow: 0 0 20px rgba(249,115,22,0.5);
      animation: fadeInUp 0.3s ease, fadeOut 0.4s 1.8s ease forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translate(-50%, -10px); } }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="passport-card">
  <div class="hologram"></div>
  <div class="content">
    <div class="header">
      <img src="belchonok.png" class="avatar" id="avatarImg" alt="Фото">
      <div class="name-block">
        <h2 id="userName">Имя</h2>
        <p id="userDept">Отдел</p>
      </div>
    </div>
    <div class="passport-number-clickable" id="passportNumber" title="Нажмите, чтобы скопировать номер ЦПС">CPS-XXXXXXXX</div>
    <div class="metrics-grid">
      <div class="metric"><div class="label">Энергия</div><div class="value accent" id="energyValue">0</div></div>
      <div class="metric"><div class="label">Рейтинг</div><div class="value success" id="ratingValue">0</div></div>
      <div class="metric"><div class="label">Кармики</div><div class="value" style="color: #fbbf24;" id="pointsValue">0</div></div>
      <div class="metric"><div class="label">Компания</div><div class="value" id="companyValue" style="color: #c084fc;">—</div></div>
    </div>
    <div class="attributes">
      <div class="attr-row"><span class="attr-name">Дисциплина</span><div class="attr-bar"><div class="attr-fill" id="disciplineFill" style="width:0%"></div></div><span class="attr-value" id="disciplineVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Обучаемость</span><div class="attr-bar"><div class="attr-fill" id="learningFill" style="width:0%"></div></div><span class="attr-value" id="learningVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Стресс</span><div class="attr-bar"><div class="attr-fill" id="stressFill" style="width:0%"></div></div><span class="attr-value" id="stressVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Команда</span><div class="attr-bar"><div class="attr-fill" id="teamFill" style="width:0%"></div></div><span class="attr-value" id="teamVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Лидерство</span><div class="attr-bar"><div class="attr-fill" id="leaderFill" style="width:0%"></div></div><span class="attr-value" id="leaderVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Креативность</span><div class="attr-bar"><div class="attr-fill" id="creativeFill" style="width:0%"></div></div><span class="attr-value" id="creativeVal">0</span></div>
      <div class="attr-row"><span class="attr-name">Коммуникация</span><div class="attr-bar"><div class="attr-fill" id="commFill" style="width:0%"></div></div><span class="attr-value" id="commVal">0</span></div>
    </div>
    <a class="back-btn" href="/profile.html">← Назад в профиль</a>
  </div>
</div>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const login = localStorage.getItem('karmabank_login');
  if (!login) window.location.href = '/';

  // Звёзды
  function createStars() {
    const container = document.getElementById('starsContainer');
    const colors = ['#ffffff','#e0f0ff','#fbbf24','#c084fc'];
    for (let i=0; i<80; i++) {
      const star = document.createElement('div'); star.className = 'star';
      const size = Math.random()*3+1;
      star.style.width = size+'px'; star.style.height = size+'px';
      star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%';
      star.style.background = colors[Math.floor(Math.random()*colors.length)];
      star.style.animationDelay = Math.random()*3+'s';
      container.appendChild(star);
    }
  }
  createStars();

  function showToast(msg) {
    const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 2200);
  }

  async function loadPassport() {
    try {
      const [profileRes, levelsRes] = await Promise.all([
        fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`),
        fetch(`${API_URL}?action=getLevels`)
      ]);
      const user = await profileRes.json();
      const levels = await levelsRes.json();

      if (!user) { alert('Пользователь не найден'); return; }

      document.getElementById('userName').textContent = user.name || '—';
      document.getElementById('userDept').textContent = user.department || '—';
      document.getElementById('passportNumber').textContent = user.passport || 'CPS-XXXXXXXX';
      document.getElementById('energyValue').textContent = user.energy || 0;
      document.getElementById('pointsValue').textContent = user.points || 0;
      document.getElementById('companyValue').textContent = user.company || '—';
      if (user.photo) document.getElementById('avatarImg').src = user.photo;

      // Рейтинг (просто пример — можно доработать формулу)
      const rating = Math.min(1000, Math.floor((user.energy||0)/10 + (user.points||0)/100));
      document.getElementById('ratingValue').textContent = rating;

      // Генерация псевдо-характеристик (можно позже привязать к реальным данным)
      const attrs = {
        discipline: Math.floor(Math.random()*200)+100,
        learning: Math.floor(Math.random()*250)+50,
        stress: Math.floor(Math.random()*150)+50,
        team: Math.floor(Math.random()*200)+50,
        leader: Math.floor(Math.random()*180)+20,
        creative: Math.floor(Math.random()*220)+30,
        comm: Math.floor(Math.random()*190)+60
      };

      const maxAttr = 300;
      const setAttr = (idVal, idFill, value) => {
        document.getElementById(idVal).textContent = value;
        document.getElementById(idFill).style.width = Math.min((value/maxAttr)*100, 100)+'%';
      };

      setAttr('disciplineVal', 'disciplineFill', attrs.discipline);
      setAttr('learningVal', 'learningFill', attrs.learning);
      setAttr('stressVal', 'stressFill', attrs.stress);
      setAttr('teamVal', 'teamFill', attrs.team);
      setAttr('leaderVal', 'leaderFill', attrs.leader);
      setAttr('creativeVal', 'creativeFill', attrs.creative);
      setAttr('commVal', 'commFill', attrs.comm);

      // Копирование паспорта по клику
      document.getElementById('passportNumber').onclick = () => {
        const pn = document.getElementById('passportNumber').textContent;
        if (pn) {
          navigator.clipboard.writeText(pn).then(() => showToast('Номер ЦПС скопирован'));
        }
      };

    } catch(e) {
      console.error(e);
    }
  }

  loadPassport();
</script>
</body>
</html>
