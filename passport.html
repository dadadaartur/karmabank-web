<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Цифровой паспорт — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root { --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981; --border: #1f3350; }
    body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0; }
    .passport-card { max-width: 560px; width: 100%; background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%); border: 1px solid rgba(249,115,22,0.3); border-radius: 32px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(249,115,22,0.2); position: relative; overflow: hidden; margin: auto; }
    .hologram { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(249,115,22,0.03) 20px, rgba(249,115,22,0.03) 40px), repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(16,185,129,0.03) 20px, rgba(16,185,129,0.03) 40px); pointer-events: none; animation: hologramMove 8s linear infinite; }
    @keyframes hologramMove { 0% { transform: translate(0,0); opacity: 0.5; } 50% { opacity: 0.8; } 100% { transform: translate(5px,5px); opacity: 0.5; } }
    .content { position: relative; z-index: 2; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; box-shadow: 0 0 15px rgba(249,115,22,0.5); }
    .name-block h2 { margin: 0; font-size: 1.5rem; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .name-block p { margin: 5px 0 0; color: var(--text-secondary); font-size: 0.9rem; }
    .badge { background: rgba(16,185,129,0.15); border: 1px solid var(--success); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: var(--success); margin-left: auto; }
    .passport-number { text-align: center; margin-bottom: 20px; font-size: 1.1rem; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .metric { background: rgba(21,38,56,0.6); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; backdrop-filter: blur(5px); }
    .metric .value { font-size: 1.8rem; font-weight: 800; } .metric .label { font-size: 0.8rem; color: var(--text-secondary); }
    .value.accent { color: var(--accent); } .value.success { color: var(--success); }
    .skills-block { margin-top: 20px; }
    .skill-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .skill-label { color: var(--text-secondary); } .skill-value { font-weight: 700; }
    .expand-btn { margin-top: 20px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; display: block; width: 100%; text-align: center; }
    .expand-btn:hover { background: var(--accent); color: white; }
    .back-btn { display: inline-block; margin-top: 20px; color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; width: fit-content; }
    .back-btn:hover { background: var(--border); }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow { width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24); border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both; transform: rotate(45deg); box-shadow: 0 0 10px var(--accent); }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse { 0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); } 50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); } }
  </style>
</head>
<body>
<div style="width: 100%;">
  <a class="back-btn" href="/">← Назад</a>
  <div class="passport-card" id="passportCard">
    <div class="hologram"></div>
    <div class="content" id="passportContent">
      <!-- заполняется JS -->
    </div>
  </div>
</div>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const login = localStorage.getItem('karmabank_login') || 'arthur';

  function showLoading() { const overlay = document.createElement('div'); overlay.className='loading-overlay'; overlay.innerHTML='<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>'; document.body.appendChild(overlay); }
  function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }

  async function loadPassport() {
    const content = document.getElementById('passportContent');
    content.innerHTML = '<div style="text-align:center; padding:20px;"><div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div></div>';
    try {
      const [profileRes, levelsRes] = await Promise.all([
        fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`),
        fetch(`${API_URL}?action=getLevels`)
      ]);
      const user = await profileRes.json();
      const levels = await levelsRes.json();

      if (!user) { content.innerHTML = '<p>Пользователь не найден</p>'; return; }

      const energy = user.energy || 0;
      const icons = ['✦','✧','⭑','✶','✷','✸'];
      let curLevel = levels[0], idx = 0;
      for (let i=levels.length-1; i>=0; i--) { if (energy >= levels[i].energy) { curLevel = levels[i]; idx = i; break; } }
      const discipline = Math.floor(Math.random()*200)+100;
      const learning = Math.floor(Math.random()*250)+50;
      const trainingLevel = Math.floor(Math.random()*3)+1;
      const stress = Math.floor(Math.random()*150)+50;
      const teamwork = Math.floor(Math.random()*200)+50;
      const rating = Math.min(1000, Math.floor(energy / 10 + (user.points||0)/100));

      content.innerHTML = `
        <div class="passport-number">${user.passport || 'CPS-XXXXXXXX'}</div>
        <div class="header">
          <img src="${user.photo || 'belchonok.png'}" class="avatar" alt="Фото">
          <div class="name-block"><h2>${user.name || 'Артур'}</h2><p>${user.department || 'Основатель'}</p></div>
          <div class="badge">${icons[idx] || '✨'} ${curLevel.name}</div>
        </div>
        <div class="metrics-grid">
          <div class="metric"><div class="value accent">${energy}</div><div class="label">Энергии</div></div>
          <div class="metric"><div class="value success">${rating}</div><div class="label">Рейтинг</div></div>
        </div>
        <div class="skills-block">
          <div class="skill-row"><span class="skill-label">Дисциплина</span><span class="skill-value">${discipline}</span></div>
          <div class="skill-row"><span class="skill-label">Обучаемость</span><span class="skill-value">${learning}</span></div>
          <div class="skill-row"><span class="skill-label">Тренировки</span><span class="skill-value">Уровень ${trainingLevel} из 6</span></div>
          <div class="skill-row"><span class="skill-label">Стрессоустойчивость</span><span class="skill-value">${stress}</span></div>
          <div class="skill-row"><span class="skill-label">Работа в команде</span><span class="skill-value">${teamwork}</span></div>
          <div class="skill-row"><span class="skill-label">Балл руководителя</span><span class="skill-value">—</span></div>
        </div>
        <button class="expand-btn" onclick="expandCPS()">🔍 Расшифровка ЦПС (для работодателя)</button>
      `;
    } catch(e) { content.innerHTML = '<p>Ошибка загрузки</p>'; }
  }

  function expandCPS() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:9999;';
    modal.innerHTML = `
      <div style="background:linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%); border:1px solid var(--accent); border-radius:24px; padding:30px; max-width:400px; text-align:center; color: white;">
        <p>Расшифровка ЦПС станет доступна после верификации паспорта партнёром-работодателем.</p>
        <button style="margin-top:20px; background:transparent; border:1px solid var(--border); color:var(--text-secondary); padding:10px 20px; border-radius:20px; cursor:pointer;" onclick="this.closest('.modal').remove()">Закрыть</button>
      </div>
    `;
    document.body.appendChild(modal);
  }

  loadPassport();
</script>
</body>
</html>
