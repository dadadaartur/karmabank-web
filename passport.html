<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифровой паспорт специалиста — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0a1628;
      color: #eaf0fb;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .record {
      background: #152238;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid #1f3350;
    }
    h1 { color: #f97316; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <h1>📜 Цифровой паспорт специалиста</h1>
  <div id="result">Загрузка...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const params = new URLSearchParams(window.location.search);
    const passport = params.get('passport');
    if (!passport) {
      document.getElementById('result').innerHTML = '<p class="error">Не указан номер паспорта.</p>';
    } else {
      fetch(`${API_URL}?action=getPassportHistory&passport=${encodeURIComponent(passport)}`)
        .then(r => r.json())
        .then(history => {
          if (!history || history.length === 0) {
            document.getElementById('result').innerHTML = '<p class="error">По данному номеру нет записей.</p>';
            return;
          }
          let html = `<p>Номер паспорта: <strong>${passport}</strong></p>`;
          history.forEach(rec => {
            html += `<div class="record">
              <strong>${rec.event}</strong> — ${new Date(rec.date).toLocaleString('ru-RU')}<br>
              ${rec.details ? JSON.stringify(rec.details) : ''}
            </div>`;
          });
          document.getElementById('result').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('result').innerHTML = '<p class="error">Ошибка загрузки данных.</p>';
        });
    }
  </script>
</body>
</html>
