<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Цифровой паспорт — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-card: #152238; --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1; --accent: #f97316; --success: #10b981;
      --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      color: var(--text-primary); min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
      margin: 0;
    }
    .passport-card {
      max-width: 480px; width: 100%;
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 32px; padding: 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(249,115,22,0.2);
      position: relative; overflow: hidden;
    }
    .hologram {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(249,115,22,0.03) 20px, rgba(249,115,22,0.03) 40px),
                  repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(16,185,129,0.03) 20px, rgba(16,185,129,0.03) 40px);
      pointer-events: none;
      animation: hologramMove 8s linear infinite;
    }
    @keyframes hologramMove {
      0% { transform: translate(0,0); opacity: 0.5; }
      50% { opacity: 0.8; }
      100% { transform: translate(5px,5px); opacity: 0.5; }
    }
    .content { position: relative; z-index: 2; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .avatar {
      width: 70px; height: 70px; border-radius: 50%;
      border: 2px solid var(--accent); object-fit: cover;
      box-shadow: 0 0 15px rgba(249,115,22,0.5);
    }
    .name-block h2 { margin: 0; font-size: 1.5rem; background: linear-gradient(135deg, #f97316, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .name-block p { margin: 5px 0 0; color: var(--text-secondary); font-size: 0.9rem; }
    .badge {
      background: rgba(16,185,129,0.15); border: 1px solid var(--success);
      padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: var(--success);
      margin-left: auto;
    }
    .passport-number {
      text-align: center; margin-bottom: 20px;
      font-size: 1.1rem; font-weight: 600; color: var(--accent);
      letter-spacing: 1px;
    }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .metric {
      background: rgba(21,38,56,0.6); border: 1px solid var(--border);
      border-radius: 16px; padding: 15px; text-align: center; backdrop-filter: blur(5px);
    }
    .metric .value { font-size: 1.8rem; font-weight: 800; }
    .metric .label { font-size: 0.8rem; color: var(--text-secondary); }
    .value.accent { color: var(--accent); }
    .value.success { color: var(--success); }
    .back-btn {
      display: inline-block; margin-top: 20px; color: var(--text-secondary); text-decoration: none;
      font-size: 0.85rem; border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px;
    }
    .back-btn:hover { background: var(--border); }
  </style>
</head>
<body>
<div style="width: 100%;">
  <a class="back-btn" href="/">← Назад</a>
  <div class="passport-card" id="passportCard">
    <div class="hologram"></div>
    <div class="content">
      <div class="passport-number" id="passportId">CPS-XXXXXXXX</div>
      <div class="header">
        <img src="belchonok.png" class="avatar" id="avatarImg" alt="Фото">
        <div class="name-block">
          <h2 id="userName">Артур</h2>
          <p id="userDept">Основатель</p>
        </div>
        <div class="badge" id="levelBadge">✨ Искра</div>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <div class="value success" id="pointsValue">0</div>
          <div class="label">Кармиков</div>
        </div>
        <div class="metric">
          <div class="value accent" id="energyValue">0</div>
          <div class="label">Энергии</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const login = localStorage.getItem('karmabank_login') || 'arthur';

  async function loadPassport() {
    try {
      const [profileRes, levelsRes] = await Promise.all([
        fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(login)}`),
        fetch(`${API_URL}?action=getLevels`)
      ]);
      const user = await profileRes.json();
      const levels = await levelsRes.json();

      document.getElementById('passportId').textContent = user.passport || 'CPS-XXXXXXXX';
      document.getElementById('userName').textContent = user.name || 'Артур';
      document.getElementById('userDept').textContent = user.department || 'Основатель';
      document.getElementById('pointsValue').textContent = user.points || 0;
      document.getElementById('energyValue').textContent = user.energy || 0;
      if (user.photo) document.getElementById('avatarImg').src = user.photo;

      let curLevel = levels[0] || { icon: '✨', name: 'Искра' };
      for (let i = levels.length-1; i >= 0; i--) {
        if ((user.energy || 0) >= levels[i].energy) { curLevel = levels[i]; break; }
      }
      document.getElementById('levelBadge').textContent = `${curLevel.icon} ${curLevel.name}`;

    } catch(e) {}
  }

  loadPassport();
</script>
</body>
</html>
