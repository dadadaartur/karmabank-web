<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Верификация достижения — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #0a1628;
      color: #eaf0fb;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }
    .card {
      background: #152238; border: 1px solid #f97316;
      border-radius: 24px; padding: 40px; max-width: 500px; width: 90%;
      text-align: center; box-shadow: 0 0 30px rgba(249,115,22,0.5);
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .btn {
      background: #f97316; color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card" id="result">
    Проверка...
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
      document.getElementById('result').innerHTML = '<h2 class="error">Ошибка</h2><p>Не указан ID для проверки.</p>';
    } else {
      fetch(`${API_URL}?action=verifyCPS&id=${encodeURIComponent(id)}`)
        .then(r => r.json())
        .then(data => {
          if (data) {
            document.getElementById('result').innerHTML = `
              <h2 class="success">✅ Достижение подтверждено</h2>
              <p>Сотрудник: <strong>${data.employee}</strong></p>
              <p>Событие: <strong>${data.event}</strong></p>
              <p>Дата: <strong>${new Date(data.date).toLocaleDateString('ru-RU')}</strong></p>
              <p>Детали: <strong>${JSON.stringify(data.details)}</strong></p>
              <p style="margin-top:20px;">Печать Кармического банка<br>🐿️</p>
            `;
          } else {
            document.getElementById('result').innerHTML = '<h2 class="error">❌ Запись не найдена</h2><p>Проверьте правильность ссылки.</p>';
          }
        });
    }
  </script>
</body>
</html>
