<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путеводная звезда — Кармический банк</title>
  <style>
    body {
      margin: 0; overflow: hidden;
      background: radial-gradient(ellipse at center, #1a2a45 0%, #0a1628 70%);
      font-family: 'Inter', sans-serif;
      cursor: grab;
    }
    body:active { cursor: grabbing; }
    canvas { display: block; }
    .title {
      position: absolute; bottom: 40px; width: 100%; text-align: center;
      font-size: 2.5rem; font-weight: 800; letter-spacing: 6px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 20px rgba(249,115,22,0.5));
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title">ПУТЕВОДНАЯ ЗВЕЗДА</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // === Базовые настройки сцены ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1628);
    scene.fog = new THREE.FogExp2(0x0a1628, 0.0002);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x0a1628);
    document.body.appendChild(renderer.domElement);

    // === Создание красивой многогранной звезды (икосаэдр с деформацией) ===
    const starGroup = new THREE.Group();
    scene.add(starGroup);

    // Используем икосаэдр как основу для звезды – он более плавный, чем октаэдр
    const baseGeometry = new THREE.IcosahedronGeometry(0.85, 1);

    // Деформируем вершины, чтобы получить лучи звезды
    const positions = baseGeometry.attributes.position.array;
    const deformedPositions = new Float32Array(positions.length);
    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i + 1];
      const z = positions[i + 2];
      const len = Math.sqrt(x * x + y * y + z * z);
      // Создаём неравномерные лучи, чтобы звезда выглядела интереснее
      const wave = Math.sin(x * 5) * Math.cos(y * 5) * Math.sin(z * 5);
      const factor = 0.5 + wave * 0.5;
      const scale = 1.0 + factor * 1.8;
      deformedPositions[i] = x * scale;
      deformedPositions[i + 1] = y * scale;
      deformedPositions[i + 2] = z * scale;
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute('position', new THREE.BufferAttribute(deformedPositions, 3));
    starGeometry.computeVertexNormals();

    // Основной материал звезды – глянцевый, с переливами
    const starMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x4a90e2, // Благородный синий как основа
      emissive: 0x111133,
      roughness: 0.1,
      metalness: 0.4,
      clearcoat: 0.3,
      clearcoatRoughness: 0.2,
      flatShading: false,
    });

    const starMesh = new THREE.Mesh(starGeometry, starMaterial);
    starMesh.castShadow = true;
    starMesh.receiveShadow = true;
    starGroup.add(starMesh);

    // Добавляем свечение по контуру (второй слой с градиентом)
    const glowGeometry = new THREE.IcosahedronGeometry(0.95, 1);
    const glowMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor1: { value: new THREE.Color(0xf97316) },
        uColor2: { value: new THREE.Color(0xc084fc) },
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vPosition = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        uniform float uTime;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        void main() {
          // Свечение зависит от угла обзора и времени
          float fresnel = abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
          fresnel = pow(1.0 - fresnel, 2.5);
          // Пульсация цвета
          float pulse = sin(uTime * 2.0) * 0.5 + 0.5;
          vec3 glowColor = mix(uColor1, uColor2, pulse);
          gl_FragColor = vec4(glowColor, fresnel * 0.8);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
    starGroup.add(glowMesh);

    // === Частицы (сияющая пыль вокруг звезды) ===
    const particlesCount = 500;
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesPositions = new Float32Array(particlesCount * 3);
    const particlesColors = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i += 3) {
      // Располагаем частицы по сфере
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const radius = 1.3 + Math.random() * 0.8;
      particlesPositions[i] = Math.sin(phi) * Math.cos(theta) * radius;
      particlesPositions[i + 1] = Math.sin(phi) * Math.sin(theta) * radius;
      particlesPositions[i + 2] = Math.cos(phi) * radius;

      // Цвета: оранжевый и фиолетовый
      const colorChoice = Math.random();
      if (colorChoice < 0.5) {
        particlesColors[i] = 0.97;
        particlesColors[i + 1] = 0.45;
        particlesColors[i + 2] = 0.08;
      } else {
        particlesColors[i] = 0.75;
        particlesColors[i + 1] = 0.52;
        particlesColors[i + 2] = 0.99;
      }
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
    particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particlesColors, 3));

    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.025,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      map: createCircleTexture(),
    });

    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);

    // Функция для создания круглой текстуры (чтобы частицы были не квадратные)
    function createCircleTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');
      ctx.beginPath();
      ctx.arc(8, 8, 6, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    // === Освещение ===
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xf97316, 1.2);
    keyLight.position.set(2, 2, 3);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0xc084fc, 0.6);
    fillLight.position.set(-2, -1, -2);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0x4a90e2, 0.4);
    rimLight.position.set(1, -1.5, -1);
    scene.add(rimLight);

    // === Управление камерой (лёгкое вращение мышкой) ===
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.4;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.5;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.7;
    controls.minDistance = 2.5;
    controls.maxDistance = 8;
    controls.enablePan = false;
    controls.target.set(0, 0, 0);

    // === Анимация ===
    const clock = new THREE.Clock();

    function animate() {
      const delta = clock.getDelta();
      const elapsedTime = performance.now() * 0.001;

      // Обновление времени для шейдера свечения
      if (glowMaterial.uniforms) {
        glowMaterial.uniforms.uTime.value = elapsedTime;
      }

      // Вращение частиц
      particles.rotation.y += 0.0003;
      particles.rotation.x += 0.0001;

      // Лёгкая пульсация звезды
      const pulse = Math.sin(elapsedTime * 3) * 0.03 + 1;
      starGroup.scale.set(pulse, pulse, pulse);
      starGroup.rotation.y += 0.001;
      starGroup.rotation.x += 0.0003;

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // === Адаптивность ===
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
