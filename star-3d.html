<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путеводная звезда — Кармический банк</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a1628; font-family: 'Inter', sans-serif; }
    canvas { display: block; }
    .title {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      font-size: 2rem; font-weight: 800; color: #f97316; letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 12px rgba(249,115,22,0.6));
    }
  </style>
</head>
<body>
  <div class="title">ПУТЕВОДНАЯ ЗВЕЗДА</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1628);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Свечение вокруг звезды
    const glowGeometry = new THREE.SphereGeometry(1.4, 32, 32);
    const glowMaterial = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        uniform float uTime;
        void main() {
          float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 1.5);
          gl_FragColor = vec4(0.95, 0.45, 0.08, intensity * (0.6 + 0.4 * sin(uTime * 3.0)));
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    scene.add(glow);

    // Группа для многогранной звезды
    const starGroup = new THREE.Group();
    scene.add(starGroup);

    // Создаём многогранную звезду
    const starGeometry = new THREE.OctahedronGeometry(0.9, 0);
    const positions = starGeometry.attributes.position.array;
    const deformedPositions = new Float32Array(positions.length);
    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const y = positions[i + 1];
      const z = positions[i + 2];
      const len = Math.sqrt(x * x + y * y + z * z);
      const factor = 0.5 + 0.5 * (Math.sin(x * 3) * Math.cos(y * 3) * Math.sin(z * 3));
      deformedPositions[i] = x * (1.0 + factor * 2.0);
      deformedPositions[i + 1] = y * (1.0 + factor * 1.5);
      deformedPositions[i + 2] = z * (1.0 + factor * 2.2);
    }
    const customGeometry = new THREE.BufferGeometry();
    customGeometry.setAttribute('position', new THREE.BufferAttribute(deformedPositions, 3));
    customGeometry.computeVertexNormals();

    const starMaterial = new THREE.MeshStandardMaterial({
      color: 0xf97316,
      emissive: 0x331900,
      roughness: 0.1,
      metalness: 0.3,
      flatShading: true,
    });
    const star = new THREE.Mesh(customGeometry, starMaterial);
    star.castShadow = true;
    star.receiveShadow = true;
    starGroup.add(star);

    // Проволочный каркас для футуристичного вида
    const wireframe = new THREE.LineSegments(
      new THREE.EdgesGeometry(customGeometry),
      new THREE.LineBasicMaterial({ color: 0xc084fc, linewidth: 1, transparent: true, opacity: 0.5 })
    );
    starGroup.add(wireframe);

    // Освещение
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xf97316, 1.2);
    directionalLight.position.set(2, 2, 3);
    directionalLight.castShadow = true;
    scene.add(directionalLight);
    const backLight = new THREE.PointLight(0xc084fc, 0.8);
    backLight.position.set(-2, -1, -2);
    scene.add(backLight);

    // Частицы вокруг звезды
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 300;
    const particlesPositions = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount * 3; i += 3) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 1.4 + Math.random() * 0.4;
      const height = (Math.random() - 0.5) * 2.5;
      particlesPositions[i] = Math.cos(angle) * radius;
      particlesPositions[i + 1] = height;
      particlesPositions[i + 2] = Math.sin(angle) * radius;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
    const particlesMaterial = new THREE.PointsMaterial({
      color: 0xfbbf24,
      size: 0.02,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);

    // Орбитальный контроль (лёгкое вращение мышкой)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.3;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.8;
    controls.enablePan = false;
    controls.target.set(0, 0, 0);

    // Анимация
    let clock = new THREE.Clock();
    function animate() {
      const delta = clock.getDelta();
      const elapsedTime = performance.now() * 0.001;
      
      // Обновление времени для шейдера свечения
      glowMaterial.uniforms.uTime.value = elapsedTime;
      
      // Вращение частиц
      particles.rotation.y += 0.0005;
      particles.rotation.x += 0.0002;
      
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    // Адаптивность
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
