<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путеводная звезда — Кармический банк</title>
  <style>
    body {
      margin: 0; overflow: hidden; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a2a45 0%, #0a1628 70%);
      font-family: 'Inter', sans-serif; cursor: none;
    }
    .card {
      width: 320px; height: 320px; perspective: 800px;
      display: flex; align-items: center; justify-content: center;
    }
    .card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform 0.1s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .card-inner img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(249,115,22,0.7));
      border-radius: 50%; /* если персонаж круглый, то будет красивое обрамление */
    }
    .glow {
      position: absolute; width: 120%; height: 120%;
      background: radial-gradient(circle, rgba(249,115,22,0.5) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }
    .title {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      font-size: 2rem; font-weight: 800; letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 12px rgba(249,115,22,0.6));
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title">ПУТЕВОДНАЯ ЗВЕЗДА</div>
  <div class="card" id="card">
    <div class="card-inner" id="cardInner">
      <img src="astralsk.png" alt="Путеводная звезда">
      <div class="glow"></div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const inner = document.getElementById('cardInner');

    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.clientX) / 20;
      const yAxis = (window.innerHeight / 2 - e.clientY) / 20;
      inner.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Плавное возвращение в исходное положение при выходе мыши
    document.addEventListener('mouseleave', () => {
      inner.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });
  </script>
</body>
</html>
