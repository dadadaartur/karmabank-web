<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Панель руководителя — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary); min-height: 100vh; padding: 20px;
      position: relative; overflow-x: hidden; user-select: none;
    }
    /* Звёзды */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle 2s infinite alternate; opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .header {
      background: rgba(21,38,56,0.7); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 16px 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; position: relative; z-index: 2;
    }
    .header h2 {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .main-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .action-btn {
      background: transparent; border: 1px solid var(--accent); border-radius: 40px;
      padding: 10px 24px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
      transition: all 0.3s; background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .action-btn:hover {
      border-color: #c084fc; box-shadow: var(--hologram-glow); transform: scale(1.02);
    }
    .section-title {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 16px;
      color: var(--text-primary); position: relative; z-index: 2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px; position: relative; z-index: 2;
    }
    .employee-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border); border-radius: 20px; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      transition: all 0.3s; backdrop-filter: blur(4px);
    }
    .employee-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .emp-header { display: flex; align-items: center; gap: 10px; }
    .emp-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; color: white;
    }
    .emp-name { font-weight: 700; }
    .emp-dept { font-size: 0.8rem; color: var(--text-secondary); }
    .metrics-row { display: flex; gap: 12px; }
    .metric { text-align: center; }
    .metric .val { font-weight: 700; font-size: 1.1rem; }
    .val.success { color: var(--success); } .val.accent { color: var(--accent); } .val.warning { color: var(--warning); }
    .metric .lbl { font-size: 0.7rem; color: var(--text-secondary); }
    .task-review { border-top: 1px solid var(--border); padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .review-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
    .verify-btn {
      background: transparent; border: 1px solid var(--success); border-radius: 12px;
      color: var(--success); padding: 4px 12px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .verify-btn:hover { background: var(--success); color: white; }
    .notifications-panel {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border); border-radius: 20px; padding: 16px;
      margin-bottom: 24px; backdrop-filter: blur(4px);
      position: relative; z-index: 2;
    }
    .notif-list {
      max-height: 200px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg-primary);
    }
    .notif-list::-webkit-scrollbar { width: 4px; }
    .notif-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
    .notif-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--text-secondary); }
    .show-all { display: block; text-align: center; margin-top: 8px; color: var(--accent); cursor: pointer; font-size: 0.8rem; }
    .show-all:hover { text-decoration: underline; }
    /* Модалки */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 420px; width: 90%; text-align: left;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
      color: var(--text-primary);
    }
    .modal-content input, .modal-content select, .modal-content textarea {
      width: 100%; padding: 10px; margin: 8px 0 16px;
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg-primary); color: var(--text-primary);
      font-size: 0.95rem; outline: none;
    }
    .modal-content select { color: var(--text-primary); }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-buttons .btn {
      background: transparent; border: 1px solid var(--accent); border-radius: 30px;
      padding: 8px 20px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
      transition: all 0.3s; background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .modal-buttons .btn.cancel {
      background: transparent; border-color: var(--border);
      -webkit-background-clip: unset; background-clip: unset; color: var(--text-secondary);
    }
    .loading-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5); z-index:9999;
      display:flex; align-items:center; justify-content:center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg); box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>

<!-- Шапка -->
<div class="header">
  <h2>Моя команда</h2>
  <div style="display: flex; gap: 10px;">
    <a href="/" class="back-btn">← На главную</a>
    <button class="action-btn" onclick="logout()" style="border-color:var(--danger); -webkit-background-clip:unset; background:var(--danger); color:white; padding:8px 16px;">Выйти</button>
  </div>
</div>

<!-- Панель действий -->
<div class="main-bar">
  <button class="action-btn" onclick="openCreateTaskModal()">➕ Создать задание</button>
  <button class="action-btn" onclick="openAwardModal()">💰 Начислить кармики</button>
</div>

<!-- Уведомления -->
<div class="notifications-panel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span style="font-weight:600;">Уведомления</span>
    <span class="show-all" id="showAllBtn" onclick="openAllNotifications()" style="display:none;">Показать все</span>
  </div>
  <div class="notif-list" id="notificationsList">Нет новых уведомлений</div>
</div>

<!-- Сотрудники -->
<div class="section-title">Сотрудники</div>
<div class="grid" id="teamGrid">Загрузка...</div>

<!-- Модальное окно Создать задание -->
<div id="createTaskModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Новое задание</h3>
    <label>Тип задания</label>
    <select id="taskType" onchange="toggleEmployeeSelect()">
      <option value="personal">Персональное</option>
      <option value="global">Общее</option>
    </select>
    <label>Сотрудник</label>
    <select id="taskEmployeeSelect"></select>
    <label>Название (до 45 символов)</label>
    <input type="text" id="taskName" maxlength="45" placeholder="Название задания">
    <label>Баллы</label>
    <input type="number" id="taskPoints" placeholder="50">
    <div class="modal-buttons">
      <button class="btn cancel" onclick="closeModal('createTaskModal')">Отмена</button>
      <button class="btn" onclick="createTask()">Создать</button>
    </div>
  </div>
</div>

<!-- Модальное окно Начислить кармики -->
<div id="awardModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:12px;">Начислить кармики</h3>
    <label>Сотрудник</label>
    <select id="awardEmployeeSelect"></select>
    <label>Сумма</label>
    <input type="number" id="awardAmount" placeholder="100">
    <label>Комментарий (обязательно)</label>
    <input type="text" id="awardComment" placeholder="За что">
    <div class="modal-buttons">
      <button class="btn cancel" onclick="closeModal('awardModal')">Отмена</button>
      <button class="btn" onclick="awardPoints()">Начислить</button>
    </div>
  </div>
</div>

<!-- Модалка для подтверждения проверки задания -->
<div id="verifyModal" class="modal">
  <div class="modal-content" id="verifyModalContent"></div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  let currentLogin = localStorage.getItem('karmabank_manager_login') || '';
  let allNotificationsCache = [];

  // Звёзды
  function createStars() {
    const container = document.getElementById('starsContainer');
    const colors = ['#ffffff', '#e0f0ff', '#fbbf24', '#c084fc'];
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div'); star.className = 'star';
      const size = Math.random()*3+1;
      star.style.width = size+'px'; star.style.height = size+'px';
      star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%';
      star.style.background = colors[Math.floor(Math.random()*colors.length)];
      star.style.animationDelay = Math.random()*3+'s';
      container.appendChild(star);
    }
  }
  createStars();

  function showLoading() {
    const overlay = document.createElement('div'); overlay.className='loading-overlay';
    overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
    document.body.appendChild(overlay);
  }
  function hideLoading() { const o = document.querySelector('.loading-overlay'); if(o) o.remove(); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  function openCreateTaskModal() {
    document.getElementById('createTaskModal').classList.add('active');
    loadEmployeeSelects();
    toggleEmployeeSelect();
  }
  function openAwardModal() {
    document.getElementById('awardModal').classList.add('active');
    loadEmployeeSelects();
  }

  function toggleEmployeeSelect() {
    const type = document.getElementById('taskType').value;
    document.getElementById('taskEmployeeSelect').style.display = type === 'personal' ? 'block' : 'none';
  }

  async function loadEmployeeSelects() {
    const res = await fetch(`${API_URL}?action=getTeam&managerLogin=${encodeURIComponent(currentLogin)}`);
    const team = await res.json();
    const options = team.map(e => `<option value="${e.login}">${e.name} (${e.department || '—'})</option>`).join('');
    document.getElementById('taskEmployeeSelect').innerHTML = options;
    document.getElementById('awardEmployeeSelect').innerHTML = options;
  }

  async function createTask() {
    const type = document.getElementById('taskType').value;
    const employee = type === 'personal' ? document.getElementById('taskEmployeeSelect').value : 'all';
    const taskName = document.getElementById('taskName').value.trim();
    const points = parseInt(document.getElementById('taskPoints').value) || 0;
    if (!taskName) return alert('Введите название');
    showLoading();
    const res = await fetch(`${API_URL}?action=createTask&managerLogin=${encodeURIComponent(currentLogin)}&taskName=${encodeURIComponent(taskName)}&points=${points}&employeeLogin=${encodeURIComponent(employee)}`);
    const result = await res.json();
    hideLoading();
    alert(result.message);
    closeModal('createTaskModal');
    loadTeam();
  }

  async function awardPoints() {
    const employee = document.getElementById('awardEmployeeSelect').value;
    const amount = parseInt(document.getElementById('awardAmount').value) || 0;
    const comment = document.getElementById('awardComment').value.trim();
    if (!employee || amount <= 0 || !comment) return alert('Заполните все поля');
    showLoading();
    const res = await fetch(`${API_URL}?action=awardPoints&managerLogin=${encodeURIComponent(currentLogin)}&employeeLogin=${encodeURIComponent(employee)}&amount=${amount}&comment=${encodeURIComponent(comment)}`);
    const result = await res.json();
    hideLoading();
    alert(result.message);
    closeModal('awardModal');
    loadTeam();
  }

  // Загрузка команды
  async function loadTeam() {
    showLoading();
    const res = await fetch(`${API_URL}?action=getTeam&managerLogin=${encodeURIComponent(currentLogin)}`);
    const team = await res.json();
    hideLoading();
    const grid = document.getElementById('teamGrid');
    if (!team.length) { grid.innerHTML = '<div style="color:var(--text-secondary); padding:20px;">Нет подчинённых.</div>'; return; }
    grid.innerHTML = team.map(emp => `
      <div class="employee-card">
        <div class="emp-header">
          <div class="emp-avatar">${emp.name.charAt(0)}</div>
          <div>
            <div class="emp-name">${emp.name}</div>
            <div class="emp-dept">${emp.department || '—'}</div>
          </div>
        </div>
        <div class="metrics-row">
          <div class="metric"><div class="val success">${emp.points}</div><div class="lbl">кармиков</div></div>
          <div class="metric"><div class="val accent">${emp.energy}</div><div class="lbl">энергии</div></div>
          <div class="metric"><div class="val warning">${emp.completedTasks}/${emp.totalTasks}</div><div class="lbl">заданий</div></div>
        </div>
        <div class="task-review" id="review-${emp.login}">Загрузка...</div>
      </div>
    `).join('');
    team.forEach(emp => {
      fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(emp.login)}`)
        .then(r => r.json()).then(tasks => {
          const review = tasks.filter(t => t.status === 'На проверке');
          const section = document.getElementById('review-' + emp.login);
          if (!review.length) { section.innerHTML = '<span style="color:var(--text-secondary); font-size:0.8rem;">Нет заданий на проверке</span>'; return; }
          section.innerHTML = review.map(t => `
            <div class="review-item">
              <span>${t.task} (${t.points} карм.) ${t.comment ? '— ' + t.comment : ''}</span>
              <button class="verify-btn" onclick="openVerifyModal('${t.task}', '${emp.login}', '${(t.comment||'').replace(/'/g, "\\'")}')">✓</button>
            </div>
          `).join('');
        });
    });
  }

  function openVerifyModal(taskName, login, comment) {
    const modal = document.getElementById('verifyModal');
    modal.classList.add('active');
    document.getElementById('verifyModalContent').innerHTML = `
      <h3>Подтверждение</h3>
      <p style="margin:12px 0;"><b>Задание:</b> ${taskName}</p>
      <p style="margin:12px 0;"><b>Комментарий:</b> ${comment || 'нет'}</p>
      <div class="modal-buttons">
        <button class="btn cancel" onclick="closeModal('verifyModal')">Отмена</button>
        <button class="btn" onclick="verifyTask('${taskName}', '${login}')">Подтвердить</button>
      </div>
    `;
  }

  async function verifyTask(taskName, login) {
    showLoading();
    const res = await fetch(`${API_URL}?action=verifyTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(login)}&managerLogin=${encodeURIComponent(currentLogin)}`);
    const result = await res.json();
    hideLoading();
    alert(result.message);
    closeModal('verifyModal');
    loadTeam();
  }

  async function loadNotifications() {
    const res = await fetch(`${API_URL}?action=getNotifications&managerLogin=${encodeURIComponent(currentLogin)}`);
    allNotificationsCache = await res.json();
    const container = document.getElementById('notificationsList');
    if (allNotificationsCache.length) {
      container.innerHTML = allNotificationsCache.slice(0,3).map(n => `<div class="notif-item">${n.employee} — «${n.reward}» • ${n.date}</div>`).join('');
      document.getElementById('showAllBtn').style.display = 'block';
    } else {
      container.innerHTML = 'Нет новых уведомлений';
      document.getElementById('showAllBtn').style.display = 'none';
    }
  }

  function openAllNotifications() {
    const modal = document.createElement('div'); modal.className = 'modal active';
    let html = '<div class="modal-content"><h3>Все уведомления</h3><div style="max-height: 300px; overflow-y: auto; margin: 12px 0;">';
    html += allNotificationsCache.map(n => `<p style="margin:4px 0;">${n.employee} — «${n.reward}» • ${n.date}</p>`).join('');
    html += '</div><button class="btn cancel" onclick="this.closest(\'.modal\').remove()">Закрыть</button></div>';
    modal.innerHTML = html;
    document.body.appendChild(modal);
  }

  function logout() { localStorage.removeItem('karmabank_manager_login'); location.reload(); }

  if (currentLogin) {
    loadTeam();
    loadNotifications();
  } else {
    window.location.href = '/';
  }
</script>
</body>
</html>
