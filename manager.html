<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Панель руководителя — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #1f3350;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
      user-select: none;
    }
    input[type="text"] { user-select: text; }
    .header {
      background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.4rem; font-weight: 800; cursor: pointer; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .back-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; text-decoration: none;
    }
    .back-btn:hover { background: var(--border); }
    .logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
    }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; width: 100%; display: flex; flex-direction: column; gap: 24px; }
    .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px; }
    .employee-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px; transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); position: relative; overflow: hidden;
    }
    .employee-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
    .employee-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .employee-avatar {
      width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800;
    }
    .employee-name { font-size: 1.2rem; font-weight: 700; }
    .employee-dept { font-size: 0.85rem; color: var(--text-secondary); }
    .metrics-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .metric { text-align: center; }
    .metric .value { font-size: 1.5rem; font-weight: 800; }
    .metric .label { font-size: 0.75rem; color: var(--text-secondary); }
    .value.success { color: var(--success); } .value.warning { color: var(--warning); } .value.accent { color: var(--accent); }
    .ai-tip {
      background: rgba(249, 115, 22, 0.1); border: 1px solid var(--accent);
      border-radius: 16px; padding: 14px; margin-top: 16px;
      font-size: 0.9rem; color: var(--text-secondary);
      display: flex; align-items: flex-start; gap: 8px;
    }
    .ai-tip .icon { font-size: 1.2rem; }
    .task-review-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
    .review-item {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .verify-btn {
      background: var(--success); color: white; border: none;
      padding: 6px 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
    }
    .verify-btn:hover { transform: scale(1.05); }
    .loading { text-align: center; color: var(--text-secondary); padding: 40px; }
    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center;
    }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary);
      font-size: 1rem; margin-bottom: 16px; outline: none;
    }
    .login-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.2); }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00);
      color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
      cursor: pointer;
    }
    .login-btn:hover { background: linear-gradient(135deg, #ea580c, #cc5200); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent);
      border-radius: 24px; padding: 30px; max-width: 400px; width: 90%;
      text-align: center; box-shadow: 0 0 50px rgba(249,115,22,0.6);
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
    .confirm-btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: 14px; font-weight: 600;
      cursor: pointer; margin: 10px;
    }
    .notifications-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      max-height: 250px;
      overflow: hidden;
    }
    .notif-item {
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .notif-item:last-child { border-bottom: none; }
    .show-all-btn {
      display: block; text-align: center; margin-top: 12px; color: var(--accent);
      cursor: pointer; font-weight: 600;
    }
    .show-all-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2>Панель руководителя</h2>
      <p>Войдите, чтобы увидеть свою команду</p>
      <input type="text" id="loginInput" placeholder="Ваш логин (например, arthur)" />
      <button class="login-btn" onclick="login()">Смотреть команду</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" style="display:none; flex-direction: column; flex: 1;">
    <div class="header">
      <h1 onclick="window.location.reload()">Моя команда</h1>
      <div class="header-actions">
        <a href="/" class="back-btn">← На главную</a>
        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
      </div>
    </div>
    <div class="container">
      <div class="notifications-panel" id="notificationsPanel">
        <div class="section-title">🔔 Уведомления</div>
        <div id="notificationsList">Загрузка...</div>
        <div class="show-all-btn" id="showAllBtn" style="display:none;" onclick="openAllNotifications()">Показать все</div>
      </div>
      <div class="section-title">👥 Мои сотрудники</div>
      <div class="team-grid" id="teamGrid"><div class="loading">Загрузка...</div></div>
    </div>
  </div>

  <!-- Модальные окна -->
  <div id="verifyModal" class="modal">
    <div class="modal-content">
      <p id="verifyModalText"></p>
      <button class="confirm-btn" id="verifyYesBtn">Подтвердить</button>
      <button class="modal-close-btn" onclick="closeVerifyModal()">Отмена</button>
    </div>
  </div>

  <div id="resultModal" class="modal">
    <div class="modal-content">
      <p id="resultModalText"></p>
      <button class="modal-close-btn" onclick="document.getElementById('resultModal').classList.remove('active')">Закрыть</button>
    </div>
  </div>

  <div id="allNotifModal" class="modal">
    <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
      <h3 style="text-align: center;">Все уведомления</h3>
      <div id="allNotifContent"></div>
      <button class="modal-close-btn" onclick="document.getElementById('allNotifModal').classList.remove('active')">Закрыть</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    let currentLogin = localStorage.getItem('karmabank_manager_login') || '';
    let allNotifications = [];

    function showResultModal(message) {
      document.getElementById('resultModalText').textContent = message;
      document.getElementById('resultModal').classList.add('active');
    }

    async function fetchAITip(employee) {
      try {
        const metrics = {
          points: employee.points,
          energy: employee.energy,
          completedTasks: employee.completedTasks,
          pendingTasks: employee.pendingTasks,
          inProgressTasks: employee.inProgressTasks
        };
        const res = await fetch(`${API_URL}?action=getAITip&name=${encodeURIComponent(employee.name)}&metrics=${encodeURIComponent(JSON.stringify(metrics))}`);
        return await res.json();
      } catch (e) {
        return { icon: '✨', text: 'Стабильная работа. Рекомендую индивидуальную беседу.' };
      }
    }

    function openVerifyModal(taskName, login, comment) {
      document.getElementById('verifyModalText').innerHTML = `Проверить задание <b>${taskName}</b>?<br><br>Комментарий сотрудника: <i>${comment || 'нет'}</i>`;
      document.getElementById('verifyModal').classList.add('active');
      document.getElementById('verifyYesBtn').onclick = async () => {
        closeVerifyModal();
        const res = await fetch(`${API_URL}?action=verifyTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(login)}&managerLogin=${encodeURIComponent(currentLogin)}`);
        const result = await res.json();
        showResultModal(result.message); // <-- Вот здесь теперь красивое окно, а не alert
        loadTeam();
      };
    }
    function closeVerifyModal() { document.getElementById('verifyModal').classList.remove('active'); }

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      localStorage.setItem('karmabank_manager_login', login);
      currentLogin = login;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      loadTeam();
      loadNotifications();
    }

    function logout() {
      localStorage.removeItem('karmabank_manager_login');
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    async function loadNotifications() {
      const res = await fetch(`${API_URL}?action=getNotifications&managerLogin=${encodeURIComponent(currentLogin)}`);
      allNotifications = await res.json();
      const container = document.getElementById('notificationsList');
      const showAllBtn = document.getElementById('showAllBtn');
      
      if (!allNotifications || allNotifications.length === 0) {
        container.innerHTML = '<div style="color:var(--text-secondary);">Нет новых уведомлений</div>';
        showAllBtn.style.display = 'none';
        return;
      }

      const toShow = allNotifications.slice(0, 3);
      container.innerHTML = toShow.map(n => `
        <div class="notif-item">
          <strong>${n.employee}</strong> использовал(а) сертификат «${n.reward}».<br>
          Комментарий: ${n.comment || '—'}<br>
          <small style="color:var(--text-secondary);">${n.date}</small>
        </div>
      `).join('');

      if (allNotifications.length > 3) {
        showAllBtn.style.display = 'block';
      } else {
        showAllBtn.style.display = 'none';
      }
    }

    function openAllNotifications() {
      document.getElementById('allNotifContent').innerHTML = allNotifications.map(n => `
        <div class="notif-item">
          <strong>${n.employee}</strong> — «${n.reward}»<br>
          Комментарий: ${n.comment || '—'}<br>
          <small>${n.date}</small>
        </div>
      `).join('');
      document.getElementById('allNotifModal').classList.add('active');
    }

    async function loadTeam() {
      try {
        const res = await fetch(`${API_URL}?action=getTeam&managerLogin=${encodeURIComponent(currentLogin)}`);
        const team = await res.json();
        const grid = document.getElementById('teamGrid');
        if (!team || team.length === 0) {
          grid.innerHTML = '<div class="loading">Нет подчинённых. Убедитесь, что в таблице заполнен столбец "Руководитель".</div>';
          return;
        }

        grid.innerHTML = team.map(emp => `
          <div class="employee-card" id="card-${emp.login}">
            <div class="employee-header">
              <div class="employee-avatar">${emp.name.charAt(0)}</div>
              <div>
                <div class="employee-name">${emp.name}</div>
                <div class="employee-dept">${emp.department || '—'}</div>
              </div>
            </div>
            <div class="metrics-row">
              <div class="metric"><div class="value success">${emp.points}</div><div class="label">кармиков</div></div>
              <div class="metric"><div class="value accent">${emp.energy}</div><div class="label">энергии</div></div>
              <div class="metric"><div class="value warning">${emp.completedTasks}/${emp.totalTasks}</div><div class="label">заданий</div></div>
            </div>
            <div class="ai-tip" id="tip-${emp.login}">
              <span class="icon">🤖</span>
              <span>ИИ анализирует данные...</span>
            </div>
            <div class="task-review-section" id="review-${emp.login}">Загрузка...</div>
          </div>
        `).join('');

        team.forEach(emp => {
          fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(emp.login)}`)
            .then(r => r.json())
            .then(tasks => {
              const reviewTasks = tasks.filter(t => t.status === 'На проверке');
              const section = document.getElementById('review-' + emp.login);
              if (reviewTasks.length === 0) {
                section.innerHTML = '<div style="color: var(--text-secondary); font-size: 0.85rem;">Нет заданий на проверке</div>';
              } else {
                section.innerHTML = reviewTasks.map(t => `
                  <div class="review-item">
                    <span>${t.task} (${t.points} карм.) ${t.comment ? ' — ' + t.comment : ''}</span>
                    <button class="verify-btn" onclick="openVerifyModal('${t.task}', '${emp.login}', '${t.comment || ''}')">Проверить</button>
                  </div>
                `).join('');
              }
            });

          fetchAITip(emp).then(tip => {
            const tipElem = document.getElementById('tip-' + emp.login);
            if (tipElem) tipElem.innerHTML = `<span class="icon">${tip.icon}</span><span>${tip.text}</span>`;
          });
        });

      } catch (e) {
        document.getElementById('teamGrid').innerHTML = '<div class="loading">Ошибка загрузки.</div>';
      }
    }

    if (currentLogin) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      loadTeam();
      loadNotifications();
    }
  </script>
</body>
</html>
