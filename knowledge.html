<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>База знаний — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root { --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238; --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316; --border: #1f3350; --success: #10b981; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%); color: var(--text-primary); height: 100vh; margin: 0; display: flex; flex-direction: column; user-select: none; }
    .header { background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-left img { height: 2rem; }
    .header-left h1 { font-size: 1.3rem; font-weight: 800; margin: 0; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .chat-container { flex: 1; display: flex; flex-direction: column; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.4; }
    .user-message { align-self: flex-end; background: var(--accent); color: white; }
    .bot-message { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); display: flex; gap: 10px; align-items: flex-start; }
    .bot-message img { height: 28px; margin-top: 2px; }
    .bot-message .text { flex: 1; }
    .typing-indicator { display: flex; gap: 4px; }
    .typing-indicator span { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: blink 1.4s infinite both; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    .input-area { display: flex; padding: 16px; background: var(--bg-card); border-top: 1px solid var(--border); }
    .input-area input { flex: 1; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem; }
    .input-area button { margin-left: 8px; padding: 14px 22px; background: linear-gradient(135deg, #f97316, #ea580c); color: white; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .loading-sphere { width:80px; height:80px; background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); border-radius:50%; animation: spinStar 2s linear infinite, colorShift 3s infinite; box-shadow: 0 0 40px #ff9f00, 0 0 80px #ff6600, 0 0 120px #ffd700; }
    @keyframes spinStar { 100% { transform: rotate(360deg); } }
    @keyframes colorShift { 0% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); } 50% { background: radial-gradient(circle at 70% 70%, #ffcc00, #e65c00, #e0e0e0); } 100% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left"><img src="belchonok.png" alt="Бельчонок"><h1>База знаний</h1></div>
    <a class="back-btn" href="/">← Назад</a>
  </div>
  <div class="chat-container">
    <div class="chat-box" id="chatBox">
      <div class="message bot-message"><img src="belchonok.png"><div class="text">Привет! Я бельчонок-помощник. Спрашивай о платформе, кармиках, энергии, заданиях.</div></div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Введи вопрос...">
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    function addMessage(role, text) {
      const chatBox = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = 'message ' + (role === 'user' ? 'user-message' : 'bot-message');
      if (role === 'bot') div.innerHTML = `<img src="belchonok.png"><div class="text">${text}</div>`;
      else div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function showLoading() { const overlay = document.createElement('div'); overlay.className='loading-overlay'; overlay.innerHTML='<div class="loading-sphere"></div>'; document.body.appendChild(overlay); }
    function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage('user', text);
      input.value = '';
      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=knowledgeChat&prompt=${encodeURIComponent(text)}`);
        const data = await res.json();
        hideLoading();
        addMessage('bot', data.reply || 'Извини, я не смог найти ответ.');
      } catch (e) {
        hideLoading();
        addMessage('bot', 'Ошибка соединения.');
      }
    }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
