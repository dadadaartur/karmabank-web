<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Задания — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --success: #10b981;
      --warning: #f59e0b;
      --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      user-select: none;
    }
    /* Звёздный фон */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
      opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-bottom: 20px; position: relative; z-index: 2;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    h2 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .tasks-container {
      display: flex; flex-direction: column; gap: 14px;
      position: relative; z-index: 2;
    }
    .task-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
    }
    .task-card:nth-child(1) { animation-delay: 0.05s; }
    .task-card:nth-child(2) { animation-delay: 0.1s; }
    .task-card:nth-child(3) { animation-delay: 0.15s; }
    .task-card:nth-child(4) { animation-delay: 0.2s; }
    .task-card:nth-child(5) { animation-delay: 0.25s; }
    .task-card:nth-child(6) { animation-delay: 0.3s; }
    .task-card:nth-child(7) { animation-delay: 0.35s; }
    .task-card:nth-child(8) { animation-delay: 0.4s; }
    .task-card:nth-child(9) { animation-delay: 0.45s; }
    .task-card:nth-child(10) { animation-delay: 0.5s; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(249,115,22,0.3);
      transform: translateY(-2px);
    }
    .task-info {
      flex: 1 1 250px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-name {
      font-weight: 600;
      font-size: 1.05rem;
      line-height: 1.3;
    }
    .task-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .task-meta .points {
      color: var(--accent);
      font-weight: 600;
    }
    .task-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 40px;
      padding: 8px 24px;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: #c084fc;
      box-shadow: 0 0 18px rgba(249,115,22,0.6);
      transform: scale(1.03);
    }
    .btn.complete {
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      border-color: var(--success);
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(16,185,129,0.15);
      color: var(--success);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .status-badge.pending {
      background: rgba(249,115,22,0.15);
      color: var(--accent);
      border-color: rgba(249,115,22,0.3);
    }
    .empty-message {
      text-align: center; color: var(--text-secondary); padding: 40px; font-size: 1.1rem;
    }
    /* Загрузка */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px;
      animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; }
    .arrow:nth-child(2) { animation-delay: 0.15s; }
    .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    /* Модалка */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
      animation: modalPop 0.4s ease;
      color: var(--text-primary);
    }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-content textarea {
      width: 100%; padding: 12px; margin: 16px 0; border-radius: 16px;
      border: 1px solid rgba(249,115,22,0.5); background: var(--bg-secondary);
      color: var(--text-primary); font-size: 1rem; outline: none; resize: vertical;
    }
    .modal-content textarea:focus { border-color: var(--accent); }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
  </style>
</head>
<body>
  <div class="stars" id="starsContainer"></div>
  <a class="back-btn" href="/">← Назад</a>
  <h2>Задания</h2>
  <div class="tasks-container" id="tasksContainer">Загрузка...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const currentLogin = localStorage.getItem('karmabank_login');
    if (!currentLogin) window.location.href = '/';

    // Звёздный фон
    function createStars() {
      const container = document.getElementById('starsContainer');
      const colors = ['#ffffff', '#e0f0ff', '#fbbf24', '#c084fc'];
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.background = colors[Math.floor(Math.random() * colors.length)];
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }
    createStars();

    function showLoading() {
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
      document.body.appendChild(overlay);
    }
    function hideLoading() {
      const overlay = document.querySelector('.loading-overlay');
      if (overlay) overlay.remove();
    }

    function showModal(message, callback) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><p>${message}</p><button class="modal-close-btn" id="modalCloseBtn">Закрыть</button></div>`;
      document.body.appendChild(modal);
      document.getElementById('modalCloseBtn').onclick = () => {
        modal.remove();
        if (callback) callback();
      };
    }

    function openCommentModal(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <h3>Отчёт о выполнении</h3>
          <textarea id="commentInput" placeholder="Опишите результат..."></textarea>
          <button class="btn complete" id="submitCommentBtn">Отправить</button>
          <button class="modal-close-btn" id="cancelCommentBtn">Отмена</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('submitCommentBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        if (!comment) return;
        modal.remove();
        showLoading();
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`);
        hideLoading();
        loadTasks();
      };
      document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    }

    async function takeTask(taskName) {
      showLoading();
      const res = await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
      const result = await res.json();
      hideLoading();
      if (result && result.message) {
        showModal(result.message);
      }
      loadTasks();
    }

    async function loadTasks() {
      showLoading();
      try {
        const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
        const tasks = await res.json();
        hideLoading();
        const container = document.getElementById('tasksContainer');
        if (!Array.isArray(tasks) || tasks.length === 0) {
          container.innerHTML = '<div class="empty-message">✨ Нет активных заданий</div>';
          return;
        }

        container.innerHTML = tasks.map(t => {
          let actionHtml = '';
          if (t.isGlobal && t.status !== 'В работе' && t.status !== 'На проверке' && t.status !== 'Выполнено') {
            actionHtml = `<button class="btn" onclick="takeTask('${t.task}')">Взять</button>`;
          } else if (t.status === 'Назначено') {
            actionHtml = `<button class="btn" onclick="takeTask('${t.task}')">Взять</button>`;
          } else if (t.status === 'В работе') {
            actionHtml = `<button class="btn complete" onclick="openCommentModal('${t.task}')">Выполнить</button>`;
          } else if (t.status === 'На проверке') {
            actionHtml = `<span class="status-badge pending">На проверке</span>`;
          } else if (t.status === 'Выполнено') {
            actionHtml = `<span class="status-badge">Выполнено</span>`;
          }

          return `
            <div class="task-card">
              <div class="task-info">
                <div class="task-name">${t.task} ${t.isGlobal ? '<span style="font-size:0.75rem; background:rgba(16,185,129,0.2); color:var(--success); padding:2px 8px; border-radius:10px; margin-left:8px;">Общее</span>' : ''}</div>
                <div class="task-meta">
                  <span class="points">${t.points} карм.</span>
                  <span>•</span>
                  <span>${t.status}</span>
                  ${t.comment ? `<span>• ${t.comment}</span>` : ''}
                </div>
              </div>
              <div class="task-actions">${actionHtml}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        hideLoading();
        document.getElementById('tasksContainer').innerHTML = '<div class="empty-message">Ошибка загрузки заданий</div>';
      }
    }

    loadTasks();
  </script>
</body>
</html>
