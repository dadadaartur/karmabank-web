<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Задания — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); padding: 20px; user-select: none;
      margin: 0;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; text-decoration: none; margin-bottom: 20px;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .task-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 20% 30%, rgba(16,185,129,0.06) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 40%);
      background-size: 200% 200%;
      animation: aurora 10s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .task-card > * { position: relative; z-index: 1; }
    .task-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 18px; border-radius: 14px; cursor: pointer; font-weight: 600;
      min-width: 100px; text-align: center; transition: all 0.2s;
    }
    .btn:hover { background: #ea580c; box-shadow: 0 0 15px rgba(249,115,22,0.5); }
    .btn.complete { background: var(--success); }
    .btn.complete:hover { background: #059669; }
    .status { padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 999; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
    }
    .modal-close-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .loading-sphere { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); border-radius: 50%; animation: spinStar 2s linear infinite, colorShift 3s infinite; box-shadow: 0 0 40px #ff9f00, 0 0 80px #ff6600, 0 0 120px #ffd700; }
    @keyframes spinStar { 100% { transform: rotate(360deg); } }
    @keyframes colorShift { 0% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); } 50% { background: radial-gradient(circle at 70% 70%, #ffcc00, #e65c00, #e0e0e0); } 100% { background: radial-gradient(circle at 30% 30%, #ffd700, #ff6600, #c0c0c0); } }
  </style>
</head>
<body>
  <a class="back-btn" href="/">← Назад</a>
  <h2>✅ Мои задания</h2>
  <div id="tasksList">Загрузка...</div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    function showLoading() { const overlay = document.createElement('div'); overlay.className='loading-overlay'; overlay.innerHTML='<div class="loading-sphere"></div>'; document.body.appendChild(overlay); }
    function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }
    async function loadTasks() {
      const login = localStorage.getItem('karmabank_login');
      if (!login) return;
      showLoading();
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(login)}`);
      const tasks = await res.json();
      hideLoading();
      const container = document.getElementById('tasksList');
      if (!tasks.length) { container.innerHTML = '<p>Нет активных заданий</p>'; return; }
      container.innerHTML = tasks.map(t => {
        let btnHtml = '';
        if (t.isGlobal) btnHtml = `<button class="btn" onclick="takeTask('${t.task}')">Взять</button>`;
        else if (t.status === 'Назначено') btnHtml = `<button class="btn" onclick="takeTask('${t.task}')">Взять</button>`;
        else if (t.status === 'В работе') btnHtml = `<button class="btn complete" onclick="openCommentModal('${t.task}')">Выполнить</button>`;
        else if (t.status === 'На проверке') btnHtml = `<span class="status status-active">На проверке</span>`;
        else if (t.status === 'Выполнено') btnHtml = `<span class="status status-active">Выполнено</span>`;
        return `<div class="task-card"><span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status status-global">Общее</span>' : ''}</span>${btnHtml}</div>`;
      }).join('');
    }
    async function takeTask(taskName) {
      const login = localStorage.getItem('karmabank_login');
      showLoading();
      await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(login)}`);
      hideLoading();
      loadTasks();
    }
    function openCommentModal(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content"><h3>Введите комментарий</h3><textarea id="commentInput" placeholder="Опишите результат..."></textarea><button class="btn" id="submitCommentBtn">Отправить</button><button class="modal-close-btn" id="cancelCommentBtn">Отмена</button></div>`;
      document.body.appendChild(modal);
      document.getElementById('submitCommentBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        modal.remove();
        if (!comment) return;
        showLoading();
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}&comment=${encodeURIComponent(comment)}`);
        hideLoading();
        loadTasks();
      };
      document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    }
    loadTasks();
  </script>
</body>
</html>
