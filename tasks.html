<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Задания — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%);
      color: var(--text-primary); padding: 20px; user-select: none;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s; text-decoration: none; margin-bottom: 20px;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .task-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .btn {
      background: var(--accent); color: white; border: none;
      padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600;
      min-width: 90px; text-align: center;
    }
    .btn:hover { background: #ea580c; }
    .btn.complete { background: var(--success); }
    .status { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .status-active { background: rgba(249,115,22,0.3); color: var(--accent); }
    .status-global { background: rgba(16,185,129,0.2); color: var(--success); }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #1a2940, #152238);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 0 50px rgba(249,115,22,0.6);
      animation: modalPop 0.3s ease;
    }
    @keyframes modalPop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
    }
  </style>
</head>
<body>
  <a class="back-btn" href="/">← Назад</a>
  <h2>✅ Мои задания</h2>
  <div id="tasksList">Загрузка...</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';

    async function loadTasks() {
      const login = localStorage.getItem('karmabank_login');
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(login)}`);
      const tasks = await res.json();
      const container = document.getElementById('tasksList');
      container.innerHTML = tasks.map(t => {
        let btnHtml = '';
        if (t.isGlobal) {
          btnHtml = `<button class="btn" onclick="takeTask(event, '${t.task}')">Взять</button>`;
        } else if (t.status === 'Назначено') {
          btnHtml = `<button class="btn" onclick="takeTask(event, '${t.task}')">Взять</button>`;
        } else if (t.status === 'В работе') {
          btnHtml = `<button class="btn complete" onclick="openCommentModal('${t.task}')">Выполнить</button>`;
        } else if (t.status === 'На проверке') {
          btnHtml = `<span class="status status-active">На проверке</span>`;
        } else if (t.status === 'Выполнено') {
          btnHtml = `<span class="status status-active">Выполнено</span>`;
        }
        return `<div class="task-card">
          <span>${t.task} (${t.points} карм.) ${t.isGlobal ? '<span class="status status-global">Общее</span>' : ''}</span>
          ${btnHtml}
        </div>`;
      }).join('');
    }

    async function takeTask(event, taskName) {
      const btn = event.currentTarget;
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}`);
        const data = await res.json();
        if (data && data.success) {
          loadTasks();
        } else {
          alert(data?.message || 'Не удалось взять задание');
          btn.disabled = false;
          btn.textContent = 'Взять';
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Взять';
      }
    }

    function openCommentModal(taskName) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `<div class="modal-content">
        <h3>Введите комментарий</h3>
        <input type="text" id="commentInput" placeholder="Например, номер договора...">
        <button class="btn" id="submitCommentBtn">Отправить</button>
        <button class="modal-close-btn" id="cancelCommentBtn">Отмена</button>
      </div>`;
      document.body.appendChild(modal);
      document.getElementById('submitCommentBtn').onclick = async () => {
        const comment = document.getElementById('commentInput').value.trim();
        modal.remove();
        if (!comment) return;
        await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(localStorage.getItem('karmabank_login'))}&comment=${encodeURIComponent(comment)}`);
        loadTasks();
      };
      document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    }

    loadTasks();
  </script>
</body>
</html>
