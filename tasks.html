<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Задания — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --success: #10b981;
      --warning: #f59e0b;
      --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      user-select: none;
    }
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
      opacity: 0.7;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; }
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-bottom: 20px; position: relative; z-index: 2;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    h2 {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      position: relative; z-index: 2;
    }
    @media (max-width: 700px) {
      .tasks-grid { grid-template-columns: 1fr; }
    }
    .task-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0;
      height: fit-content;
    }
    .task-card.in-progress {
      border-color: var(--accent);
      order: -1;
    }
    .task-card.completed {
      opacity: 0.7;
      order: 1;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(249,115,22,0.25);
      transform: translateY(-2px);
    }
    .task-name {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.2;
    }
    .task-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    .task-meta .points { color: var(--accent); font-weight: 600; }
    .task-actions { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 30px;
      padding: 6px 18px;
      font-weight: 800;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      white-space: nowrap;
    }
    .btn:hover { border-color: #c084fc; box-shadow: 0 0 14px rgba(249,115,22,0.6); transform: scale(1.03); }
    .btn.complete {
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      border-color: var(--success);
    }
    .status-badge {
      padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600;
      background: rgba(16,185,129,0.15); color: var(--success);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .status-badge.pending {
      background: rgba(249,115,22,0.15); color: var(--accent);
      border-color: rgba(249,115,22,0.3);
    }
    .empty-message { text-align: center; color: var(--text-secondary); padding: 40px; font-size: 1.1rem; }
    /* Загрузка */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
    }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow {
      width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24);
      border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both;
      transform: rotate(45deg); box-shadow: 0 0 10px var(--accent);
    }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse {
      0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }
    /* Модалка только для отчёта */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
      animation: modalPop 0.4s ease; color: var(--text-primary);
    }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-content textarea {
      width: 100%; padding: 12px; margin: 16px 0; border-radius: 16px;
      border: 1px solid rgba(249,115,22,0.5); background: var(--bg-secondary);
      color: var(--text-primary); font-size: 1rem; outline: none; resize: vertical;
    }
    .modal-content textarea:focus { border-color: var(--accent); }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal-close-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<a class="back-btn" href="/">← Назад</a>
<h2>Задания</h2>
<div class="tasks-grid" id="tasksContainer">Загрузка...</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const currentLogin = localStorage.getItem('karmabank_login');
  if (!currentLogin) window.location.href = '/';

  function createStars() {
    const container = document.getElementById('starsContainer');
    const colors = ['#ffffff', '#e0f0ff', '#fbbf24', '#c084fc'];
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div'); star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px'; star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
      star.style.background = colors[Math.floor(Math.random() * colors.length)];
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
  }
  createStars();

  function showLoading() {
    const overlay = document.createElement('div'); overlay.className = 'loading-overlay';
    overlay.innerHTML = '<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>';
    document.body.appendChild(overlay);
  }
  function hideLoading() { const o = document.querySelector('.loading-overlay'); if (o) o.remove(); }

  function openCommentModal(taskName) {
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Отчёт о выполнении</h3>
        <textarea id="commentInput" placeholder="Опишите результат..."></textarea>
        <button class="btn complete" id="submitCommentBtn">Завершить</button>
        <button class="modal-close-btn" id="cancelCommentBtn">Отмена</button>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('submitCommentBtn').onclick = async () => {
      const comment = document.getElementById('commentInput').value.trim();
      if (!comment) return;
      modal.remove();
      showLoading();
      await fetch(`${API_URL}?action=completeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}&comment=${encodeURIComponent(comment)}`);
      hideLoading();
      loadTasks();
    };
    document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
  }

  async function takeTask(taskName) {
    showLoading();
    const res = await fetch(`${API_URL}?action=takeTask&task=${encodeURIComponent(taskName)}&login=${encodeURIComponent(currentLogin)}`);
    await res.json();
    hideLoading();
    loadTasks();
  }

  // Безопасное экранирование для data-атрибутов
  function safeEscape(str) {
    return String(str).replace(/"/g, '&quot;').replace(/`/g, '&#96;').replace(/\\/g, '&#92;');
  }

  async function loadTasks() {
    showLoading();
    try {
      const res = await fetch(`${API_URL}?action=getTasks&login=${encodeURIComponent(currentLogin)}`);
      const raw = await res.json();
      hideLoading();

      if (raw && raw.error) {
        document.getElementById('tasksContainer').innerHTML = `<div class="empty-message">⚠️ ${raw.error}</div>`;
        return;
      }

      const tasks = Array.isArray(raw) ? raw : [];
      const container = document.getElementById('tasksContainer');
      if (tasks.length === 0) {
        container.innerHTML = '<div class="empty-message">✨ Нет активных заданий</div>';
        return;
      }

      // Фильтруем повреждённые записи
      const validTasks = tasks.filter(t => t && typeof t.task === 'string' && t.task.trim() !== '');

      const inProgress = validTasks.filter(t => t.status === 'В работе');
      const open = validTasks.filter(t => t.status === 'Назначено' || t.status === 'Общее');
      const review = validTasks.filter(t => t.status === 'На проверке');
      const completed = validTasks.filter(t => t.status === 'Выполнено');
      const sorted = [...inProgress, ...open, ...review, ...completed];

      container.innerHTML = sorted.map(t => {
        let actionHtml = '';
        let cardClass = '';
        const taskEscaped = safeEscape(t.task);

        if (t.status === 'В работе') {
          actionHtml = `<button class="btn complete" data-task="${taskEscaped}" onclick="openCommentModal(this.dataset.task)">Завершить</button>`;
          cardClass = 'in-progress';
        } else if (t.status === 'Назначено' || t.status === 'Общее') {
          actionHtml = `<button class="btn" data-task="${taskEscaped}" onclick="takeTask(this.dataset.task)">Взять</button>`;
        } else if (t.status === 'На проверке') {
          actionHtml = `<span class="status-badge pending">На проверке</span>`;
        } else if (t.status === 'Выполнено') {
          actionHtml = `<span class="status-badge">Выполнено</span>`;
          cardClass = 'completed';
        }

        return `
        <div class="task-card ${cardClass}">
          <div class="task-name">${t.task} ${t.isGlobal ? '<span style="font-size:0.75rem; background:rgba(16,185,129,0.2); color:var(--success); padding:2px 6px; border-radius:8px; margin-left:6px;">Общее</span>' : ''}</div>
          <div class="task-meta">
            <span class="points">${t.points} карм.</span>
            <span>•</span>
            <span>${t.status}</span>
            ${t.comment ? `<span>• ${t.comment}</span>` : ''}
          </div>
          <div class="task-actions">${actionHtml}</div>
        </div>`;
      }).join('');
    } catch (e) {
      hideLoading();
      document.getElementById('tasksContainer').innerHTML = `<div class="empty-message">❌ Ошибка загрузки: ${e.message}</div>`;
    }
  }

  loadTasks();
</script>
</body>
</html>
