<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Чат с ИИ — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628;
      --bg-secondary: #0f1f35;
      --bg-card: #152238;
      --text-primary: #eaf0fb;
      --text-secondary: #9aa9c1;
      --accent: #f97316;
      --border: #1f3350;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex; flex-direction: column; height: 100vh; margin: 0;
      user-select: none;
    }
    .header {
      background: var(--bg-card); padding: 16px; text-align: center;
      border-bottom: 1px solid var(--border); font-weight: bold;
      display: flex; align-items: center; gap: 8px; justify-content: center;
    }
    .chat-box {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .message {
      max-width: 80%; padding: 10px 16px; border-radius: 16px; line-height: 1.4;
    }
    .user { align-self: flex-end; background: var(--accent); color: white; }
    .bot { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .input-area {
      display: flex; padding: 12px; background: var(--bg-card); border-top: 1px solid var(--border);
    }
    .input-area input {
      flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary); outline: none;
    }
    .input-area button {
      margin-left: 8px; padding: 12px 20px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header"><img src="belchonok.png" style="height:24px;"> Чат с ИИ</div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Задайте вопрос...">
    <button onclick="send()">➤</button>
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    function add(text, cls) {
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.textContent = text;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
    async function send() {
      const input = document.getElementById('userInput');
      const prompt = input.value.trim();
      if (!prompt) return;
      add(prompt, 'user');
      input.value = '';
      add('ИИ печатает…', 'bot');
      try {
        const res = await fetch(API_URL + '?action=chat&prompt=' + encodeURIComponent(prompt));
        const data = await res.json();
        document.querySelectorAll('.bot').forEach(b => b.textContent === 'ИИ печатает…' && b.remove());
        add(data.reply || 'Нет ответа', 'bot');
      } catch (e) {
        add('Ошибка соединения', 'bot');
      }
    }
    document.getElementById('userInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
