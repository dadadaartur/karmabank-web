<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Чат команды — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --border: #1f3350; --success: #10b981;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); display: flex; height: 100vh; margin: 0;
    }
    .sidebar {
      width: 220px; background: var(--bg-card); border-right: 1px solid var(--border);
      padding: 16px; overflow-y: auto;
    }
    .sidebar h3 { margin-bottom: 12px; }
    .member {
      padding: 8px; display: flex; align-items: center; gap: 8px; cursor: pointer;
      border-radius: 8px;
    }
    .member:hover { background: var(--bg-secondary); }
    .main-chat { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .back-btn { color: var(--text-secondary); cursor: pointer; background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 15px; text-decoration: none; }
    .chat-box { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 16px; border-radius: 16px; position: relative; }
    .user { align-self: flex-end; background: var(--accent); color: white; }
    .colleague { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .private { border: 1px dashed var(--accent); }
    .input-area { display: flex; padding: 12px; background: var(--bg-card); border-top: 1px solid var(--border); align-items: center; gap: 5px; }
    .input-area input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); }
    .input-area button { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; }
    .emoji-btn { font-size: 1.2rem; cursor: pointer; background: none; border: none; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>Участники</h3>
    <div id="membersList"></div>
  </div>
  <div class="main-chat">
    <div class="chat-header">
      <span><b>Общий чат</b> | Личные сообщения: <span id="privateTo">все</span></span>
      <a class="back-btn" href="/">← Назад</a>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <button class="emoji-btn" onclick="addEmoji()">😀</button>
      <input type="text" id="userInput" placeholder="Введите сообщение (Enter — отправить)...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const currentUser = localStorage.getItem('karmabank_login') || 'anonymous';
    let privateRecipient = null;

    async function loadMembers() {
      const res = await fetch(`${API_URL}?action=getAllEmployees`);
      const employees = await res.json();
      document.getElementById('membersList').innerHTML = employees.map(e => `
        <div class="member">
          <span onclick="setPrivate('${e.name}')" style="cursor:pointer;color:var(--accent);">@${e.name}</span>
        </div>
      `).join('');
    }

    function setPrivate(name) {
      privateRecipient = name;
      document.getElementById('privateTo').textContent = `@${name}`;
    }

    function addMessage(sender, text, cls) {
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.innerHTML = `<b>${sender}:</b> ${text}`;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      const isPrivate = privateRecipient ? true : false;
      addMessage(currentUser, (isPrivate ? `[лично для ${privateRecipient}] ` : '') + text, isPrivate ? 'user private' : 'user');
      input.value = '';
      try {
        await fetch(`${API_URL}?action=sendMessage&sender=${encodeURIComponent(currentUser)}&text=${encodeURIComponent(text)}&private=${isPrivate ? '1' : '0'}&recipient=${encodeURIComponent(privateRecipient || '')}`);
      } catch(e) {}
    }

    function addEmoji() {
      document.getElementById('userInput').value += '😀';
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    loadMembers();
  </script>
</body>
</html>
