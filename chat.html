```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Чат команды — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --border: #1f3350; --success: #10b981;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      color: var(--text-primary); display: flex; height: 100vh; margin: 0;
      overflow: hidden;
    }
    .sidebar {
      width: 220px; background: var(--bg-card); border-right: 1px solid var(--border);
      padding: 16px; overflow-y: auto;
    }
    .sidebar h3 { margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .sidebar h3 svg { width: 18px; height: 18px; stroke: var(--accent); }
    .member {
      padding: 8px; display: flex; align-items: center; gap: 8px;
      cursor: pointer; border-radius: 8px; transition: all 0.2s;
    }
    .member:hover { background: var(--bg-secondary); }
    .main-chat { flex: 1; display: flex; flex-direction: column; }
    .chat-header {
      padding: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .back-btn {
      color: var(--text-secondary); cursor: pointer; background: none;
      border: 1px solid var(--border); padding: 5px 12px; border-radius: 15px;
      text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 4px;
    }
    .back-btn:hover { background: var(--border); }
    .ai-btn {
      background: transparent; border: 1px solid var(--success); color: var(--success);
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .ai-btn svg { width: 16px; height: 16px; stroke: var(--success); }
    .ai-btn:hover { background: var(--success); color: white; }
    .ai-btn:hover svg { stroke: white; }
    .chat-box {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message { max-width: 80%; padding: 10px 16px; border-radius: 16px; }
    .user { align-self: flex-end; background: var(--accent); color: white; }
    .colleague { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
    .input-area {
      display: flex; padding: 12px; background: var(--bg-card);
      border-top: 1px solid var(--border); align-items: center; gap: 5px;
    }
    .input-area input {
      flex: 1; padding: 12px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary);
    }
    .input-area button {
      padding: 12px 20px; background: var(--accent); color: white;
      border: none; border-radius: 12px; cursor: pointer; font-weight: 600;
    }
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: linear-gradient(145deg, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 24px; padding: 30px;
      max-width: 400px; width: 90%; text-align: center;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
    }
    .modal-close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px;
    }
    .modal input {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="7" r="3"/><circle cx="18" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h2"/><path d="M21 21v-2a4 4 0 0 0-4-4h-2"/></svg>
      Участники
    </h3>
    <div id="membersList"></div>
  </div>
  <div class="main-chat">
    <div class="chat-header">
      <a class="back-btn" href="/">← Назад</a>
      <button class="ai-btn" onclick="callAI()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Бельчонок AI
      </button>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Введите сообщение...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const currentUser = localStorage.getItem('karmabank_login') || 'anonymous';

    async function loadMembers() {
      const res = await fetch(`${API_URL}?action=getAllEmployees`);
      const employees = await res.json();
      document.getElementById('membersList').innerHTML = employees.map(e => `
        <div class="member" onclick="showMemberCard('${e.name}', '${e.department || ''}', '${e.energy || 0}')">
          <span>${e.name}</span>
        </div>
      `).join('');
    }

    function showMemberCard(name, dept, energy) {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <h3>${name}</h3>
          <p>Отдел: ${dept || '—'}</p>
          <p>Энергия: ${energy}</p>
          <button class="modal-close-btn" onclick="this.closest('.modal').remove()">Закрыть</button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function addMessage(sender, text, cls) {
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.innerHTML = `<b>${sender}:</b> ${text}`;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      addMessage(currentUser, text, 'user');
      input.value = '';
      try {
        await fetch(`${API_URL}?action=sendMessage&sender=${encodeURIComponent(currentUser)}&text=${encodeURIComponent(text)}`);
      } catch(e) {}
    }

    function callAI() {
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <h3>🤖 Задайте вопрос Бельчонку</h3>
          <input type="text" id="aiQuestion" placeholder="Введите вопрос...">
          <button class="btn" id="askBtn">Спросить</button>
          <button class="modal-close-btn" id="cancelBtn">Отмена</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('askBtn').onclick = async () => {
        const question = document.getElementById('aiQuestion').value.trim();
        modal.remove();
        if (!question) return;
        addMessage('Бельчонок', 'Думаю...', 'colleague');
        try {
          const res = await fetch(`${API_URL}?action=knowledgeChat&prompt=${encodeURIComponent(question)}`);
          const data = await res.json();
          document.querySelectorAll('.colleague').forEach(b => {
            if (b.textContent.startsWith('Бельчонок: Думаю')) b.remove();
          });
          addMessage('Бельчонок', data.reply || 'Нет ответа', 'colleague');
        } catch(e) {
          addMessage('Бельчонок', 'Ошибка', 'colleague');
        }
      };
      document.getElementById('cancelBtn').onclick = () => modal.remove();
    }

    loadMembers();
  </script>
</body>
</html>
