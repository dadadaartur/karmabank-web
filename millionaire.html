<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кармический миллионер — Викторина по продажам</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238;
      --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #1f3350;
      --hologram-glow: 0 0 8px rgba(249,115,22,0.6), 0 0 16px rgba(192,132,252,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 40%, #0f1f35 0%, #0a1628 70%);
      color: var(--text-primary); min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
      position: relative; overflow-x: hidden;
    }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; opacity: 0.7; }
    @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #f97316, 0 0 12px #c084fc; } }
    .game-container {
      max-width: 700px; width: 100%; position: relative; z-index: 2;
      background: radial-gradient(circle at 20% 30%, #1a2f4a 0%, #0f1f35 100%);
      border: 1px solid var(--accent); border-radius: 32px; padding: 40px 30px;
      box-shadow: 0 0 60px rgba(249,115,22,0.6);
      text-align: center; animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .game-screen { display: none; }
    .game-screen.active { display: block; }
    h2 {
      font-size: 2rem; font-weight: 800; margin-bottom: 12px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .host-message {
      background: rgba(21,38,56,0.6); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin: 20px 0;
      display: flex; align-items: center; gap: 12px;
    }
    .host-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .question-card {
      background: radial-gradient(circle at 20% 30%, #1a2a45 0%, #0a1628 70%);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 24px; margin: 20px 0; font-size: 1.1rem; font-weight: 600;
    }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .option-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 16px;
      padding: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;
      color: var(--text-primary); font-size: 1rem;
    }
    .option-btn:hover { border-color: var(--accent); box-shadow: var(--hologram-glow); }
    .option-btn.correct { background: var(--success); border-color: var(--success); color: white; }
    .option-btn.wrong { background: var(--danger); border-color: var(--danger); color: white; }
    .timer {
      font-size: 2rem; font-weight: 800; color: var(--warning); margin: 12px 0;
    }
    .score {
      font-size: 1.2rem; margin: 8px 0;
    }
    .score span { color: var(--accent); font-weight: 700; }
    .lives {
      display: flex; justify-content: center; gap: 6px; margin: 8px 0;
    }
    .life { font-size: 1.5rem; }
    .btn {
      background: transparent; border: 1px solid var(--accent); border-radius: 40px;
      padding: 12px 36px; font-weight: 800; font-size: 1rem; cursor: pointer;
      transition: all 0.3s; background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .btn:hover { border-color: #c084fc; box-shadow: var(--hologram-glow); transform: scale(1.03); }
    .btn.shield-btn { border-color: var(--success); color: var(--success); background: rgba(16,185,129,0.1); }
    .risk-panel {
      background: rgba(249,115,22,0.1); border: 1px solid var(--accent); border-radius: 16px;
      padding: 12px; margin: 12px 0; font-weight: 600; color: var(--accent);
    }
    .rating-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .rating-table th, .rating-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .rating-table th { color: var(--text-secondary); font-weight: 500; font-size: 0.85rem; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; margin-top: 20px;
    }
    .back-btn:hover { background: var(--border); color: var(--text-primary); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="game-container">
  <div class="game-screen active" id="startScreen">
    <h2>Кармический миллионер</h2>
    <div class="host-message">
      <div class="host-avatar">🐿️</div>
      <p>Это новое испытание! Ответь на вопросы по продажам и о себе. У тебя 3 жизни, Кармический щит и шанс рискнуть. Готов?</p>
    </div>
    <button class="btn" id="startBtn">Начать игру</button>
  </div>

  <div class="game-screen" id="gameScreen">
    <div class="timer" id="timer">15</div>
    <div class="score">Вопрос <span id="questionNum">1</span> из <span id="totalQuestions">15</span> • Баллов: <span id="points">0</span></div>
    <div class="lives" id="livesContainer"></div>
    <div class="question-card" id="questionText">Загрузка вопроса...</div>
    <div id="riskPanel" class="risk-panel hidden">Риск-вопрос! Можно удвоить очки, но ошибка обнулит раунд.</div>
    <div class="options-grid" id="optionsGrid"></div>
    <button class="btn shield-btn hidden" id="shieldBtn" onclick="useShield()">🛡️ Кармический щит (1 раз)</button>
    <div class="host-message" id="hostComment" style="display:none;"></div>
  </div>

  <div class="game-screen" id="resultScreen">
    <h2 id="resultTitle"></h2>
    <div class="host-message" id="resultMessage"></div>
    <div class="score" style="font-size: 1.5rem;">Итоговый балл: <span id="finalScore">0</span></div>
    <button class="btn" onclick="startGame()">Играть снова</button>
    <h3 style="margin-top: 24px;">🏆 Рейтинг</h3>
    <table class="rating-table" id="ratingTable"></table>
    <a href="/" class="back-btn">← На главную</a>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
  const currentLogin = localStorage.getItem('karmabank_login') || 'anonymous';
  let timerInterval, timeLeft, currentQuestionIndex = 0, totalPoints = 0, gameActive = false;
  let lives = 3, shieldUsed = false, questions = [], userData = null;

  // Звёздное небо
  function createStars() {
    const container = document.getElementById('starsContainer');
    const colors = ['#ffffff', '#e0f0ff', '#fbbf24', '#c084fc'];
    for (let i=0; i<80; i++) {
      const star = document.createElement('div'); star.className='star';
      const size = Math.random()*3+1;
      star.style.width = size+'px'; star.style.height = size+'px';
      star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%';
      star.style.background = colors[Math.floor(Math.random()*colors.length)];
      star.style.animationDelay = Math.random()*3+'s';
      container.appendChild(star);
    }
  }
  createStars();

  function switchScreen(screenId) {
    document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  // Загрузка пользовательских данных и вопросов
  async function startGame() {
    switchScreen('gameScreen');
    gameActive = false;
    lives = 3;
    shieldUsed = false;
    totalPoints = 0;
    currentQuestionIndex = 0;
    document.getElementById('points').textContent = '0';
    document.getElementById('shieldBtn').classList.add('hidden');
    try {
      // Получаем профиль текущего пользователя и список всех сотрудников
      const [profileRes, employeesRes, aiQuestionsRes] = await Promise.all([
        fetch(`${API_URL}?action=getFullProfile&login=${encodeURIComponent(currentLogin)}`),
        fetch(`${API_URL}?action=getAllEmployees`),
        fetch(`${API_URL}?action=getMillionaireQuestions&login=${encodeURIComponent(currentLogin)}`)
      ]);
      userData = await profileRes.json();
      const allEmployees = await employeesRes.json();
      const aiQuestions = await aiQuestionsRes.json();

      // Находим руководителя текущего пользователя
      let managerName = null;
      for (const emp of allEmployees) {
        if (emp.login === currentLogin && emp.managerLogin) {
          const manager = allEmployees.find(e => e.login === emp.managerLogin);
          if (manager) managerName = manager.name;
        }
      }

      // Собираем персональные вопросы
      const personalQuestions = [];
      if (managerName) {
        personalQuestions.push({
          question: `Как зовут твоего руководителя?`,
          options: [managerName, "Не знаю", allEmployees[0]?.name || "Артур", "HRDNK"],
          correct: 0,
          personal: true
        });
      }
      if (userData) {
        personalQuestions.push({
          question: `В каком отделе ты работаешь?`,
          options: [userData.department || "Отдел продаж", "Маркетинг", "Разработка", "HR"],
          correct: 0,
          personal: true
        });
        personalQuestions.push({
          question: `Сколько у тебя сейчас кармиков?`,
          options: [String(userData.points || 0), "100", "500", "1000"],
          correct: 0,
          personal: true
        });
      }

      // Перемешиваем AI вопросы и добавляем персональные в случайные позиции
      questions = [...aiQuestions].sort(() => Math.random() - 0.5);
      personalQuestions.forEach(q => {
        const pos = Math.floor(Math.random() * (questions.length + 1));
        questions.splice(pos, 0, q);
      });
      document.getElementById('totalQuestions').textContent = questions.length;
      updateLivesDisplay();
      gameActive = true;
      loadQuestion();
    } catch(e) {
      document.getElementById('questionText').textContent = 'Ошибка загрузки вопросов. Попробуй позже.';
      console.error(e);
    }
  }

  function loadQuestion() {
    if (!gameActive || currentQuestionIndex >= questions.length) {
      endGame(true);
      return;
    }
    const q = questions[currentQuestionIndex];
    document.getElementById('questionNum').textContent = currentQuestionIndex + 1;
    document.getElementById('questionText').textContent = q.question;
    const optionsGrid = document.getElementById('optionsGrid');
    optionsGrid.innerHTML = q.options.map((opt, idx) => 
      `<button class="option-btn" onclick="answerQuestion(${idx})">${opt}</button>`
    ).join('');
    
    // Риск-вопрос (каждый 4-й и только если не персональный)
    document.getElementById('riskPanel').classList.toggle('hidden', q.personal || (currentQuestionIndex % 4 !== 0));
    // Показать кнопку щита, если не использован и есть жизни
    document.getElementById('shieldBtn').classList.toggle('hidden', shieldUsed || lives <= 1);
    
    // Уровень сложности и время
    let seconds = 15;
    if (q.personal) seconds = 5;
    else if (currentQuestionIndex < 5) seconds = 15;
    else if (currentQuestionIndex < 10) seconds = 10;
    else seconds = 6;
    startTimer(seconds);
  }

  function startTimer(seconds) {
    timeLeft = seconds;
    document.getElementById('timer').textContent = timeLeft;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timeOut();
      }
    }, 1000);
  }

  function timeOut() {
    showHostComment('⏰ Время вышло!');
    answerQuestion(-1); // -1 означает тайм-аут
  }

  async function answerQuestion(selected) {
    if (!gameActive) return;
    clearInterval(timerInterval);
    gameActive = false;
    const q = questions[currentQuestionIndex];
    const isRisk = !q.personal && (currentQuestionIndex % 4 === 0);
    let pointsEarned = 0;

    // Подсветка правильного ответа
    document.querySelectorAll('.option-btn').forEach((btn, idx) => {
      btn.disabled = true;
      if (idx === q.correct) btn.classList.add('correct');
      if (idx === selected && selected !== q.correct) btn.classList.add('wrong');
    });

    if (selected === q.correct) {
      pointsEarned = 100 + timeLeft * 5;
      if (isRisk) pointsEarned *= 2;
      totalPoints += pointsEarned;
      document.getElementById('points').textContent = totalPoints;
      showHostComment(`✅ Правильно! +${pointsEarned} баллов.`);
    } else {
      lives--;
      updateLivesDisplay();
      if (isRisk) totalPoints = Math.max(0, totalPoints - 50); // потеря при риске
      document.getElementById('points').textContent = totalPoints;
      showHostComment(`❌ Неправильно. ${lives > 0 ? 'Осталось жизней: ' + lives : 'Игра окончена.'}`);
    }

    if (lives <= 0) {
      setTimeout(() => endGame(false), 2000);
      return;
    }

    currentQuestionIndex++;
    setTimeout(() => {
      gameActive = true;
      loadQuestion();
    }, 1500);
  }

  function useShield() {
    if (shieldUsed || lives <= 1 || !gameActive) return;
    shieldUsed = true;
    document.getElementById('shieldBtn').classList.add('hidden');
    showHostComment('🛡️ Кармический щит активирован! Этот вопрос засчитан.');
    // Пропускаем текущий вопрос без потерь
    clearInterval(timerInterval);
    currentQuestionIndex++;
    gameActive = true;
    loadQuestion();
  }

  function updateLivesDisplay() {
    const container = document.getElementById('livesContainer');
    container.innerHTML = Array.from({length: lives}, () => '<span class="life">❤️</span>').join('');
  }

  async function showHostComment(text) {
    const host = document.getElementById('hostComment');
    host.innerHTML = `<div class="host-avatar">🐿️</div><p>${text}</p>`;
    host.style.display = 'flex';
  }

  function endGame(won) {
    clearInterval(timerInterval);
    document.getElementById('finalScore').textContent = totalPoints;
    document.getElementById('resultTitle').textContent = won ? '🎉 Поздравляем!' : 'Игра завершена';
    document.getElementById('resultMessage').innerHTML = `<div class="host-avatar">🐿️</div><p>Ты набрал ${totalPoints} баллов. ${won ? 'Отличная работа!' : 'Приходи ещё!'}</p>`;
    updateRating();
    switchScreen('resultScreen');
  }

  function updateRating() {
    let rating = JSON.parse(localStorage.getItem('millionaireRatingV2') || '[]');
    rating.push({ name: currentLogin, points: totalPoints, date: new Date().toLocaleDateString('ru-RU') });
    rating.sort((a, b) => b.points - a.points);
    rating = rating.slice(0, 10);
    localStorage.setItem('millionaireRatingV2', JSON.stringify(rating));
    const table = document.getElementById('ratingTable');
    table.innerHTML = rating.map((r, i) => `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.points}</td><td>${r.date}</td></tr>`).join('');
  }

  // Загрузка рейтинга при открытии
  (function loadRating() {
    const rating = JSON.parse(localStorage.getItem('millionaireRatingV2') || '[]');
    document.getElementById('ratingTable').innerHTML = rating.map((r, i) => `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.points}</td><td>${r.date}</td></tr>`).join('');
  })();

  document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
