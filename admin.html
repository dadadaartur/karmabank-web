<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Командный центр — Кармический банк</title>
  <link rel="icon" type="image/png" href="belchonok.png">
  <link rel="apple-touch-icon" href="belchonok.png">
  <style>
    :root { --bg-primary: #0a1628; --bg-secondary: #0f1f35; --bg-card: #152238; --text-primary: #eaf0fb; --text-secondary: #9aa9c1; --accent: #f97316; --accent-hover: #ea580c; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --border: #1f3350; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(145deg, #0a1628 0%, #0f1f35 50%, #0c1b30 100%); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; user-select: none; }
    input[type="text"] { user-select: text; }
    .header { background: rgba(21, 38, 56, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .header h1 img { height: 1.8rem; vertical-align: middle; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
    .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: white; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; width: 100%; display: grid; gap: 24px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: all 0.2s; }
    .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .metric-card .label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
    .metric-card .value { font-size: 2.2rem; font-weight: 800; }
    .value.accent { color: var(--accent); } .value.success { color: var(--success); } .value.warning { color: var(--warning); }
    .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
    .panel h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .rating-table { width: 100%; border-collapse: collapse; }
    .rating-table th { text-align: left; color: var(--text-secondary); font-weight: 500; font-size: 0.8rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .rating-table td { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .rating-table .position { font-weight: 700; font-size: 1.1rem; }
    .rating-table .points { font-weight: 700; color: var(--success); }
    .rating-table .energy { color: var(--accent); font-weight: 600; }
    .task-item, .reward-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .task-item:last-child, .reward-item:last-child { border-bottom: none; }
    .status { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .status.pending { background: rgba(245,158,11,0.2); color: var(--warning); }
    .status.in-progress { background: rgba(249,115,22,0.2); color: var(--accent); }
    .status.done { background: rgba(16,185,129,0.2); color: var(--success); }
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-form { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
    .login-form h2 { font-size: 2rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form p { color: var(--text-secondary); margin-bottom: 24px; }
    .login-form input[type="text"] { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem; margin-bottom: 16px; outline: none; }
    .login-form input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249,115,22,0.2); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #e65c00); color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-btn:hover { background: linear-gradient(135deg, var(--accent-hover), #cc5200); }
    .login-error { color: var(--danger); margin-top: 12px; font-weight: 500; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .loading-arrows { display: flex; gap: 10px; }
    .arrow { width: 12px; height: 12px; background: linear-gradient(135deg, #f97316, #fbbf24); border-radius: 2px; animation: arrowPulse 1.2s infinite ease-in-out both; transform: rotate(45deg); box-shadow: 0 0 10px var(--accent); }
    .arrow:nth-child(1) { animation-delay: 0s; } .arrow:nth-child(2) { animation-delay: 0.15s; } .arrow:nth-child(3) { animation-delay: 0.3s; }
    @keyframes arrowPulse { 0%, 100% { opacity: 0.4; transform: rotate(45deg) scale(0.8); box-shadow: 0 0 8px var(--accent); } 50% { opacity: 1; transform: rotate(45deg) scale(1.3); box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); } }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-form">
      <h2><img src="belchonok.png" style="height: 2.5rem; vertical-align: middle;" alt="Бельчонок"> Командный центр</h2>
      <p>Введите логин администратора</p>
      <input type="text" id="loginInput" placeholder="Логин" />
      <button class="login-btn" onclick="login()">Войти</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainScreen" style="display:none; flex-direction: column; flex: 1;">
    <div class="header">
      <h1><img src="belchonok.png" alt="Бельчонок"> Кармический банк — Командный центр</h1>
      <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
    </div>
    <div class="container">
      <div class="metrics-grid">
        <div class="metric-card"><div class="label">Сотрудников</div><div class="value accent" id="totalEmployees">0</div></div>
        <div class="metric-card"><div class="label">Всего кармиков</div><div class="value success" id="totalPoints">0</div></div>
        <div class="metric-card"><div class="label">Всего энергии</div><div class="value accent" id="totalEnergy">0</div></div>
        <div class="metric-card"><div class="label">Выполнено заданий</div><div class="value success" id="completedTasks">0</div></div>
        <div class="metric-card"><div class="label">Активных заданий</div><div class="value warning" id="activeTasks">0</div></div>
      </div>
      <div class="panel">
        <h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Рейтинг</h2>
        <table class="rating-table"><thead><tr><th>#</th><th>Имя</th><th>Отдел</th><th>Кармики</th><th>Энергия</th></tr></thead><tbody id="ratingBody"><tr><td colspan="5">Загрузка...</td></tr></tbody></table>
      </div>
      <div class="panel"><h2>📋 Последние задания</h2><div id="taskList"></div></div>
      <div class="panel"><h2>🎁 Витрина наград</h2><div id="rewardList"></div></div>
    </div>
  </div>

  <script>
    // ==================== ИСПРАВЛЕННЫЙ API URL ====================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxMxCJG_mEO-WaV_Jw76_nF37VCisQ5tdJHW9lvaoET42sv548S4t_4IZdGai-e4xoQ/exec';
    const ADMIN_LOGIN = 'adminboss';
    let levelsCache = [];

    function showLoading() { const overlay = document.createElement('div'); overlay.className='loading-overlay'; overlay.innerHTML='<div class="loading-arrows"><div class="arrow"></div><div class="arrow"></div><div class="arrow"></div></div>'; document.body.appendChild(overlay); }
    function hideLoading() { const overlay = document.querySelector('.loading-overlay'); if (overlay) overlay.remove(); }

    async function loadLevels() { 
      try { 
        const res = await fetch(`${API_URL}?action=getLevels`); 
        levelsCache = await res.json(); 
      } catch(e) { console.error(e); } 
    }

    function login() {
      const login = document.getElementById('loginInput').value.trim();
      if (!login) { document.getElementById('loginError').textContent = 'Введите логин'; return; }
      if (login !== ADMIN_LOGIN) { document.getElementById('loginError').textContent = 'Доступ запрещён'; return; }
      localStorage.setItem('karmabank_admin_login', login);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      loadLevels().then(() => { fetchData(); setInterval(fetchData, 30000); });
    }

    function logout() {
      localStorage.removeItem('karmabank_admin_login');
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginInput').value = '';
      document.getElementById('loginError').textContent = '';
    }

    async function fetchData() {
      showLoading();
      try {
        const [employees, tasks, rewards] = await Promise.all([
          fetch(`${API_URL}?action=getAllEmployees`).then(r => r.json()),
          fetch(`${API_URL}?action=getAllTasks`).then(r => r.json()),
          fetch(`${API_URL}?action=getRewards`).then(r => r.json())
        ]);
        updateMetrics(employees, tasks);
        updateRating(employees);
        updateTaskList(tasks);
        updateRewardList(rewards);
      } catch(e) { console.error(e); }
      hideLoading();
    }

    function updateMetrics(employees, tasks) {
      document.getElementById('totalEmployees').textContent = employees.length;
      document.getElementById('totalPoints').textContent = employees.reduce((s,e) => s + (e.points||0), 0);
      document.getElementById('totalEnergy').textContent = employees.reduce((s,e) => s + (e.energy||0), 0);
      document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'Выполнено').length;
      document.getElementById('activeTasks').textContent = tasks.filter(t => t.status !== 'Выполнено').length;
    }

    function updateRating(employees) {
      const sorted = [...employees].sort((a,b) => (b.points||0) - (a.points||0));
      document.getElementById('ratingBody').innerHTML = sorted.map((e,i) => `
        <tr><td class="position">${i+1}</td><td>${e.name}</td><td>${e.department}</td><td class="points">${e.points}</td><td class="energy">${e.energy}</td></tr>
      `).join('');
    }

    function updateTaskList(tasks) {
      document.getElementById('taskList').innerHTML = tasks.slice(0,5).map(t => {
        let cls = t.status === 'В работе' ? 'in-progress' : (t.status === 'Выполнено' ? 'done' : 'pending');
        return `<div class="task-item"><span>${t.task} (${t.employee})</span><span class="status ${cls}">${t.status}</span></div>`;
      }).join('');
    }

    function updateRewardList(rewards) {
      document.getElementById('rewardList').innerHTML = rewards.map(r => `<div class="reward-item"><span>${r.name}</span><span>${r.cost} карм.</span></div>`).join('');
    }

    if (localStorage.getItem('karmabank_admin_login') === ADMIN_LOGIN) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainScreen').style.display = 'flex';
      loadLevels().then(() => { fetchData(); setInterval(fetchData, 30000); });
    }
  </script>
</body>
</html>
