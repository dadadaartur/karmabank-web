<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Сатурн — Кармический банк</title>
  <style>
    body {
      margin: 0; overflow: hidden;
      background: radial-gradient(ellipse at center, #1a2a45 0%, #0a1628 70%);
      font-family: 'Inter', sans-serif;
      cursor: grab;
    }
    body:active { cursor: grabbing; }
    canvas { display: block; }
    .title {
      position: absolute; bottom: 30px; width: 100%; text-align: center;
      font-size: 2rem; font-weight: 800; letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316, #c084fc);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 12px rgba(249,115,22,0.6));
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title">САТУРН</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1628);
    scene.fog = new THREE.FogExp2(0x0a1628, 0.0003);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 4.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.setClearColor(0x0a1628);
    document.body.appendChild(renderer.domElement);

    // --- Текстуры (процедурные, чтобы не зависеть от внешних файлов) ---
    function createPlanetTexture(baseColor, stripeColor) {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 256;
      const ctx = canvas.getContext('2d');
      // Основной фон
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, 512, 256);
      // Полосы
      ctx.fillStyle = stripeColor;
      const bandCount = 12;
      for (let i = 0; i < bandCount; i++) {
        const y = (i / bandCount) * 256 + Math.sin(i * 1.5) * 10;
        const height = 10 + Math.random() * 15;
        ctx.fillRect(0, y, 512, height);
      }
      // Добавляем лёгкий шум для реалистичности
      const imageData = ctx.getImageData(0, 0, 512, 256);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * 30;
        data[i] += noise;     // R
        data[i + 1] += noise; // G
        data[i + 2] += noise; // B
      }
      ctx.putImageData(imageData, 0, 0);
      return new THREE.CanvasTexture(canvas);
    }

    const saturnTexture = createPlanetTexture('#e0c080', '#b08040');
    const ringTexture = (() => {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 512, 0);
      gradient.addColorStop(0, 'rgba(200,180,120,0.1)');
      gradient.addColorStop(0.2, 'rgba(240,220,160,0.9)');
      gradient.addColorStop(0.5, 'rgba(180,140,80,1)');
      gradient.addColorStop(0.8, 'rgba(240,220,160,0.9)');
      gradient.addColorStop(1, 'rgba(200,180,120,0.1)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 512, 64);
      return new THREE.CanvasTexture(canvas);
    })();

    // --- Планета ---
    const planetGeometry = new THREE.SphereGeometry(1, 64, 64);
    const planetMaterial = new THREE.MeshStandardMaterial({
      map: saturnTexture,
      roughness: 0.5,
      metalness: 0.2,
    });
    const planet = new THREE.Mesh(planetGeometry, planetMaterial);
    planet.castShadow = true;
    planet.receiveShadow = true;
    scene.add(planet);

    // --- Кольца ---
    const ringGeometry = new THREE.RingGeometry(1.3, 2.2, 128);
    // Повернём кольцо, чтобы оно лежало в плоскости эклиптики
    ringGeometry.rotateX(Math.PI / 2);
    const ringMaterial = new THREE.MeshStandardMaterial({
      map: ringTexture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.8,
      roughness: 0.4,
      metalness: 0.3,
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.castShadow = true;
    ring.receiveShadow = true;
    planet.add(ring);

    // --- Свечение (ореол) ---
    const glowGeometry = new THREE.SphereGeometry(1.2, 32, 32);
    const glowMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uColor1: { value: new THREE.Color(0xf97316) },
        uColor2: { value: new THREE.Color(0xc084fc) },
        uTime: { value: 0 },
      },
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        uniform float uTime;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        void main() {
          float fresnel = dot(vNormal, vec3(0.0, 0.0, 1.0));
          fresnel = pow(1.0 - abs(fresnel), 3.0);
          float pulse = sin(uTime * 2.0) * 0.5 + 0.5;
          vec3 glowColor = mix(uColor1, uColor2, pulse);
          gl_FragColor = vec4(glowColor, fresnel * 0.5);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    scene.add(glow);

    // --- Частицы (звёздная пыль) ---
    const particlesCount = 500;
    const particlesPositions = new Float32Array(particlesCount * 3);
    for (let i = 0; i < particlesCount * 3; i += 3) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 2.2 + Math.random() * 1.5;
      const height = (Math.random() - 0.5) * 3;
      particlesPositions[i] = Math.cos(angle) * radius;
      particlesPositions[i + 1] = height;
      particlesPositions[i + 2] = Math.sin(angle) * radius;
    }
    const particlesGeom = new THREE.BufferGeometry();
    particlesGeom.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
    const particlesMat = new THREE.PointsMaterial({
      color: 0xfbbf24,
      size: 0.03,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      map: (() => {
        const c = document.createElement('canvas');
        c.width = 8; c.height = 8;
        const ctx = c.getContext('2d');
        ctx.beginPath(); ctx.arc(4, 4, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'white'; ctx.fill();
        return new THREE.CanvasTexture(c);
      })(),
    });
    const particles = new THREE.Points(particlesGeom, particlesMat);
    scene.add(particles);

    // --- Освещение ---
    scene.add(new THREE.AmbientLight(0x404060));
    const keyLight = new THREE.DirectionalLight(0xffccaa, 1.2);
    keyLight.position.set(2, 3, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(0xc084fc, 0.6);
    fillLight.position.set(-2, -1, -2);
    scene.add(fillLight);

    // --- Управление ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.5;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.8;
    controls.enableZoom = true;
    controls.zoomSpeed = 0.8;
    controls.enablePan = false;
    controls.target.set(0, 0, 0);

    // --- Анимация ---
    const clock = new THREE.Clock();
    function animate() {
      const elapsedTime = performance.now() * 0.001;
      if (glowMaterial.uniforms) glowMaterial.uniforms.uTime.value = elapsedTime;
      particles.rotation.y += 0.0003;
      particles.rotation.x += 0.0001;
      planet.rotation.y += 0.001;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
